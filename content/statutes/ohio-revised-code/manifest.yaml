- section: '1345.24'
  title: Retaining notice of cancellation.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.24
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.24/4-6-2017/1345.24-4-6-2017.pdf
  text: 'In a home solicitation sale, the seller shall retain, for the period in which
    an action to enforce the sale could be commenced, any notice of cancellation made
    pursuant to section


    1345.22


    of the Revised Code. The seller shall also retain any envelope in which a notice
    of cancellation is sent or delivered. If the date of delivery is not indicated
    or recorded on the notice of cancellation or on the envelope, the seller shall
    record the date of delivery on the notice of cancellation.'
