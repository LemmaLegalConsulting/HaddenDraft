- section: '4781.51'
  title: Information to be contained in rental agreement.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.51
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.51/9-10-2012/4781.51-9-10-2012.pdf
  text: '(A) Every written rental agreement for residential premises shall contain
    the name and address of the owner of the residential premises and the name and
    address of the owner''s agent, if any. If the owner or the owner''s agent is a
    corporation, partnership, limited partnership, association, trust, or other entity,
    the address shall be the principal place of business in the county in which the
    residential premises are situated or if there is no place of business in such
    county then its principal place of business in this state, and shall include the
    name of the person in charge thereof.


    (B) If the rental agreement is oral, the park operator, at the commencement of
    the term of occupancy, shall deliver to the resident a written notice containing
    the information required in division (A) of this section.


    (C) If the park operator fails to provide the notice of the name and address of
    the owner and owner''s agent, if any, as required under division (A) or (B) of
    this section, the notices to the park operator required under division (A) of
    sections


    4781.41


    and


    4781.42


    of the Revised Code are waived by the park operator and the operator''s agent.


    (D) Every written rental agreement for residential premises shall contain the
    following notice in ten-point boldface type:


    "YOUR RIGHTS AS A RESIDENT AND YOUR MANUFACTURED HOME PARK OPERATOR''S RIGHTS
    ARE PROTECTED BY SECTIONS


    4781.36


    TO


    4781.52


    OF THE REVISED CODE, WHICH REGULATE RENTAL AGREEMENTS IN MANUFACTURED HOME PARKS."


    If the rental agreement is oral, the park operator, at the commencement of the
    term of occupancy, shall deliver the notice to the resident in writing.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: d67a7f07c674275c2c97b731ed43be85233f4f4a3a061a6bdca8e8db89e65c55
