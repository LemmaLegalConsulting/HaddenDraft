- section: '5301.03'
  title: Grantee as trustee or agent.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.03/10-1-1953/5301.03-10-1-1953.pdf
  text: '"Trustees," "as trustee," or "agent," or words of similar import, following
    the name grantee in any deed of conveyance or mortgage of land executed and recorded,
    without other language showing a trust or expressly limiting the grantee''s or
    mortgagee''s powers, or for whose benefit the same is made, or other recorded
    instrument showing such trust and its terms, do not give notice to or put upon
    inquiry any person dealing with said land that a trust or agency exists, or that
    there are beneficiaries of said conveyance or mortgage other than the grantee
    and those persons disclosed by the record, or that there are any limitations on
    the power of the grantee to convey or mortgage said land, or to assign or release
    any mortgage held by such grantee. As to all subsequent bona fide purchasers,
    mortgagees, lessees, and assignees for value, a conveyance, mortgage, assignment,
    or release of mortgage by such grantee, whether or not his name is followed by
    "trustee," "as trustee," "agent," or words of similar import, conveys a title
    or lien free from the claims of any undisclosed beneficiaries, and free from any
    obligation on the part of any purchaser, mortgagee, lessee, or assignee to see
    to the application of any purchase money. This section does not apply to suits
    brought prior to July 16, 1927, in which any such deeds of conveyance, leases,
    or mortgages are called in question, or in which the rights of any beneficiaries
    in the lands described therein are involved. This section does not prevent the
    original grantor, trustor, undisclosed beneficiary, or anyone claiming under them,
    from bringing suits other than suits affecting land which is the subject of such
    conveyance or mortgage.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 5af265790c97afdcc2297a34ce6623bff9883566ab2c9317842a194f92ebc21d
