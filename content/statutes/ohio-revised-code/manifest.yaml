- section: '3767.02'
  title: Nuisance.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.02/1-1-1999/3767.02-1-1-1999.pdf
  text: '(A) Any person, who uses, occupies, establishes, or conducts a nuisance,
    or aids or abets in the use, occupancy, establishment, or conduct of a nuisance;
    the owner, agent, or lessee of an interest in any such nuisance; any person who
    is employed in that nuisance by that owner, agent, or lessee; and any person who
    is in control of that nuisance is guilty of maintaining a nuisance and shall be
    enjoined as provided in sections


    3767.03


    to


    3767.11


    of the Revised Code.


    (B) A criminal gang that uses or occupies any building, premises, or real estate,
    including vacant land, on more than two occasions within a one-year period to
    engage in a pattern of criminal gang activity is guilty of maintaining a nuisance
    and shall be enjoined as provided in sections


    3767.03


    to


    3767.11


    of the Revised Code. As used in this division, "criminal gang" and "pattern of
    criminal gang activity" have the same meanings as in section


    2923.41


    of the Revised Code.'
