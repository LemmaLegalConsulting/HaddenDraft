- section: '2329.154'
  title: Online registration.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.154
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.154/9-28-2016/2329.154-9-28-2016.pdf
  text: '(A) If property is sold online, the sheriff or private selling officer shall
    require persons seeking to bid to register online with the web site as a condition
    of being authorized to bid. The registration form shall include information relevant
    to the objective of enabling the sheriff or private selling officer to identify
    the bidder, contact the bidder, and complete the sale of the property.


    (B) If an attorney or a law firm that represents the plaintiff or a party to the
    action bids on property in a representative capacity, the attorney or law firm
    shall register as the representative of the plaintiff or party, either as an individual
    or entity.


    (C)(1) If the person registering to bid is an individual, the information required
    by division (A) of this section shall include the individual''s name, mailing
    address, which shall not be a post office box address, electronic mail address,
    telephone number, and, if applicable, financial transaction device information.


    (2) If the person registering to bid is an entity, the information required by
    division (A) of this section shall include the entity''s legal name, trade name
    if different from its legal name, state and date of formation, active status with
    the office of the secretary of state, mailing address, telephone number, financial
    transaction device information if applicable, the name of an individual contact
    person for the entity, and the contact person''s title, mailing address, which
    shall not be a post office box address, electronic mail address, and telephone
    number.


    (D) The registration form on the web site shall require the person registering
    to bid to state, to the best of the person''s knowledge and belief, that the information
    provided by the person is true, correct, and complete under penalties of perjury.


    (E) The electronic mail address, telephone number, and, if applicable, financial
    transaction device information required in division (C) of this section are confidential
    and not public records for purposes of section


    149.43


    of the Revised Code.


    (F) As used in this section, "financial transaction device" has the same meaning
    as in section


    301.28


    of the Revised Code.'
