- section: '5313.05'
  title: Default of vendee.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.05
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.05/11-25-1969/5313.05-11-25-1969.pdf
  text: When the vendee of a land installment contract defaults in payment, forfeiture
    of the interest of the vendee under the contract may be enforced only after the
    expiration of thirty days from the date of the default. A vendee in default may,
    prior to the expiration of the thirty-day period, avoid the forfeiture of his
    interest under the contract by making all payments currently due under the contract
    and by paying any fees or charges for which he is liable under the contract. If
    such payments are made within the thirty-day period, forfeiture of the interest
    of the vendee shall not be enforced.
  raw_html_sha256: 7fd3338f24c53a3e8ca29d774ecccf1b158db9f6476737e91addc154f72ab77a
