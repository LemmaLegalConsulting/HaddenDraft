- section: '2716.09'
  title: Modifying and interrupting the processing of an order of garnishment of personal
    earnings.
  url: https://codes.ohio.gov/ohio-revised-code/section-2716.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2716
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2716/2716.09/8-29-2000/2716.09-8-29-2000.pdf
  text: '(A) Except as otherwise provided in this section, a municipal or county court
    or court of common pleas does not have jurisdiction to modify and interrupt the
    processing of an order of garnishment of personal earnings that that court issued
    in a proceeding in garnishment of personal earnings under this chapter unless
    all of the following apply:


    (1) The judgment creditor and the judgment debtor associated with that order jointly
    apply to that court for the modification and interruption.


    (2) That judgment creditor and judgment debtor jointly agree that the amount of
    the judgment debtor''s personal disposable earnings that is required to be withheld
    during each pay period under that court''s order should be modified to a mutually
    agreed upon and specified amount and that the garnishee should withhold that specified
    amount until the judgment in favor of the judgment creditor and the associated
    court costs, judgment interest, and, if applicable, prejudgment interest awarded
    to the judgment creditor have been paid in full or until that court''s order otherwise
    ceases to remain in effect under division (C)(1) of section


    2716.041


    of the Revised Code.


    (3) That court enters an order that approves of the modification described in
    division (A)(2) of this section and causes a copy of that order to be served upon
    the garnishee in the same manner as process is served.


    (B) A judgment creditor or judgment creditor''s attorney may request that the
    clerk of the court that issued an order of garnishment of personal earnings disburse
    the garnishment proceeds on a less frequent basis than is otherwise provided by
    this chapter. Upon receiving the request, the clerk may elect to disburse the
    garnishment proceeds on a time schedule other than that as provided by this chapter.'
