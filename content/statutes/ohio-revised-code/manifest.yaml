- section: '1923.062'
  title: Stay or adjustment of obligation for tenant on active duty.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.062
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.062/5-18-2005/1923.062-5-18-2005.pdf
  text: '(A) In an action under this chapter for possession of residential premises
    of a tenant or manufactured home park resident who is deployed on active duty
    or of any member of the tenant''s or resident''s immediate family, if the tenant
    or resident entered into the rental agreement on or after the effective date of
    this section, the court may, on its own motion, and shall, upon motion made by
    or on behalf of the tenant or resident, do either of the following if the tenant''s
    or resident''s ability to pay the agreed rent is materially affected by the deployment
    on active duty:


    (1) Stay the proceedings for a period of ninety days, unless, in the opinion of
    the court, justice and equity require a longer or shorter period of time;


    (2) Adjust the obligation under the rental agreement to preserve the interest
    of all parties to it.


    (B) If a stay is granted under division (A) of this section, the court may grant
    the landlord or park operator such relief as equity may require.


    (C) This section does not apply to landlords or park operators operating less
    than four residential premises.


    (D) As used in this section, "active duty" means active duty pursuant to an executive
    order of the president of the United States, an act of the congress of the United
    States, or section


    5919.29


    or


    5923.21


    of the Revised Code.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
