- section: '323.29'
  title: Partial payment of delinquent taxes.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.29/10-27-2000/323.29-10-27-2000.pdf
  text: 'The partial payment of delinquent taxes charged on the tax duplicate against
    any entry of real property, as authorized by section


    323.133


    or


    323.31


    of the Revised Code, shall not prevent such real property from being certified
    as delinquent; however, partial payment of such taxes under section


    323.133


    of the Revised Code shall preclude the commencement of foreclosure proceedings
    unless the tax commissioner subsequently certifies to the county auditor that
    partial payment under such section is no longer authorized. Partial payment of
    delinquent taxes in accordance with the terms of a delinquent tax contract under
    section


    323.31


    of the Revised Code shall preclude the commencement of foreclosure proceedings
    unless the county treasurer subsequently certifies to the county auditor that
    the delinquent tax contract has become void.'
