- section: '2737.17'
  title: Officer may use any lawful means to enter any building or enclosure.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.17/8-26-1982/2737.17-8-26-1982.pdf
  text: Unless the order of possession directed to the levying officer specifies otherwise,
    the levying officer, in the execution of the order, may use any lawful means to
    enter any building or enclosure, other than an occupied dwelling unit, in which
    the property described in the order, or any part of it, is contained, if reasonable
    efforts to obtain voluntary admittance have failed. If the officer enters the
    building or enclosure to take possession of the property described in the order
    without first obtaining permission to enter, he shall file with the court on the
    next business day an affidavit setting forth the circumstances of his entry and
    the reasons he was unable to obtain voluntary admittance.
