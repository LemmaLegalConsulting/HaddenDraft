- section: '1322.02'
  title: Rules amending definitions of mortgage broker, lender, or originator; rules
    amending criteria for letters of exemption.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.02/9-1-2021/1322.02-9-1-2021.pdf
  text: 'The superintendent of financial institutions may, by rule, amend the definition
    of mortgage loan originator, mortgage broker, mortgage lender, mortgage servicer,
    or any other definition in section


    1322.01


    of the Revised Code, or the criteria for an entity to obtain a letter of exemption,
    or a registration or license, under this chapter, if the superintendent finds
    that the change is necessary to remain consistent with the purposes intended by
    the policy and provisions of the "Secure and Fair Enforcement for Mortgage Licensing
    Act of 2008," 122 Stat. 2810, 12 U.S.C. 5101.


    Rules authorized by this section shall be adopted in accordance with Chapter 119.
    of the Revised Code.'
