- section: '1349.29'
  title: Right to rescind.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.29/5-24-2002/1349.29-5-24-2002.pdf
  text: 'If a covered loan transaction includes any term prohibited by section


    1349.27


    of the Revised Code, the consumer shall have the right to rescind the transaction
    in accordance with section 129(j) of the "Home Ownership and Equity Protection
    Act of 1994," 108 Stat. 2190, 15 U.S.C.A. 1639(j), as amended, and the regulations
    adopted thereunder by the federal reserve board, as amended.'
