- section: '1923.15'
  title: Inspection of residential premises - order to correct conditions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.15
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.15/9-10-2012/1923.15-9-10-2012.pdf
  text: 'During any proceeding involving residential premises under this chapter,
    the court may order an appropriate governmental agency to inspect the residential
    premises. If the agency determines and the court finds conditions which constitute
    a violation of section


    4781.38


    or


    5321.04


    of the Revised Code, and if the premises have been vacated or are to be restored
    to the landlord, the court may issue an order forbidding the re-rental of the
    property until such conditions are corrected. If the agency determines and the
    court finds such conditions, and if the court finds that the tenant or manufactured
    home park resident may remain in possession, the court may order such conditions
    corrected. If such conditions have been caused by the tenant or resident, the
    court may award damages to the landlord equal to the reasonable cost of correcting
    such conditions.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
