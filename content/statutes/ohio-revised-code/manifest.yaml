- section: '5303.30'
  title: Income - payment of taxes and expenses.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.30/10-1-1953/5303.30-10-1-1953.pdf
  text: 'The net income accruing from a sale of an estate described in section


    5303.21


    of the Revised Code shall be paid to the person who would be entitled to the use
    or income of the estate were it unsold. Taxes and the expenses of the investment
    and management of the fund shall be paid by the person entitled to the income
    thereof.'
