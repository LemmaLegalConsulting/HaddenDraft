- section: '3767.10'
  title: Lease void if building used for lewd purposes.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.10/10-1-1953/3767.10-10-1-1953.pdf
  text: If a tenant or occupant of a building or tenement, under a lawful title, uses
    such place for the purposes of lewdness, assignation, or prostitution, such use
    makes void the lease or other title under which he holds, at the option of the
    owner, and, without any act of the owner, causes the right of possession to revert
    and vest in such owner, who may without process of law make immediate entry upon
    the premises.
