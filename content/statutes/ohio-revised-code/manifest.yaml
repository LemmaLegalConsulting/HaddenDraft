- section: '4112.12'
  title: Commission on African-Americans.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.12/1-1-2025/4112.12-1-1-2025.pdf
  text: '(A) There is hereby created the commission on African-Americans, which shall
    consist of not more than fourteen members as follows: the directors or their designees
    of the departments of health, development, mental health and addiction services,
    children and youth, and job and family services; the chancellor of higher education
    or the chancellor''s designee; the director of education and workforce; two members
    of the house of representatives appointed by the speaker of the house of representatives
    each of whom shall be members of different political parties; and two members
    of the senate appointed by the president of the senate each of whom shall be members
    of different political parties. The members who are members of the general assembly
    shall be nonvoting members. The Ohio state university Bell national resource center,
    in consultation with the governor, shall appoint two members from the private
    corporate sector or the nonprofit sector, and one member with experience in the
    philanthropic community.


    (B) Terms of office shall be for three years, except that members of the general
    assembly appointed to the commission shall be members only so long as they are
    members of the general assembly. Each term ends on the same day of the same month
    as did the term that it succeeds. Each member shall hold office from the date
    of appointment until the end of the term for which the member was appointed. Members
    may be reappointed. Vacancies shall be filled in the manner provided for original
    appointments. Any member appointed to fill a vacancy occurring prior to the expiration
    date of the term for which the member''s predecessor was appointed shall hold
    office as a member for the remainder of that term. A member shall continue in
    office subsequent to the expiration date of the member''s term until the member''s
    successor takes office or until a period of sixty days has elapsed, whichever
    occurs first.


    The commission annually shall elect a chairperson from among its members.


    (C) Members of the commission and members of subcommittees appointed under division
    (B) of section


    4112.13


    of the Revised Code shall not be compensated, but shall be reimbursed for their
    necessary and actual expenses incurred in the performance of their official duties.


    (D) The Ohio state university Bell national resource center, in consultation with
    the governor, shall appoint an executive director of the commission on African-Americans,
    who shall be in the unclassified civil service. The executive director shall supervise
    the commission''s activities and report to the commission and to the Ohio state
    university Bell national resource center on the progress of those activities.
    The executive director shall do all things necessary for the efficient and effective
    implementation of the duties of the commission.


    The responsibilities assigned to the executive director do not relieve the members
    of the commission from final responsibility for the proper performance of the
    requirements of this division.


    (E) The commission on African-Americans shall do all of the following:


    (1) Employ, promote, supervise, and remove all employees, as needed, in connection
    with the performance of its duties under this section;


    (2) Maintain its office at the Ohio state university Bell national resource center;


    (3) Acquire facilities, equipment, and supplies necessary to house the commission,
    its employees, and files and records under its control, and to discharge any duty
    imposed upon it by law. The expense of these acquisitions shall be audited and
    paid for in the same manner as other state expenses.


    (4) Establish the overall policy and management of the commission in accordance
    with this chapter;


    (5) Follow all state procurement requirements;


    (6) Implement the policies and plans of the Ohio state university Bell national
    resource center as those policies and plans are formulated and adopted by the
    center;


    (7) Report to the Ohio state university Bell national resource center on the progress
    of the commission on African-Americans in implementing the policies and plans
    of the center.


    (F) The commission on African-Americans may:


    (1) Hold sessions at any place within the state, except that the commission shall
    meet at least quarterly;


    (2) Establish, change, or abolish positions, and assign and reassign duties and
    responsibilities of any employee of the commission as necessary to achieve the
    most efficient performance of its functions.


    (G) The Ohio state university Bell national resource center shall establish the
    overall policy and management of the commission on African-Americans and shall
    direct, manage, and oversee the commission. The center shall develop overall policies
    and plans, and the commission shall implement those policies and plans. The commission,
    through its executive director, shall keep the center informed as to the activities
    of the commission in such manner and at such times as the center shall determine.


    The Ohio state university Bell national resource center may prescribe duties and
    responsibilities of the commission in addition to those prescribed in section


    4112.13


    of the Revised Code.


    (H) The Ohio state university Bell national resource center annually shall contract
    for a report on the status of African Americans in this state. Issues to be evaluated
    in the report shall include the criminal justice system, education, employment,
    health care, and housing, and such other issues as the center may specify. The
    report shall include policy recommendations relating to the issues covered in
    the report.'
