- section: '5301.072'
  title: Deed restrictions prohibiting placement of flag unenforceable.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.072
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.072/3-21-2017/5301.072-3-21-2017.pdf
  text: '(A) No covenant, condition, or restriction set forth in a deed, and no rule,
    regulation, bylaw, or other governing document or agreement of a homeowners, neighborhood,
    civic, or other association, shall prohibit or be construed to prohibit any of
    the following:


    (1) The placement on any property of a flagpole that is to be used for the purpose
    of displaying the flag of the United States, the flag of the state as defined
    in section


    5.01


    of the Revised Code, or the national league of families POW/MIA flag provided
    the flag and flag pole shall be of an appropriate size, consistent with the size
    and character of the buildings that are subject to the requirements or agreements
    of a homeowner, neighborhood, civic, or other association;


    (2) The display on any property of the flag of the United States or the national
    league of families POW/MIA flag if the flag is displayed in accordance with any
    of the following:


    (a) The patriotic customs set forth in 4 U.S.C. 5-10, and 36 U.S.C. 902 governing
    the display and use of the flag;


    (b) The consent of the property''s owner or of any person having lawful control
    of the property;


    (c) The recommended flagpole standards set forth in "Our Flag," published pursuant
    to S.C.R. 61 of the 105th Congress, 1st Session (1998);


    (d) Any federal law, proclamation of the president of the United States or the
    governor, section of the Revised Code, or local ordinance or resolution.


    (3) The display on any property of the state flag as defined in section


    5.01


    of the Revised Code if the flag is displayed in accordance with any of the following:


    (a) The consent of the property''s owner or of any person having lawful control
    of the property;


    (b) Any state law, local ordinance or resolution, or proclamation by the governor
    of the state.


    (4) The display of a service flag approved by the United States secretary of defense
    for display in a window of the residence of a member of the immediate family of
    an individual serving in the armed forces of the United States. A service flag
    includes a blue star banner, a gold star banner, and any other flag the secretary
    of defense designates as a service flag.


    (B) A covenant, condition, restriction, rule, regulation, bylaw, governing document,
    or agreement or a construction of any of these items that violates division (A)
    of this section is against public policy and unenforceable in any court of this
    state to the extent it violates that division.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
