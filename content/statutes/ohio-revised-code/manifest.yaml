- section: '5301.83'
  title: Copies of environmental covenant to be provided.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.83
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.83/12-30-2004/5301.83-12-30-2004.pdf
  text: '(A) A copy of an environmental covenant shall be provided to all of the following
    in a manner required by the applicable agency:


    (1) Each person that signed the environmental covenant;


    (2) Each person holding a recorded interest in the real property that is subject
    to the environmental covenant;


    (3) Each person in possession of the real property that is subject to the environmental
    covenant;


    (4) Each unit of local government in which the real property that is subject to
    the environmental covenant is located;


    (5) Any other person that the agency requires.


    (B) The validity of an environmental covenant is not affected by failure to provide
    a copy of the environmental covenant as required under this section.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
