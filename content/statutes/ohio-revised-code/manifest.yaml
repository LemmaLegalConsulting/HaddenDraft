- section: '2715.10'
  title: Property may be delivered to persons with whom found.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.10/3-13-1986/2715.10-3-13-1986.pdf
  text: 'The levying officer shall deliver the property attached under section


    2715.09


    of the Revised Code to the person in whose possession it was found, upon the person''s
    executing a bond to the plaintiff, with sufficient surety, to the effect that
    the parties to it are bound in the same amount as the bond filed by the plaintiff
    under section


    2715.044


    of the Revised Code, or if the plaintiff has not filed such a bond, in double
    the appraised value of the property, and to the effect that the property or its
    appraised value in money will be forthcoming to answer the judgment of the court
    in the action. If it appears to the court that any part of such property has been
    lost or destroyed by unavoidable accident, the appraised value of the property
    shall be remitted to the plaintiff if judgment is rendered in his favor.


    If the person is indigent, the court may, upon motion of the person or upon its
    own motion, waive the bond required by this section or set bond in a lower amount,
    as fairness requires.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: c30f78f7330b25406de74c74f74ad8a264027a3634a706d36fa4c66974d1e99e
