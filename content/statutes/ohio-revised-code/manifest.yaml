- section: '5301.51'
  title: Preservation of interest in land.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.51
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.51/5-31-1988/5301.51-5-31-1988.pdf
  text: '(A) Any person claiming an interest in land may preserve and keep effective
    the interest by filing for record during the forty-year period immediately following
    the effective date of the root of title of the person whose record title would
    otherwise be marketable, a notice in compliance with section


    5301.52


    of the Revised Code. No disability or lack of knowledge of any kind on the part
    of anyone suspends the running of the forty-year period. The notice may be filed
    for record by the claimant or by any other person acting on behalf of any claimant
    who is:


    (1) Under a disability;


    (2) Unable to assert a claim on his own behalf; or


    (3) One of a class, but whose identity cannot be established or is uncertain at
    the time of filing the notice of claim for record.


    (B) If the same record owner of any possessory interest in land has been in possession
    of the land continuously for a period of forty years or more, during which period
    no title transaction with respect to such interest appears of record in his chain
    of title, and no notice has been filed by him on his behalf as provided in division
    (A) of this section, and such possession continues to the time when marketability
    is being determined, the period of possession is equivalent to the filing of the
    notice immediately preceding the termination of the forty-year period described
    in division (A) of this section.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: b3416bc84133ad24ac6925cae05ba49cb56900725746cef74066d0f4d2d02467
  effective_date: May 31, 1988
