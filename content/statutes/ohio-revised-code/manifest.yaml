- section: '2715.52'
  title: Action to be dismissed if attachment refused.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.52
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.52/10-1-1953/2715.52-10-1-1953.pdf
  text: 'If the court or judge refuses to grant an order of attachment under section


    2715.50


