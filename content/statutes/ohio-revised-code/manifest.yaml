- section: '3767.03'
  title: Abatement of nuisance - bond.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.03/9-20-1999/3767.03-9-20-1999.pdf
  text: 'Whenever a nuisance exists, the attorney general; the village solicitor,
    city director of law, or other similar chief legal officer of the municipal corporation
    in which the nuisance exists; the prosecuting attorney of the county in which
    the nuisance exists; the law director of a township that has adopted a limited
    home rule government under Chapter 504. of the Revised Code; or any person who
    is a citizen of the county in which the nuisance exists may bring an action in
    equity in the name of the state, upon the relation of the attorney general; the
    village solicitor, city director of law, or other similar chief legal officer
    of the municipal corporation; the prosecuting attorney; the township law director;
    or the person, to abate the nuisance and to perpetually enjoin the person maintaining
    the nuisance from further maintaining it. If an action is instituted under this
    section by a person other than the prosecuting attorney; the village solicitor,
    city director of law, or other similar chief legal officer of the municipal corporation;
    the attorney general; or the township law director, the complainant shall execute
    a bond in the sum of not less than five hundred dollars, to the defendant, with
    good and sufficient surety to be approved by the court or clerk of the court,
    to secure to the defendant any damages the defendant may sustain and the reasonable
    attorney''s fees the defendant may incur in defending the action if the action
    is wrongfully brought, not prosecuted to final judgment, is dismissed, or is not
    maintained, or if it is finally decided that an injunction should not have been
    granted. If it is finally decided that an injunction should not have been granted
    or if the action was wrongfully brought, not prosecuted to final judgment, dismissed,
    or not maintained, the defendant shall have recourse against the bond for all
    damages suffered, including damages to the defendant''s property, person, or character,
    and for the reasonable attorney''s fees incurred by the defendant in defending
    the action.


    Any agency, officer, or other person bringing an action under this section against
    the holder of a liquor permit issued under Chapter 4303. of the Revised Code shall
    notify the division of liquor control, the liquor control commission, and the
    liquor enforcement division of the department of public safety regarding the action
    at the time of bringing the action.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
