- section: '1345.31'
  title: Failing to comply with refund obligations.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.31
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.31/10-31-1996/1345.31-10-31-1996.pdf
  text: 'The failure of a hearing aid dealer, hearing aid fitter, physician, or audiologist
    to comply with section


    1345.30


    of the Revised Code is an unfair or deceptive act or practice in violation of
    section


    1345.02


    of the Revised Code. All powers and remedies available to the attorney general
    to enforce sections


    1345.01


    to


    1345.13


    of the Revised Code as regards an unfair or deceptive act or practice are available
    to the attorney general to enforce section


    1345.30


    of the Revised Code, and all remedies available to consumers under section


    1345.09


    of the Revised Code to remedy violations of section


    1345.02


    of the Revised Code are available to consumers to remedy failure to comply with
    section


    1345.30


    of the Revised Code.'
