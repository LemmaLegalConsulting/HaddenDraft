- section: '2737.02'
  title: Pre-judgment recovery of personal property.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.02/8-26-1982/2737.02-8-26-1982.pdf
  text: 'The possession of specific personal property may be recovered in a civil
    action prior to the entry of judgment, only as provided in sections


    2737.01


    to


    2737.20


    of the Revised Code.'
