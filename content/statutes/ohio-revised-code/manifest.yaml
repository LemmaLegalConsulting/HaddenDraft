- section: '1345.66'
  title: Remedies.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.66
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.66/3-28-1985/1345.66-3-28-1985.pdf
  text: '(A) Any customer who is injured by a violation of sections


    1345.61


    to


    1345.67


    of the Revised Code has an action at law as provided by this section.


    (B) A customer has a cause of action pursuant to this division to remedy any injury
    caused by the invention developer arising from:


    (1) A violation of sections


    1345.61


    to


    1345.67


    of the Revised Code, or


    (2) The customer''s acceptance of the invention development services contract
    in reliance upon any fraudulent misrepresentation or omission of material fact.'
