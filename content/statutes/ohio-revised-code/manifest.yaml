- section: '5301.38'
  title: Record of patents, copies, and exemplifications.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.38
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.38/10-1-1953/5301.38-10-1-1953.pdf
  text: 'Patents for lands lying within this state, granted to any person by the president
    of the United States, and copies of such patents, certified under the official
    seal of the commissioner of the general land office of the United States, and
    exemplifications of the record of the general land office of any patent recorded
    there, may be recorded in the office of the county recorder of the county in which
    such lands, or a part thereof, are situated.


    The recorder shall be paid the fees for recording such patents as provided in
    section


    317.32


    of the Revised Code for recording deeds.'
