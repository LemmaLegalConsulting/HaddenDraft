- section: '1923.04'
  title: Notice - service.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.04/10-18-2007/1923.04-10-18-2007.pdf
  text: '(A) Except as provided in division (B) or (C) of this section, a party desiring
    to commence an action under this chapter shall notify the adverse party to leave
    the premises, for the possession of which the action is about to be brought, three
    or more days before beginning the action, by certified mail, return receipt requested,
    or by handing a written copy of the notice to the defendant in person, or by leaving
    it at the defendant''s usual place of abode or at the premises from which the
    defendant is sought to be evicted.


    Every notice given under this section by a landlord to recover residential premises
    shall contain the following language printed or written in a conspicuous manner:
    "You are being asked to leave the premises. If you do not leave, an eviction action
    may be initiated against you. If you are in doubt regarding your legal rights
    and obligations as a tenant, it is recommended that you seek legal assistance."


    (B) The service of notice pursuant to section


    5313.06


    of the Revised Code constitutes compliance with the notice requirement of division
    (A) of this section. The service of the notice required by division (C) of section


    5321.17


    of the Revised Code constitutes compliance with the notice requirement of division
    (A) of this section.


    (C) If the adverse party in an action under this chapter is a deceased resident
    of a manufactured home park, the notice required by division (A) of this section
    shall be left at the premises from which the defendant is sought to be evicted
    and also shall be sent by ordinary mail to the following persons if their names
    and addresses are known to the park operator:


    (1) If a probate court has granted letters testamentary or of administration for
    the estate of the adverse party in accordance with Title XXI of the Revised Code,
    the executor or administrator appointed by the probate court;


    (2) The deceased resident''s spouse and any other members of the deceased resident''s
    immediate family.'
