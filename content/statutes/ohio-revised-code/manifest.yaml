- section: '1345.62'
  title: Invention development services contracts.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.62
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.62/3-28-1985/1345.62-3-28-1985.pdf
  text: '(A) Every contract for invention development services shall be in writing
    and is subject to sections


    1345.61


    to


    1345.68


    of the Revised Code. The invention developer shall give a copy of the written
    contract to the customer at the time the customer signs the contract.


    (B) The invention developer shall provide in writing a description of the services
    to be performed pursuant to each contract. At the time the customer signs the
    contract, it shall state the fees and other consideration, if any, that may be
    required of the customer.


    (C) Any contract for invention development services signed by the invention developer
    and the customer may be revoked by either party prior to the expiration of a four
    working day period commencing on the date on which the customer and the invention
    developer sign the contract.


    (D) The invention developer or the customer may revoke the contract as follows:


    (1) Either the invention developer or the customer may revoke the contract by
    written notice to the other within four working days of the date the contract
    was signed by both. Written notice of revocation is effective upon the date of
    postmarking, if mailed, or upon receipt.


    (2) The invention developer upon revocation shall return to the customer any payment
    made on account of the performance of services specified in the contract and the
    customer shall return all materials and contracts submitted to him by the invention
    developer.'
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
