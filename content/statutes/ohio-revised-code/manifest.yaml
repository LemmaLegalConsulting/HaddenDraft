- section: '5301.14'
  title: Copy of record of lost deed to be evidence.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.14/9-30-2021/5301.14-9-30-2021.pdf
  text: 'When a title deed, recorded by the director of administrative services as
    required by section


    5301.13


    of the Revised Code, or recorded in the office of the secretary of state, the
    record of which is required to be kept in the office of the director of administrative
    services, has been lost or destroyed by accident, without having been recorded
    in the county recorder''s office, on demand and tender of the fees therefor, the
    director of administrative services shall furnish to any person a copy of such
    deed certified under the director of administrative services'' official seal,
    which copy shall be received everywhere in this state as prima-facie evidence
    of the existence of the deed, and in all respects shall have the effect of certified
    copies from the official records of the county where such lands are situated.'
