- section: '2308.031'
  title: Use of plywood prohibited.
  url: https://codes.ohio.gov/ohio-revised-code/section-2308.031
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2308
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2308/2308.031/4-6-2017/2308.031-4-6-2017.pdf
  text: '(A) No person shall use plywood to secure real property that is deemed vacant
    and abandoned under section


    2308.02


    of the Revised Code.


    (B) Division (A) of this section shall not apply to any person that uses plywood
    to secure real property that is deemed vacant and abandoned under section


    2308.02


    of the Revised Code prior to the effective date of this section .'
