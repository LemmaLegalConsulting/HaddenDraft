- section: '2329.06'
  title: Lien of a judgment when action removed to supreme court.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.06/10-1-1953/2329.06-10-1-1953.pdf
  text: 'When a certificate is filed as provided in section


    2329.02


    of the Revised Code, the lien of a judgment of the court of common pleas in an
    action which is appealed by the judgment debtor to the court of appeals and thence
    removed into the supreme court shall not thereby be divested or vacated, but shall
    be continued until the final determination of the action in the supreme court.'
