- section: '5321.07'
  title: Failure of landlord to fulfill obligations - remedies of tenant.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.07
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.07/10-12-1994/5321.07-10-12-1994.pdf
  text: '(A) If a landlord fails to fulfill any obligation imposed upon him by section


    5321.04


    of the Revised Code, other than the obligation specified in division (A)(9) of
    that section, or any obligation imposed upon him by the rental agreement, if the
    conditions of the residential premises are such that the tenant reasonably believes
    that a landlord has failed to fulfill any such obligations, or if a governmental
    agency has found that the premises are not in compliance with building, housing,
    health, or safety codes that apply to any condition of the premises that could
    materially affect the health and safety of an occupant, the tenant may give notice
    in writing to the landlord, specifying the acts, omissions, or code violations
    that constitute noncompliance. The notice shall be sent to the person or place
    where rent is normally paid.


    (B) If a landlord receives the notice described in division (A) of this section
    and after receipt of the notice fails to remedy the condition within a reasonable
    time considering the severity of the condition and the time necessary to remedy
    it, or within thirty days, whichever is sooner, and if the tenant is current in
    rent payments due under the rental agreement, the tenant may do one of the following:


    (1) Deposit all rent that is due and thereafter becomes due the landlord with
    the clerk of the municipal or county court having jurisdiction in the territory
    in which the residential premises are located;


    (2) Apply to the court for an order directing the landlord to remedy the condition.
    As part of the application, the tenant may deposit rent pursuant to division (B)(1)
    of this section, may apply for an order reducing the periodic rent due the landlord
    until the landlord remedies the condition, and may apply for an order to use the
    rent deposited to remedy the condition. In any order issued pursuant to this division,
    the court may require the tenant to deposit rent with the clerk of court as provided
    in division (B)(1) of this section.


    (3) Terminate the rental agreement.


    (C) This section does not apply to any landlord who is a party to rental agreements
    that cover three or fewer dwelling units and who provides notice of that fact
    in a written rental agreement or, in the case of an oral tenancy, delivers written
    notice of that fact to the tenant at the time of initial occupancy by the tenant.


    (D) This section does not apply to a dwelling unit occupied by a student tenant.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
