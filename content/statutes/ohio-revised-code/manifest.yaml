- section: '5303.31'
  title: Estates may be leased.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.31
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.31/10-14-1983/5303.31-10-14-1983.pdf
  text: '(A) Upon like proceedings as for the sale of an estate described in section


    5303.21


    of the Revised Code, but subject to division (B) of this section, the court of
    common pleas may direct that such estate be leased for a term of years, renewable
    or otherwise, with or without an option on the part of the lessee to purchase
    the estate leased, as appears most beneficial, and on such terms as appear just
    and equitable. The rents and profits shall be paid to the person who might otherwise
    be entitled to the use and occupancy of the estate or the income of it.


    (B) If an estate is held in trust and if the trustee is authorized by the trust
    instrument of lease real property, a court of common pleas shall not direct pursuant
    to division (A) of this section that the estate be leased unless the trustee consents
    to the lease.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
