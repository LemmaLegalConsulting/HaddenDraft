- section: '5721.27'
  title: Erroneous charge of taxes.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.27/9-21-1982/5721.27-9-21-1982.pdf
  text: When any tract of land, or city or town lot is returned delinquent for nonpayment
    of taxes or assessments, and placed on the duplicate of the succeeding year, and
    the owner or person liable to pay the taxes produces the receipt of the county
    treasurer for such taxes and assessments of the preceding year, the county auditor
    or treasurer shall not make the deduction from the duplicate, of such taxes, assessments,
    interest, and penalty but it shall be chargeable to the treasurer as if such receipt
    had not been produced. The treasurer shall receive such receipt in discharge of
    the tax or assessment for the year it is returned delinquent, with the penalty;
    and the auditor shall credit such treasurer with the amount and shall forthwith
    collect such taxes.
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
