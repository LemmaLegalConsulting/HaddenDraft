- section: '2715.31'
  title: Attachment of garnishee for contempt.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.31
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.31/8-26-1982/2715.31-8-26-1982.pdf
  text: 'If a garnishee under this chapter fails to appear in court and answer, as
    required by section


    2715.29


    of the Revised Code, the court may proceed against him for a contempt.'
