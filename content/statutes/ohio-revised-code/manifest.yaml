- section: '323.45'
  title: Lien for taxes paid by lienholder.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.45
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.45/9-21-1982/323.45-9-21-1982.pdf
  text: A person having a lien upon real estate may pay the taxes which are a lien
    thereon, and the amount paid shall be a lien upon such real estate from the time
    of payment in preference to all other liens. The money paid may be recovered from
    the person liable for the payment of the taxes.
