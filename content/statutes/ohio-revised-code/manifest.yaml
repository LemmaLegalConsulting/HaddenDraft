- section: '1309.602'
  title: Waiver and variance of rights and duties - UCC 9-602.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.602
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.602/7-1-2001/1309.602-7-1-2001.pdf
  text: 'Except as otherwise provided in section


    1309.624


    of the Revised Code, to the extent that they give rights to a debtor or obligor
    and impose duties on a secured party, the debtor or obligor may not waive or vary
    the following provisions of the Revised Code;


    (A) Division (B)(4)(c) of section


    1309.207


    of the Revised Code, which relates to the use and operation of the collateral
    by the secured party;


    (B) Section


    1309.210


    of the Revised Code, which relates to requests for an accounting and requests
    concerning a list of collateral and statement of account;


    (C) Division (C) of section


    1309.607


    of the Revised Code, which relates to the collection and enforcement of collateral;


    (D) Division (A) of section


    1309.608


    and division (C) of section


    1309.615


    of the Revised Code to the extent that they relate to the application or payment
    of noncash proceeds of collection, enforcement, or disposition;


    (E) Division (A) of section


    1309.608


    and division (D) of section


    1309.615


    of the Revised Code to the extent that they require accounting for or payment
    of surplus proceeds of collateral;


    (F) Section


    1309.609


    of the Revised Code to the extent that it imposes upon a secured party who takes
    possession of collateral without judicial process the duty to do so without breach
    of the peace;


    (G) Division (B) of section


    1309.610


    and sections


    1309.611


    ,


    1309.613


    , and


    1309.614


    of the Revised Code, which relate to the disposition of collateral;


    (H) Division (F) of section


    1309.615


    , which relates to the calculation of a deficiency or surplus when a disposition
    is made to the secured party, a person related to the secured party, or a secondary
    obligor;


    (I) Section


    1309.616


    of the Revised Code, which relates to the explanation of the calculation of a
    surplus or deficiency;


    (J) Sections


    1309.620


    ,


    1309.621


    , and


    1309.622


    of the Revised Code, which relate to the acceptance of collateral in satisfaction
    of obligation;


    (K) Section


    1309.623


    of the Revised Code, which relates to redemption of collateral;


    (L) Section


    1309.624


    of the Revised Code, which relates to permissible waivers; and


    (M) Sections


    1309.625


    and


    1309.626


    of the Revised Code, which relate to the secured party''s liability for failure
    to comply with this chapter.'
