- section: '323.74'
  title: Disposition of abandoned land not sold at auction.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.74
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.74/4-9-2025/323.74-4-9-2025.pdf
  text: '(A) If a public auction is held for abandoned land pursuant to section


    323.73


    of the Revised Code, but the land is not sold at the public auction, the county
    board of revision may order the disposition of the abandoned land in accordance
    with division (B) or (C) of this section.


    (B) The abandoned land offered for sale at a public auction as described in section


    323.73


    of the Revised Code, but not sold at the auction, may be offered for sale in any
    usual and customary manner by the sheriff as otherwise provided by law. The subsequent
    public auction may be held in the same manner as the public auction was held under
    section


    323.73


    of the Revised Code, but the minimum bid at an auction held under this division
    shall be the lesser of fifty per cent of fair market value of the abandoned land
    as currently shown by the county auditor''s latest valuation, or the sum of the
    impositions against the abandoned land plus the costs apportioned to the land
    under section


    323.75


    of the Revised Code. Notice of any subsequent sale pursuant to this section may
    be given in the original notice of sale listing the time, date, and place of the
    subsequent sale.


    (C) Upon certification from the sheriff that abandoned land was offered for sale
    at a public auction as described in section


    323.73


    of the Revised Code but was not purchased, a community development organization
    or any school district, municipal corporation, county, or township in which the
    land is located may request that title to the land be transferred to the community
    development organization, school district, municipal corporation, county, or township
    at the time described in this division. The request shall be delivered to the
    board of revision at any time from the date the complaint for foreclosure is filed
    under section


    323.69


    of the Revised Code, but not later than sixty days after the date on which the
    land was first offered for sale. The request shall include a representation that
    the organization, district, or political subdivision, not later than thirty days
    after receiving legal title to the abandoned land, will begin basic exterior improvements
    that will protect the land from further unreasonable deterioration. The improvements
    shall include, but are not limited to, the removal of trash and refuse from the
    exterior of the premises and the securing of open, vacant, or vandalized areas
    on the exterior of the premises. The representation shall be deemed to have been
    given if the notice is supplied by an electing subdivision as defined in section


    5722.01


    of the Revised Code.


    (D) The county board of revision, upon any adjudication of foreclosure and forfeiture
    against the abandoned land, may order the sheriff to dispose of the abandoned
    land as prescribed in sections


    323.65


    to


    323.79


    of the Revised Code. The order by the board shall include instructions to the
    sheriff to transfer the land to the specified community development organization,
    school district, municipal corporation, county, or township after payment of the
    costs of disposing of the abandoned land pursuant to section


    323.75


    of the Revised Code or, if any negotiated price has been agreed to between the
    county treasurer and the community development organization, school district,
    municipal corporation, county, or township, after payment of that negotiated price
    as certified by the board to the sheriff.


    (E) Subject to division (H) of this section, upon receipt of payment under this
    section, the sheriff shall convey by sheriff''s deed the fee simple interest in,
    and to, the abandoned land. If the abandoned land is transferred pursuant to division
    (D) of this section and the county treasurer reasonably determines that the transfer
    will result in the property being occupied, the county treasurer may waive, but
    is not required to waive, some or all of the impositions against the abandoned
    land or costs apportioned to the land under section


    323.75


    of the Revised Code.


    (F) Upon a transfer under this section, all liens for taxes due at the time the
    deed of the property is conveyed to a purchaser or transferred to a community
    development organization, school district, municipal corporation, county, or township,
    and liens subordinate to liens for taxes, shall be deemed satisfied and discharged.


    (G) Any parcel that has been advertised and offered for sale pursuant to foreclosure
    proceedings and has not sold for want of bidders or been otherwise transferred
    under sections


    323.65


    to


    323.79


    of the Revised Code shall be forfeited or otherwise disposed of in the same manner
    as lands under section


    323.25


    or


    5721.18


    or Chapter 5723. of the Revised Code.


    (H) The sheriff may not convey a sheriff''s deed under division (E) of this section
    unless and until the purchaser furnishes the sheriff with an affidavit and, if
    applicable, supporting documentation as described in division (J) of section


    5721.19


    of the Revised Code. Any person who knowingly makes a false statement in that
    affidavit is guilty of falsification under division (A)(11) of section


    2921.13


    of the Revised Code.'
