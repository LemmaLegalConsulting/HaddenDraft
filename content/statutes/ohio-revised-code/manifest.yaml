- section: '5323.99'
  title: Failure to comply with chapter - penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-5323.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5323/5323.99/9-29-2007/5323.99-9-29-2007.pdf
  text: 'No owner of residential rental property shall fail to comply with the filing
    or updating of information requirements of section


    5323.02


    of the Revised Code or shall fail to satisfy the designation of agent requirement
    or the filing of the appropriate designation of agent document requirement of
    section


    5323.03


    of the Revised Code. The county auditor may impose upon any person who violates
    this section a special assessment on the residential rental property that is the
    subject of the violation that is not less than fifty dollars or more than one
    hundred fifty dollars. Such special assessment may be appealed to the county board
    of revision.'
  raw_html_sha256: cffb181dfb846522548710df2dcb57d35cf3860101f57174224d0cf9cf11745d
