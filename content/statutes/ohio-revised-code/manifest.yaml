- section: '5301.30'
  title: Expiration of mortgage lien - limitation.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.30/7-26-1963/5301.30-7-26-1963.pdf
  text: The record of any mortgage which remains unsatisfied or unreleased of record
    for more than twenty-one years after the date of the mortgage or twenty-one years
    after the stated maturity date of the principal sum, if a stated date of maturity
    is provided in the mortgage, whichever is later, secured as shown in the record
    of such mortgage, does not give notice to or put on inquiry any person dealing
    with the land described in such mortgage that such mortgage debt remains unpaid
    or has been extended or renewed. As to subsequent bona fide purchasers, mortgagees,
    and other persons dealing with such land for value, the lien of such mortgage
    has expired. The mortgage creditor may at any time refile in the county recorder's
    office the mortgage or a sworn copy thereof for record, together with an affidavit
    stating the amount remaining due thereon and the due date thereof, whether or
    not such date has been extended. Subject to the rights of bona fide purchasers,
    mortgagees, and other persons dealing with such land for value, whose rights were
    acquired or vested between such expiration and refiling, such refiling is constructive
    notice of such mortgage only for a period of twenty-one years after such refiling,
    or for twenty-one years after the stated maturity of the debt, whichever is the
    longer period.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
