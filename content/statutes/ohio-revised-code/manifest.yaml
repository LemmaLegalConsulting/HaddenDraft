- section: '5321.09'
  title: Landlord application for release of rent.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.09/8-22-1990/5321.09-8-22-1990.pdf
  text: '(A) A landlord who receives notice that rent due him has been deposited with
    a clerk of a municipal or county court pursuant to section


    5321.07


    of the Revised Code, may do any of the following:


    (1) Apply to the clerk of the court for release of the rent on the ground that
    the condition contained in the notice given pursuant to division (A) of section


    5321.07


    of the Revised Code has been remedied. The clerk shall forthwith release the rent,
    less costs, to the landlord if the tenant gives written notice to the clerk that
    the condition has been remedied.


    (2) Apply to the court for release of the rent on the ground that the tenant did
    not comply with the notice requirement of division (A) of section


    5321.07


    of the Revised Code, or that the tenant was not current in rent payments due under
    the rental agreement at the time the tenant initiated rent deposits with the clerk
    of the court under division (B)(1) of section


    5321.07


    of the Revised Code.


    (3) Apply to the court for release of the rent on the ground that there was no
    violation of any obligation imposed upon the landlord by section


    5321.04


    of the Revised Code, other than the obligation specified in division (A)(9) of
    that section, any obligation imposed upon him by the rental agreement, or any
    obligation imposed upon him by any building, housing, health, or safety code,
    or that the condition contained in the notice given pursuant to division (A) of
    section


    5321.07


    of the Revised Code has been remedied.


    (B) The tenant shall be named as a party to any action filed by the landlord under
    this section, and shall have the right to file an answer and counterclaim, as
    in other civil actions. A trial shall be held within sixty days of the date of
    the filing of the landlord''s complaint, unless, for good cause shown, the court
    continues the period for trial.


    (C) If the court finds that there was no violation of any obligation imposed upon
    the landlord by section


    5321.04


    of the Revised Code, other than the obligation specified in division (A)(9) of
    that section, any obligation imposed upon him by the rental agreement, or any
    obligation imposed upon him by any building, housing, health, or safety code,
    that the condition contained in the notice given pursuant to division (A) of section


    5321.07


    of the Revised Code has been remedied, that the tenant did not comply with the
    notice requirement of division (A) of section


    5321.07


    of the Revised Code, or that the tenant was not current in rent payments at the
    time the tenant initiated rent deposits with the clerk of court under division
    (B)(1) of section


    5321.07


    of the Revised Code, the court shall order the release to the landlord of rent
    on deposit with the clerk, less costs.


    (D) If the court finds that the condition contained in the notice given pursuant
    to division (A) of section


    5321.07


    of the Revised Code was the result of an act or omission of the tenant, or that
    the tenant intentionally acted in bad faith in proceeding under section


    5321.07


    of the Revised Code, the tenant shall be liable for damages caused to the landlord
    and costs, together with reasonable attorney''s fees if the tenant intentionally
    acted in bad faith.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
