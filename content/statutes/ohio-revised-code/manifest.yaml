- section: '2329.312'
  title: Reports by levying officers.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.312
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.312/9-30-2021/2329.312-9-30-2021.pdf
  text: '(A) All levying officers appointed or authorized by a court under this chapter
    to conduct the judicial or execution sale of residential property consisting of
    one to four single-family units shall submit quarterly reports to the attorney
    general. The reports shall include data on each such sale conducted by the officer,
    including data showing whether or not the deadlines required under division (E)
    of section


    2308.02


    , division (B) of section


    2329.17


    , and sections


    2329.30


    and


    2329.31


    of the Revised Code are met.


    (B) The attorney general shall make the information included in the reports described
    in division (A) of this section publicly available.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
