- section: '1345.26'
  title: Right of buyer after cancellation.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.26
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.26/9-20-1974/1345.26-9-20-1974.pdf
  text: 'If, following the cancellation of a home solicitation sale by the buyer,
    the seller fails to return any goods traded in by the buyer, the buyer may elect
    to recover an amount equal to the trade-in allowance stated in the agreement.
    Until division (D) (4) of section


    1345.23


    of the Revised Code has been complied with by the seller, the buyer may retain
    possession of the goods delivered to him by the seller and has a lien on the goods
    in his possession or control for any recovery to which he is entitled.'
