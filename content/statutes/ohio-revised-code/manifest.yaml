- section: '5301.231'
  title: Effective dates of amendments, supplements, modifications or extensions of
    mortgages, or of debt secured by mortgages,.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.231
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.231/1-1-1994/5301.231-1-1-1994.pdf
  text: '(A) All amendments or supplements of mortgages, or modifications or extensions
    of mortgages or of the debt secured by mortgages, that have been executed in the
    manner provided in section


    5301.01


    of the Revised Code shall be recorded in the office of the county recorder of
    the county in which the mortgaged premises are situated and shall take effect
    at the time they are delivered to the recorder for record. Sections


    317.08


    ,


    5301.23


    , and


    5301.231


    of the Revised Code do not affect the enforceability, validity, or legal effect
    of instruments recorded in those mortgage records prior to October 10, 1963.


    (B) An amendment or supplement of a mortgage, or a modification or extension of
    a mortgage or of the debt secured by a mortgage, that is presented for record
    shall contain the then current mailing address of the mortgagee. The omission
    of this address or the inclusion of an incorrect address shall not affect the
    validity of the instrument or render it ineffective for purposes of constructive
    notice.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
