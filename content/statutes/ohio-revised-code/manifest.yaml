- section: '1345.45'
  title: Retaining notice of cancellation.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.45
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.45/7-26-1984/1345.45-7-26-1984.pdf
  text: 'If a buyer cancels a prepaid entertainment contract pursuant to sections


    1345.41


    to


    1345.50


    of the Revised Code, the seller shall retain for the period in which an action
    to enforce the contract could be commenced, the notice of cancellation made pursuant
    to section


    1345.43


    of the Revised Code. If the date of delivery is not indicated or recorded on the
    notice of cancellation, the seller shall record the date of delivery on the notice
    of cancellation.'
