- section: '2329.11'
  title: Order in which officer to make levy.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.11
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.11/10-1-1953/2329.11-10-1-1953.pdf
  text: The officer to whom a writ of execution is delivered shall proceed immediately
    to levy it upon the goods and chattels of the debtor. If no goods and chattels
    can be found, the officer shall indorse on the execution the words "no goods,"
    and forthwith levy it upon the lands and tenements of the debtor which are liable
    to satisfy the judgment.
