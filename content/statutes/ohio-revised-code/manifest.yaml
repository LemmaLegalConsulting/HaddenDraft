- section: '1345.52'
  title: Title defect recision fund.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.52
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.52/3-23-2015/1345.52-3-23-2015.pdf
  text: 'There is hereby created in the state treasury the title defect recision fund.
    The fund shall consist of money collected under section


    4505.09


    of the Revised Code when a motor vehicle dealer is issued a certificate of title,
    money collected under section


    4517.10


    of the Revised Code when the registrar of motor vehicles grants the initial application
    of a person for a license as a motor vehicle dealer or motor vehicle leasing dealer,
    money collected under division (L) of section


    4517.22


    of the Revised Code, money paid to the attorney general by motor vehicle dealers
    under division (A)(2) of section


    4505.181


    of the Revised Code for deposit into the fund, the proceeds of all sales conducted
    and collections obtained by the attorney general under division (E) of that section,
    and any recoveries to the fund obtained by the attorney general in actions filed
    under section


    1345.07


    of the Revised Code for violations of section


    4505.181


    of the Revised Code.


    Money in the fund shall be used solely for maintaining and administering the fund,
    providing restitution or other remedies pursuant to division (E)(1) or (F) of
    section


    4505.181


    of the Revised Code to retail purchasers of motor vehicles who suffer damages
    due to failure of a motor vehicle dealer or person acting on behalf of such a
    dealer to comply with that section, and pursuit of deficiencies in the fund caused
    by the failure of motor vehicle dealers to comply with divisions (A), (B), and
    (G) of that section. The attorney general may adopt rules governing the maintenance
    and administration of the fund.'
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
