- section: '3767.29'
  title: Prohibition against abandoned refrigerators.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.29/6-29-2011/3767.29-6-29-2011.pdf
  text: No person shall abandon, discard, or knowingly permit to remain on premises
    under the person's control, in a place accessible to children, any abandoned or
    discarded icebox, refrigerator, or other airtight or semi-airtight container which
    has a capacity of one and one-half cubic feet or more and an opening of fifty
    square inches or more and which has a door or lid equipped with hinge, latch,
    or other fastening device capable of securing such door or lid, without rendering
    said equipment harmless to human life by removing such hinges, latches, or other
    hardware which may cause a person to be confined therein. This section shall not
    apply to an icebox, refrigerator, or other airtight or semi-airtight container
    located in that part of a building occupied by a dealer, warehouse, or repairer.
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
