- section: '1309.301'
  title: Law governing perfection and priority of security interests - UCC 9-301.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.301
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.301/6-29-2011/1309.301-6-29-2011.pdf
  text: 'Except as otherwise provided in sections


    1309.303


    to


    1309.306


    of the Revised Code, the following rules determine the law governing perfection,
    the effect of perfection or nonperfection, and the priority of a security interest
    in collateral:


    (A) Except as otherwise provided in this section, while a debtor is located in
    a jurisdiction, the local law of that jurisdiction governs perfection, the effect
    of perfection or nonperfection, and the priority of a security interest in collateral.


    (B) While collateral is located in a jurisdiction, the local law of that jurisdiction
    governs perfection, the effect of perfection or nonperfection, and the priority
    of a possessory security interest in that collateral.


    (C) Except as otherwise provided in division (D) of this section, while tangible
    negotiable documents, goods, instruments, money, or tangible chattel paper is
    located in a jurisdiction, the local law of that jurisdiction governs:


    (1) Perfection of a security interest in the goods by filing a fixture filing;


    (2) Perfection of a security interest in timber to be cut; and


    (3) The effect of perfection or nonperfection and the priority of a nonpossessory
    security interest in the collateral.


    (D) The local law of the jurisdiction in which the wellhead or minehead is located
    governs perfection, the effect of perfection or nonperfection, and the priority
    of a security interest in as-extracted collateral.'
  raw_html_sha256: 9ef105a2bfc6e61d2cfb65f4d23945e9c893c8b2c717610863268558dd15f940
