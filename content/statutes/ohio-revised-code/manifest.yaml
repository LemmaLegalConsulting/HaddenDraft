- section: '1349.73'
  title: Penalty for failing to comply with disclosure requirements.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.73
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.73/7-6-2022/1349.73-7-6-2022.pdf
  text: 'If a high-volume third-party seller does not comply with the requirements
    to provide and disclose information under sections


    1349.70


    and


    1349.71


    of the Revised Code, the online marketplace shall, after providing the seller
    with written or electronic notice and an opportunity to provide or disclose such
    information not later than ten days after the issuance of such notice, suspend
    any future sales activity of such seller until the seller complies with such requirements.'
