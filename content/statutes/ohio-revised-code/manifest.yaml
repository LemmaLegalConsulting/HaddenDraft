- section: '5721.02'
  title: Collection of delinquent taxes.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.02/10-27-2000/5721.02-10-27-2000.pdf
  text: 'The office of the county treasurer shall be kept open to receive the payment
    of delinquent real property taxes, from the date of the delivery of the delinquent
    land duplicate provided for in section


    5721.011


    of the Revised Code, until the final publication of the delinquent tax list and
    the delinquent vacant land tax list as provided in section


    5721.03


    of the Revised Code, in order that the name of any taxpayer appearing on either
    list, who prior to seven days before the first publication of that list pays the
    delinquent taxes in full, may be stricken from that list and in order that the
    name of each person appearing on either list, who prior to seven days before the
    publication of that list enters into a delinquent tax contract under section


    323.31


    of the Revised Code to pay the delinquent taxes in installments, may be stricken
    from that list or an asterisk may be entered in the margin next to the person''s
    name. If payment in full is made subsequent to the first publication and prior
    to seven days before the second publication of either list, the name of the taxpayer
    shall be eliminated from the second publication.'
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
