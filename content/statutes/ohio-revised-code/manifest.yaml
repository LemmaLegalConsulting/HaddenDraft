- section: '1345.73'
  title: Presumptions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.73
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.73/9-29-2011/1345.73-9-29-2011.pdf
  text: '(A) Except as provided in division (B) of this section, it shall be presumed
    that a reasonable number of attempts have been undertaken by the manufacturer,
    its dealer, or its authorized agent to conform a motor vehicle to any applicable
    express warranty if, during the period of one year following the date of original
    delivery or during the first eighteen thousand miles of operation, whichever is
    earlier, any of the following apply:


    (1) Substantially the same nonconformity has been subject to repair three or more
    times and either continues to exist or recurs;


    (2) The vehicle is out of service by reason of repair for a cumulative total of
    thirty or more calendar days;


    (3) There have been eight or more attempts to repair any nonconformity;


    (4) There has been at least one attempt to repair a nonconformity that results
    in a condition that is likely to cause death or serious bodily injury if the vehicle
    is driven, and the nonconformity either continues to exist or recurs.


    (B)(1) Any period of time described in division (A) of this section shall be extended
    by any period of time during which the vehicle could not be reasonably repaired
    due to war, invasion, civil unrest, strike, fire, flood, or natural disaster.


    (2) If an extension of time is necessitated under division (B)(1) of this section
    due to the conditions described in that division, the manufacturer shall arrange
    for the use of a vehicle for the consumer whose vehicle is out of service at no
    cost to the consumer. If the manufacturer utilizes or contracts with a motor vehicle
    dealer or other third party to provide the vehicle, the manufacturer shall reimburse
    the motor vehicle dealer or other third party at a reasonable rate for the use
    of the vehicle.'
