- section: '5301.26'
  title: Vendor's lien.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.26
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.26/10-1-1953/5301.26-10-1-1953.pdf
  text: As between the vendor and vendee of land the vendor shall have a lien for
    so much of the purchase money as remains unpaid. Such lien shall not be effective
    as against a purchaser, mortgagee, judgment creditor, or other encumbrancer, unless
    there is a recital or a reservation of the lien in the deed, or in some instrument
    of record executed with the same formalities as are required for the execution
    of deeds and mortgages of land. The vendor waives his lien by taking a mortgage
    for any unpaid purchase money on the land conveyed or any part thereof, and the
    filing for record of such a mortgage with the county recorder of the county in
    which said land is located shall be constructive notice of the waiver of the vendor's
    lien.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
