- section: '2715.49'
  title: Administrator or executor may file appeal.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.49
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.49/10-1-1953/2715.49-10-1-1953.pdf
  text: 'If a party who excepts to an order discharging or refusing to discharge an
    order of attachment dies within the time limited for filing his appeal, the administrator
    or executor of such party, within thirty days after his appointment and qualification,
    may file his appeal, and thereby become a party to the action. He shall not be
    required to give the bond required by section


    2715.48


    of the Revised Code. No such appeal can be filed by an executor or administrator
    after one year from the time such order is made.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
