- section: '5301.48'
  title: Unbroken chain of title of record.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.48
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.48/9-29-1961/5301.48-9-29-1961.pdf
  text: 'Any person having the legal capacity to own land in this state, who has an
    unbroken chain of title of record to any interest in land for forty years or more,
    has a marketable record title to such interest as defined in section


    5301.47


    of the Revised Code, subject to the matters stated in section


    5301.49


    of the Revised Code.


    A person has such an unbroken chain of title when the official public records
    disclose a conveyance or other title transaction, of record not less than forty
    years at the time the marketability is to be determined, which said conveyance
    or other title transaction purports to create such interest, either in:


    (A) The person claiming such interest; or


    (B) Some other person from whom, by one or more conveyances or other title transactions
    of record, such purported interest has become vested in the person claiming such
    interest; with nothing appearing of record, in either case, purporting to divest
    such claimant of such purported interest.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 22d7952eaeeee5a44ed4081e680c60c56fed873d211e4b8956c871ebfb54a295
  effective_date: September 29, 1961
