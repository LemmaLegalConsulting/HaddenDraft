- section: '323.77'
  title: Notice by electing subdivision of desire to acquire land.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.77
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.77/10-16-2009/323.77-10-16-2009.pdf
  text: '(A) As used in this section, "electing subdivision" has the same meaning
    as in section


    5722.01


    of the Revised Code.


    (B) At any time from the date the complaint for foreclosure is filed under section


    323.69


    of the Revised Code, but not later than sixty days after the date on which the
    land was first offered for sale, an electing subdivision or a county land reutilization
    corporation may give the county treasurer, prosecuting attorney, or board of revision
    notice in writing that it seeks to acquire any parcel of abandoned land, identified
    by parcel number, from the abandoned land list. If any such parcel of abandoned
    land identified under this section is offered for sale pursuant to section


    323.73


    of the Revised Code, but is not sold for want of a minimum bid, the electing subdivision
    or a county land reutilization corporation that identified that parcel of abandoned
    land shall be deemed to have appeared at the sale and submitted the winning bid
    at the auction, and the parcel of abandoned land shall be sold to the electing
    subdivision or corporation for no consideration other than the costs prescribed
    in section


    323.75


    of the Revised Code or those costs to which the electing subdivision or corporation
    and the county treasurer mutually agree. The conveyance shall be confirmed, and
    any common law or statutory right of redemption forever terminated, upon the filing
    with the clerk of court the order of confirmation based on the adjudication of
    foreclosure by the county board of revision, which the clerk shall enter upon
    the journal of the court or a separate journal.


    If a county land reutilization corporation and an electing subdivision both request
    to acquire the parcel, the electing subdivision shall have priority to acquire
    the parcel. Notwithstanding its prior notice to the county treasurer under this
    section that it seeks to acquire the parcel of abandoned land, if a county land
    reutilization corporation has also requested to acquire the parcel, the electing
    subdivision may withdraw the notice before confirmation of the conveyance, in
    which case the parcel shall be conveyed to the county land reutilization corporation.'
  raw_html_sha256: 871336b2ee194119dcb1b1d02cd69f3cd3e966db9e069e62fda44e8b53d68156
