- section: '5301.81'
  title: Holder of environmental covenant.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.81
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.81/12-30-2004/5301.81-12-30-2004.pdf
  text: '(A) Any person, including a person that owns an interest in the real property
    that is the subject of an environmental covenant, may be a holder. An environmental
    covenant may identify more than one holder.


    (B) The interest of a holder is an interest in real property. However, a right
    of an agency under sections


    5301.80


    to


    5301.92


    of the Revised Code or under an environmental covenant, other than a right as
    a holder, is not an interest in real property.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
