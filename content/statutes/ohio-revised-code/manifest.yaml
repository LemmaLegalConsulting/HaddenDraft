  text: In an action for the foreclosure of a mortgage, the court may at any stage
    in the action require the mortgagor and the mortgagee to participate in mediation
    as the court considers appropriate and may include a stipulation that requires
    the mortgagor and the mortgagee to appear at the mediation in person.
