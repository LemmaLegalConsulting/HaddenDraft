- section: '5303.08'
  title: Cases in which occupying claimant is paid for improvements.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.08/10-1-1953/5303.08-10-1-1953.pdf
  text: 'A person who, without fraud or collusion on his part, obtained title to and
    is in the quiet possession of lands or tenements, claiming to own them, shall
    not be evicted or turned out of possession by any person who sets up and proves
    an adverse and better title, until the occupying claimant, or his heirs, is paid
    the value of lasting improvements made by the occupying claimant on the land,
    or by the person under whom he holds, before the commencement of suit on the adverse
    claim by which such eviction may be effected, unless the occupying claimant refuses
    to pay to the party establishing a better title the value of the lands without
    such improvements, on demand by him or his heirs, when such occupying claimant
    holds:


    (A) Under a plain and connected title, in law or equity, derived from the records
    of a public office;


    (B) By deed, devise, descent, contract, bond, or agreement, from and under a person
    claiming a plain and connected title, in law or equity, derived from the records
    of a public office, or by deed authenticated and recorded;


    (C) Under sale on execution against a person claiming a plain and connected title,
    in law or equity, derived from the records of a public office, or by deed authenticated
    and recorded;


    (D) Under a sale for taxes authorized by the laws of this state;


    (E) Under a sale and conveyance made by executors, administrators, or guardians,
    or by any other person, in pursuance of an order or decree of court, where lands
    are directed to be sold.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
  normalized_text_sha256: 0a6f5ea43e97af76a7daebdf66fe94a2f40add9c6bce1cdd2aa72f3abc6a0c6f
