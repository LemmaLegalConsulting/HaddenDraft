- section: '5301.45'
  title: Instrument executed and acknowledged upon different sheets.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.45
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.45/10-1-1953/5301.45-10-1-1953.pdf
  text: When a deed, mortgage, lease, or other instrument of writing intended to convey
    or encumber an interest in real estate is not printed or written on a single sheet,
    or when the certificate of acknowledgment thereof is not printed or written on
    the same sheet with the instrument, and such defective conveyance is corrected
    by the judgment of a court, or by the voluntary act of the parties thereto, such
    judgment or act shall relate back so as to be operative from the time of filing
    the original conveyance in the county recorder's office.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
