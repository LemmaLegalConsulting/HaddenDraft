- section: '2308.01'
  title: Definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-2308.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2308
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2308/2308.01/9-28-2016/2308.01-9-28-2016.pdf
  text: 'As used in this chapter:


    (A) "Manufactured home" has the same meaning as in section


    3781.06


    of the Revised Code.


    (B) "Mobile home" has the same meaning as in section


    4501.01


    of the Revised Code.


    (C) "Residential condominium unit" means a "residential unit" as defined in section


    5311.01


    of the Revised Code.


    (D) "Residential mortgage loan" means a loan or agreement to extend credit, including
    the renewal, refinancing, or modification of such a loan or agreement, that is
    made to a person and that is primarily secured by a mortgage, deed of trust, or
    other lien upon any interest in residential property or any certification of stock
    or other evidence of ownership in, and a proprietary lease from, a corporation
    or partnership formed for the purpose of cooperative ownership of residential
    property.


    (E) "Residential property" means real property located within this state consisting
    of land and a structure on that land containing four or fewer dwelling units,
    each of which is intended for occupancy by a separate household. "Residential
    property" includes a residential condominium unit, notwithstanding the number
    of units in the structure, but includes a manufactured or mobile home only if
    it is taxed as real property.'
