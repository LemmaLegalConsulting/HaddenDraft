- section: '5321.13'
  title: Terms prohibited in rental agreement.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.13/8-22-1990/5321.13-8-22-1990.pdf
  text: '(A) No provision of this chapter may be modified or waived by any oral or
    written agreement except as provided in division (F) of this section.


    (B) No warrant of attorney to confess judgment shall be recognized in any rental
    agreement or in any other agreement between a landlord and tenant for the recovery
    of rent or damages to the residential premises.


    (C) No agreement to pay the landlord''s or tenant''s attorney''s fees shall be
    recognized in any rental agreement for residential premises or in any other agreement
    between a landlord and tenant.


    (D) No agreement by a tenant to the exculpation or limitation of any liability
    of the landlord arising under law or to indemnify the landlord for that liability
    or its related costs shall be recognized in any rental agreement or in any other
    agreement between a landlord and tenant.


    (E) A rental agreement, or the assignment, conveyance, trust deed, or security
    instrument of the landlord''s interest in the rental agreement may not permit
    the receipt of rent free of the obligation to comply with section


    5321.04


    of the Revised Code.


    (F) The landlord may agree to assume responsibility for fulfilling any duty or
    obligation imposed on a tenant by section


    5321.05


    of the Revised Code, other than the obligation specified in division (A)(9) of
    that section.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
  normalized_text_sha256: 3f74500e257866c622f87584a98bf4f1cf7be935c969bc9178197bf7e42e8c09
