- section: '5301.012'
  title: Identification of agency for whose use and benefit interest in real property
    is acquired.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.012
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.012/10-26-1999/5301.012-10-26-1999.pdf
  text: '(A) As used in this section, "agency" means every organized body, office,
    or agency established by the laws of the state for the exercise of any function
    of state government.


    (B) Any instrument by which the state or an agency of the state acquires an interest
    in real property, including any deed, transfer, grant, reservation, agreement
    creating an easement, or lease, shall identify the agency for whose use and benefit
    the interest in the real property is acquired.


    (C)(1) If the instrument conveys less than a fee simple interest in real property
    and if the agency has authority to hold an interest in property in its own name,
    the instrument shall state that the interest in the real property is conveyed
    "to __________ (the name of the agency)." Otherwise, the instrument shall state
    that the interest in the real property is conveyed "to the State of Ohio for the
    use and benefit of __________ (name of agency)."


    (2) If the instrument conveys a fee simple interest in real property and if the
    agency has authority to hold a fee simple interest in real property in its own
    name, the instrument shall state that the interest in the real property is conveyed
    "to the __________ (name of agency) and its successors and assigns." Otherwise,
    the instrument that conveys a fee simple interest in the real property shall state
    "to the State of Ohio and its successors and assigns for the use and benefit of
    __________ (name of agency)."


    (D) The purpose of specifying the name of the agency in the instrument is to identify
    the agency that has the use and benefit of the real property. The identification
    of the agency pursuant to this section does not confer on that agency any additional
    property rights in regard to the real property.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
