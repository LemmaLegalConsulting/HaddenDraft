- section: '2329.37'
  title: Effect of deed.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.37
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.37/10-1-1953/2329.37-10-1-1953.pdf
  text: 'The deed provided for in section


    2329.36


    of the Revised Code shall be prima facie evidence of the legality and regularity
    of the sale. All the estate and interest of the person whose property the officer
    so professed to sell and convey, whether it existed at the time the property became
    liable to satisfy the judgment, or was acquired afterward, shall be vested in
    the purchaser by such sale.'
