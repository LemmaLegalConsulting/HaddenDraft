- section: '1345.021'
  title: Ethanol blended or mixed into gasoline.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.021
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.021/3-21-2002/1345.021-3-21-2002.pdf
  text: '(A) As used in this section, "retail dealer" means a person who owns, operates,
    controls, or supervises an establishment at which gasoline is sold or offered
    for sale to the public.


    (B) When ethanol is blended or mixed into gasoline that is sold or offered for
    sale to the public, it is not an unfair or deceptive act or practice in connection
    with a consumer transaction for a retail dealer to fail to disclose either of
    the following:


    (1) The fact that the gasoline contains ethanol;


    (2) The percentage of ethanol that is contained in the gasoline.


    (C) If a retail dealer elects to disclose any of the information specified in
    division (B) of this section, the dealer may make that disclosure in any form,
    using any type of sign or label and any size or style of letters, at the retail
    dealer''s discretion.


    (D) A retail dealer shall not be required to disclose the fact that gasoline contains
    ethanol and shall not be required to disclose the percentage of ethanol in the
    gasoline by any law, rule, resolution, or ordinance of any agency or department
    of the state or any political subdivision of the state.'
