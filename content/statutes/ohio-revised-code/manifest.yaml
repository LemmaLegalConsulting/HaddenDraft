- section: '3767.13'
  title: Prohibited acts.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.13/6-29-1982/3767.13-6-29-1982.pdf
  text: '(A) No person shall erect, continue, use, or maintain a building, structure,
    or place for the exercise of a trade, employment, or business, or for the keeping
    or feeding of an animal which, by occasioning noxious exhalations or noisome or
    offensive smells, becomes injurious to the health, comfort, or property of individuals
    or of the public.


    (B) No person shall cause or allow offal, filth, or noisome substances to be collected
    or remain in any place to the damage or prejudice of others or of the public.


    (C) No person shall unlawfully obstruct or impede the passage of a navigable river,
    harbor, or collection of water, or corrupt or render unwholesome or impure, a
    watercourse, stream, or water, or unlawfully divert such watercourse from its
    natural course or state to the injury or prejudice of others.


    (D) Persons who are engaged in agriculture-related activities, as "agriculture"
    is defined in section


    519.01


    of the Revised Code, and who are conducting those activities outside a municipal
    corporation, in accordance with generally accepted agricultural practices, and
    in such a manner so as not to have a substantial, adverse effect on the public
    health, safety, or welfare are exempt from divisions (A) and (B) of this section,
    from any similar ordinances, resolutions, rules, or other enactments of a state
    agency or political subdivision, and from any ordinances, resolutions, rules,
    or other enactments of a state agency or political subdivision that prohibit excessive
    noise.'
