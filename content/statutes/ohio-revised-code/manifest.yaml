- section: '5301.87'
  title: Zoning regulations and prior instruments.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.87
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.87/12-30-2004/5301.87-12-30-2004.pdf
  text: 'Sections


    5301.80


    to


    5301.92


    of the Revised Code do not authorize a use of real property that is otherwise
    prohibited by zoning, by law other than sections


    5301.80


    to


    5301.92


    of the Revised Code regulating use of real property, or by a recorded instrument
    that has priority over an environmental covenant. An environmental covenant may
    prohibit or restrict uses of real property that are authorized by zoning or by
    law other than sections


    5301.80


    to


    5301.92


    of the Revised Code.'
