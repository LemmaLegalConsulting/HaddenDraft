- section: '1345.10'
  title: Final judgment admissible as prima facie evidence.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.10/7-14-1972/1345.10-7-14-1972.pdf
  text: '(A) With the exception of consent judgments entered before any testimony
    is taken, a final judgment against a supplier under section


    1345.07


    of the Revised Code is admissible as prima-facie evidence of the facts on which
    it is based in subsequent proceedings under section


    1345.09


    of the Revised Code against the same supplier, or his successors or assigns.


    (B) An action by or on behalf of a consumer pursuant to section


    1345.09


    of the Revised Code precludes that consumer from being included in a later class
    action by the attorney general with respect to the same transaction, but intervention
    by the attorney general in a pending action is authorized. If the attorney general
    brings a class action on behalf of consumers, a consumer may withdraw from the
    class action prior to trial, or, with the permission of the court, at any time.


    (C) An action under sections


    1345.01


    to


    1345.13


    of the Revised Code may not be brought more than two years after the occurrence
    of the violation which is the subject of suit, or more than one year after the
    termination of proceedings by the attorney general with respect to the violation,
    whichever is later. However, an action under sections


    1345.01


    to


    1345.13


    of the Revised Code arising out of the same consumer transaction can be used as
    a counterclaim whenever a supplier sues a consumer on an obligation arising from
    the consumer transaction.'
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
