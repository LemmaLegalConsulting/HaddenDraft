- section: '5301.05'
  title: Discriminatory restrictive covenants - void.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.05
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.05/9-30-2021/5301.05-9-30-2021.pdf
  text: '(A) Discriminatory restrictive covenants in deeds limiting the transfer or
    lease of real property to individuals against whom discrimination is prohibited
    by division (H)(1) of section


    4112.02


    of the Revised Code are void. If an attorney, in preparing a deed, discovers a
    discriminatory covenant that is void under this section, the attorney may omit
    the discriminatory restrictive covenant from the new deed with immunity from civil
    liability.


    (B) Omission of a discriminatory restrictive covenant from a deed pursuant to
    division (A) of this section does not affect the validity of the deed. No county
    recorder shall refuse to record a deed pursuant to division (B) of section


    317.13


    of the Revised Code due to such omission.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
