- section: '3767.28'
  title: Inspector of nuisances - powers and duties.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.28
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.28/8-11-1955/3767.28-8-11-1955.pdf
  text: 'For the purpose of examining cases of violations of sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, and for obtaining evidence thereof, an inspector
    of nuisances may enter upon any premises in any county, and shall make a complaint,
    and institute prosecution, against any one violating such sections. The inspector
    shall not be required to give security for costs. The prosecuting attorney shall
    be the legal advisor of such inspector and the attorney in all such prosecutions.'
