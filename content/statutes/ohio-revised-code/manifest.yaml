- section: '5721.372'
  title: Private selling officer's fees.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.372
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.372/9-28-2016/5721.372-9-28-2016.pdf
  text: '(A) A private selling officer''s fees payable with respect to an action under
    sections


    5721.30


    to


    5721.46


    of the Revised Code are subject to both of the following conditions:


    (1) The fees must be reasonable.


    (2) Fees exceeding five per cent of the sale price of the property, if such amount
    is greater than seven hundred fifty dollars, shall be paid only if authorized
    by a court order.


    (B)(1) Fees less than or equal to seven hundred fifty dollars shall be presumed
    to be reasonable.


    (2) The terms of a sale negotiated under section


    5721.33


    of the Revised Code may include the amount to be paid in private selling officer''s
    fees, subject to division (A) of this section.


    (C) As used in this section, "private selling officer" has the same meaning as
    in section


    2329.01


    of the Revised Code.'
