- section: '2329.03'
  title: Lien without filing of certificate.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.03/10-1-1953/2329.03-10-1-1953.pdf
  text: 'Lands and tenements of a judgment debtor shall be bound with a lien for the
    satisfaction of any judgment of any court of general jurisdiction, including district
    courts of the United States, within this state, without the filing of the certificate
    provided for in section


    2329.02


    of the Revised Code, from the time when the same are seized in execution. Goods
    and chattels of a judgment debtor shall be bound from the time they are seized
    in execution.'
