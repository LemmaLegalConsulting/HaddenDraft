- section: '2715.37'
  title: Proceedings after judgment for plaintiff.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.37
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.37/8-26-1982/2715.37-8-26-1982.pdf
  text: 'If judgment is rendered for the plaintiff in an action in attachment, it
    shall be satisfied as follows: So much of the property in the hands of the levying
    officer, after applying the money arising from the sale of perishable property
    and so much of the personal property, and lands and tenements, whether held by
    legal or equitable title, as is necessary, shall be sold by order of the court,
    under the same restrictions and regulations as if it had been levied on by execution.
    The money arising therefrom, with the amount which is recovered from the garnishee,
    shall be applied to satisfy the judgment and costs. If there is not enough to
    satisfy them, the judgment shall stand and execution may issue thereon for the
    residue, as in other cases. Any surplus of the attached property or its proceeds
    shall be returned to the defendant.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: 4735e7c208e79cc0565ff55713540c07a06de9b939f5ce8c1c13d5099e36a4d4
