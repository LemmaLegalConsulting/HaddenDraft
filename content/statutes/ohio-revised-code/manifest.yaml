- section: '2737.15'
  title: Proceedings when movant fails to prosecute to final judgment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.15
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.15/8-26-1982/2737.15-8-26-1982.pdf
  text: When a movant obtains possession of property pursuant to this chapter, but
    fails to prosecute the action to final judgment, on application of the respondent,
    the court may order the return of the property and shall assess the damages caused
    the respondent by deprivation of the possession of the property, the amount of
    which, with costs of the action, shall be awarded to the respondent by judgment
    of the court.
