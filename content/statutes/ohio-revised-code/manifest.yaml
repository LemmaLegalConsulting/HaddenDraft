- section: '5313.08'
  title: Action for forfeiture and restitution.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.08/10-6-1980/5313.08-10-6-1980.pdf
  text: 'If the contract has been in effect for less than five years, in addition
    to any other remedies provided by law and after the expiration of the periods
    prescribed by sections


    5313.05


    and


    5313.06


    of the Revised Code, if the vendee is still in default of any payment the vendor
    may bring an action for forfeiture of the vendee''s rights in the land installment
    contract and for restitution of his property under Chapter 1923. of the Revised
    Code. When bringing the action under Chapter 1923. of the Revised Code, the vendor
    complies with the notice requirement of division (A) of section


    1923.04


    of the Revised Code by serving notice pursuant to section


    5313.06


    of the Revised Code. The court may also grant any other claim arising out of the
    contract.'
  raw_html_sha256: 7fd3338f24c53a3e8ca29d774ecccf1b158db9f6476737e91addc154f72ab77a
