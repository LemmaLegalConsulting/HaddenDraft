- section: '4781.56'
  title: Abatement or removal of abandoned homes or vehicles.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.56
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.56/9-30-2021/4781.56-9-30-2021.pdf
  text: '(A) The division of industrial compliance may contract with the board of
    health of a city or general health district to permit the division to abate and
    remove, in accordance with sections


    3707.01


    to


    3707.021


    of the Revised Code, any abandoned or unoccupied manufactured home, mobile home,
    or recreational vehicle that constitutes a nuisance and that is located in a manufactured
    home park within the board of health''s jurisdiction. Under the contract, the
    division may receive complaints of abandoned or unoccupied manufactured homes,
    mobile homes, or recreational vehicles that constitute a nuisance and may, by
    order, compel the park operator to abate and remove the nuisance. The park operator
    shall pay any costs for the removal.


    (B) The sheriff, police officer, constable, or bailiff shall not be liable pursuant
    to the abatement or removal of any abandoned or unoccupied manufactured home,
    mobile home, or recreational vehicle pursuant to this section.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
