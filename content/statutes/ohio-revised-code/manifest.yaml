- section: '4781.49'
  title: Limits on operator's right to recover possession of premises.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.49
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.49/9-10-2012/4781.49-9-10-2012.pdf
  text: '(A) No park operator of residential premises shall initiate any act, including
    termination of utilities or services, exclusion from the premises, or threat of
    any unlawful act, against a resident, or a resident whose right to possession
    has terminated, for the purpose of recovering possession of residential premises,
    other than as provided in Chapters 1923., 4781., and 5303. of the Revised Code.


    (B) No park operator of residential premises shall seize the furnishings or possessions
    of a resident, or of a resident whose right to possession was terminated, for
    the purpose of recovering rent payments, other than in accordance with an order
    issued by a court of competent jurisdiction.


    (C) A park operator who violates this section is liable in a civil action for
    all damages caused to a resident, or to a resident whose right to possession has
    terminated, together with reasonable attorneys'' fees.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: dce0c3f31d65c47a795a6ae78a0e0b7cbfe84db4a78f3f8ea1502264a6e9731a
