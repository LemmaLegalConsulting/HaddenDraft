- section: '4781.45'
  title: Notification of violation of rules to resident.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.45
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.45/1-21-2018/4781.45-1-21-2018.pdf
  text: 'If a resident commits a material violation of the rules of the manufactured
    home park, of the department of commerce division of industrial compliance, or
    of applicable state and local health and safety codes, the park operator may deliver
    a written notification of the violation to the resident. The notification shall
    contain all of the following:


    (A) A description of the violation;


    (B) A statement that the rental agreement will terminate upon a date specified
    in the written notice not less than thirty days after receipt of the notice unless
    the resident remedies the violation;


    (C) A statement that the violation was material and that if a second material
    violation of any park or division rule, or any health and safety code, occurs
    within six months after the date of this notice, the rental agreement will terminate
    immediately;


    (D) A statement that a defense available to termination of the rental agreement
    for two material violations of park or division rules, or of health and safety
    codes, is that the park rule is unreasonable, or that the park or division rule,
    or health or safety code, is not being enforced against other manufactured home
    park residents, or that the two violations were not willful and not committed
    in bad faith.


    If the resident remedies the condition described in the notice, whether by repair,
    the payment of damages, or otherwise, the rental agreement shall not terminate.
    The park operator may terminate the rental agreement immediately if the resident
    commits a second material violation of the park or division rules, or of applicable
    state and local health and safety codes, subject to the defense that the park
    rule is unreasonable, that the park or division rule, or health or safety code,
    is not being enforced against other manufactured home park residents, or that
    the two violations were not willful and not committed in bad faith.'
