- section: '5721.22'
  title: Correction of duplicate when erroneously returned delinquent.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.22
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.22/3-25-1987/5721.22-3-25-1987.pdf
  text: If the taxes and assessments charged on land or lots are regularly paid in
    full, and such land is erroneously returned delinquent, and the land is listed
    on the delinquent land tax certificate record or master list of delinquent lands,
    the county auditor shall correct the duplicate and issue an abatement for penalties
    and interest added to such land on account of such error, the same as provided
    for in making errors on the tax duplicate.
