- section: '3767.11'
  title: Procedure when nuisance established in criminal proceeding.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.11
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.11/6-1-1992/3767.11-6-1-1992.pdf
  text: '(A) If a nuisance is established in a criminal action, the prosecuting attorney,
    village solicitor, city director of law, or other similar chief legal officer
    shall proceed promptly under sections


    3767.03


    to


    3767.11


    of the Revised Code to enforce those sections. The finding of the defendant guilty
    in the criminal action, unless reversed or set aside, shall be conclusive against
    the defendant as to the existence of the nuisance in the civil action under those
    sections.


    (B) Except for proceeds described in divisions (C) to (F) of section


    3767.06


    of the Revised Code, all moneys collected under sections


    3767.03


    to


    3767.11


    of the Revised Code shall be paid to the county treasurer.'
