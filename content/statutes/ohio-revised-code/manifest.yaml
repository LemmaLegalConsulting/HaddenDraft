- section: '2737.04'
  title: Request for hearing on motion for order of possession of property.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.04/3-13-1986/2737.04-3-13-1986.pdf
  text: 'A respondent to a motion filed under section


    2737.03


    of the Revised Code may receive a hearing on the motion in accordance with section


    2737.07


    of the Revised Code by delivering a written request for a hearing to the court
    within five business days after receipt of the notice provided pursuant to section


    2737.05


    of the Revised Code. The request may set forth the respondent''s reasons for disputing
    the movant''s claim for possession of the property. However, neither the respondent''s
    inclusion of nor his failure to include such reasons upon the request constitutes
    a waiver of any defense of the respondent or affects the respondent''s right to
    produce evidence at any hearing or at the trial of the action. The time and place
    for the hearing shall be that set forth in the notice. If a written request for
    a hearing is not received by the court within the prescribed time and the court
    does not grant a continuance of the scheduled hearing in accordance with division
    (B) of section


    2737.06


    of the Revised Code, the hearing scheduled pursuant to section


    2737.07


    of the Revised Code immediately shall be canceled and the court at any time thereafter,
    upon request of the movant, may issue an order of possession in accordance with
    division (A) of section


    2737.06


    of the Revised Code.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
