- section: '4781.301'
  title: Fees in lieu of license and inspection fees.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.301
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.301/9-10-2012/4781.301-9-10-2012.pdf
  text: 'Fees authorized or charged under sections


    4781.31


    ,


    4781.32


    , and


    4781.28


    of the Revised Code are in lieu of all license and inspection fees on or with
    respect to the operation or ownership of manufactured home parks within this state,
    except that the licensor may charge additional reasonable fees for the collection
    and bacteriological examination of any necessary water samples taken from any
    such park.'
