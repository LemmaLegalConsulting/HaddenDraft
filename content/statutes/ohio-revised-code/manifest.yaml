- section: '2715.42'
  title: Proceedings do not end by death of defendant.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.42
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.42/10-1-1953/2715.42-10-1-1953.pdf
  text: 'From the time an order of attachment is issued, the court shall have jurisdiction
    and control of all subsequent proceedings under sections


    2715.01


    to


    2715.49


    , inclusive, of the Revised Code. After the order issues, if the defendant dies,
    or if the defendant is a corporation and its charter expires by limitation, forfeiture,
    or otherwise, the proceedings shall be carried on. In such cases, other than where
    the defendant is a foreign corporation, the legal representatives of the defendant
    shall be made parties to the action.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
