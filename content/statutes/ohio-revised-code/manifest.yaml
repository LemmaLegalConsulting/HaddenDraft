- section: '1349.84'
  title: Firearm privacy definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.84
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.84/4-9-2025/1349.84-4-9-2025.pdf
  text: 'As used in sections


    1349.84


    to


    1349.86


    of the Revised Code:


    (A) "Ammunition" has the same meaning as in section


    2305.401


    of the Revised Code and includes any ammunition component.


    (B) "Assign" or "assignment" refers to a financial institution''s policy, process,
    or practice that labels, links, or otherwise associates a firearms code with a
    merchant or a payment card transaction in a manner that allows the financial institution
    or any other entity facilitating or processing the payment card transaction to
    identify whether a merchant is a firearms retailer or whether a transaction involves
    the sale of firearms or ammunition.


    (C) "Customer" means any person or entity engaged in a payment card transaction
    facilitated or processed by a financial institution.


    (D) "Financial institution" means a person or entity other than a merchant involved
    in facilitating or processing a payment card transaction, including any bank,
    as defined in section


    1309.102


    of the Revised Code, acquirer, payment card issuer, payment card network, payment
    gateway, or payment card processor.


    (E) "Firearm" has the same meaning as in section


    2923.11


    of the Revised Code and includes a firearm component or accessory.


    (F) "Firearms retailer" means any person or entity that is lawfully engaged, from
    a physical place of business in this state, in selling or trading firearms, antique
    firearms, or ammunition to be used in firearms or antique firearms.


    (G) "Firearms code" means a merchant category code approved by the international
    organization for standardization or an equivalent successor organization and specifically
    assigned to a firearms retailer.


    (H) "Government entity" means the state, a political subdivision of the state,
    or any court, agency, or instrumentality of the foregoing.


    (I) "Payment card" means a credit card, charge card, debit card, or any other
    card that is issued to an authorized card user and allows the user to purchase
    goods or services from a merchant.


    (J) "Payment card transaction" means any transaction in which a payment card is
    accepted as payment.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
