- section: '323.71'
  title: Procedure where impositions exceed fair market value.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.71
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.71/9-4-2014/323.71-9-4-2014.pdf
  text: '(A)(1) If the county board of revision, upon its own motion or pursuant to
    a hearing under division (A)(2) of this section, determines that the impositions
    against a parcel of abandoned land that is the subject of a complaint filed under
    section


    323.69


    of the Revised Code exceed the fair market value of that parcel as currently shown
    by the latest valuation by the auditor of the county in which the land is located,
    then the board may proceed to hear and adjudicate the case as provided under sections


    323.70


    and


    323.72


    of the Revised Code. Upon entry of an order of foreclosure, the parcel may be
    disposed of as prescribed by division (G) of section


    323.73


    of the Revised Code.


    If the board of revision, upon its own motion or pursuant to a hearing under division
    (A)(2) of this section, determines that the impositions against a parcel do not
    exceed the fair market value of the parcel as shown by the county auditor''s then-current
    valuation of the parcel, the parcel shall not be disposed of as prescribed by
    division (G) of section


    323.73


    of the Revised Code, but may be disposed of as otherwise provided in section


    323.73


    ,


    323.74


    ,


    323.75


    ,


    323.77


    , or


    323.78


    of the Revised Code.


    (2) By a motion filed not later than seven days before a final hearing on a complaint
    is held under section


    323.70


    of the Revised Code, an owner or lienholder may file with the county board of
    revision a good faith appraisal of the parcel from a licensed professional appraiser
    and request a hearing to determine whether the impositions against the parcel
    of abandoned land exceed or do not exceed the fair market value of that parcel
    as shown by the auditor''s then-current valuation of that parcel. If the motion
    is timely filed, the board of revision shall conduct a hearing and shall make
    a factual finding as to whether the impositions against the parcel exceed or do
    not exceed the fair market value of that parcel as shown by the auditor''s then-current
    valuation of that parcel. An owner or lienholder must show by a preponderance
    of the evidence that the impositions against the parcel do not exceed the auditor''s
    then-current valuation of the parcel in order to preclude the application of division
    (G) of section


    323.73


    of the Revised Code.


    (B) Notwithstanding sections


    323.65


    to


    323.79


    of the Revised Code to the contrary, for purposes of determining in any proceeding
    under those sections whether the total of the impositions against the abandoned
    land exceed the fair market value of the abandoned land, it is prima-facie evidence
    and a rebuttable presumption that may be rebutted to the county board of revision
    that the auditor''s then-current valuation of that abandoned land is the fair
    market value of the land, regardless of whether an independent appraisal has been
    performed.'
