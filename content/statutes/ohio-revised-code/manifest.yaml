- section: '2715.14'
  title: Clerk to transmit answer to proper court.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.14/10-1-1953/2715.14-10-1-1953.pdf
  text: 'The clerk of the court of common pleas before whom the answer mentioned in
    section


    2715.13


    of the Revised Code is made shall transmit it to the clerk of the court in which
    the suit is pending, in the manner depositions are required to be directed and
    transmitted. For his services he shall receive such fees as are allowed by law
