- section: '5321.14'
  title: Unconscionable terms.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.14/11-4-1974/5321.14-11-4-1974.pdf
  text: '(A) If the court as a matter of law finds a rental agreement, or any clause
    thereof, to have been unconscionable at the time it was made, it may refuse to
    enforce the rental agreement or it may enforce the remainder of the rental agreement
    without the unconscionable clause, or it may so limit the application of any unconscionable
    clause as to avoid any unconscionable result.


    (B) When it is claimed or appears to the court that the rental agreement, or any
    clause thereof, may be unconscionable, the parties shall be afforded a reasonable
    opportunity to present evidence as to its setting, purpose, and effect to aid
    the court in making the determination.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
