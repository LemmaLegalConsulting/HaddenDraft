- section: '2715.32'
  title: Disposition of property in hands of garnishee.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.32/8-26-1982/2715.32-8-26-1982.pdf
  text: 'If a garnishee under this chapter appears and answers, as required by section


    2715.29


    of the Revised Code, and on his examination it is discovered that at or after
    the service of the order and notice upon him under section


    2715.091


    of the Revised Code, he was possessed of property of the defendant, or was indebted
    to him, or both, the court may order the delivery of such property, or the payment
    of the amount owing by him, other than personal earnings, into court, or both;
    or it may permit the garnishee to retain the property, or the amount owing, upon
    his executing a bond to the plaintiff, by sufficient surety, to the effect that
    the amount will be paid, or the property forthcoming, as the court directs.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: dbdf57d7a73f454a392498a8cba0e07208eeb58adeb21e496e1018355d25c638
