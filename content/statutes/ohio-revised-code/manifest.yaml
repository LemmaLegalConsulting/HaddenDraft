- section: '5313.10'
  title: Terminating land installment contract is exclusive remedy.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.10/11-25-1969/5313.10-11-25-1969.pdf
  text: 'The election of the vendor to terminate the land installment contract by
    an action under section


    5313.07


    or


    5313.08


    of the Revised Code is an exclusive remedy which bars further action on the contract
    unless the vendee has paid an amount less than the fair rental value plus deterioration
    or destruction of the property occasioned by the vendee''s use. In such case the
    vendor may recover the difference between the amount paid by the vendee on the
    contract and the fair rental value of the property plus an amount for the deterioration
    or destruction of the property occasioned by the vendee''s use.'
  raw_html_sha256: 7fd3338f24c53a3e8ca29d774ecccf1b158db9f6476737e91addc154f72ab77a
