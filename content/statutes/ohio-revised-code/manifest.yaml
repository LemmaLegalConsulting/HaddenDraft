  title: Judgment for fine and costs.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.26
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.26/8-11-1955/3767.26-8-11-1955.pdf
  text: 'A judgment for fine and costs rendered against a person or corporation for
    the violation of sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, when the defendant has no property or has not
    a sufficient amount within the county upon which to levy to satisfy such judgment
    and costs, may be enforced and collected in the manner in which judgments are
    collected in civil cases.'
