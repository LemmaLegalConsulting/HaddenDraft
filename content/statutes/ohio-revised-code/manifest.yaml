- section: '5721.35'
  title: Tax certificate vests in certificate holder first lien previously held by
    state and its taxing districts.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.35
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.35/1-30-2014/5721.35-1-30-2014.pdf
  text: '(A) Upon the sale and delivery of a tax certificate, the tax certificate
    vests in the certificate holder the first lien previously held by the state and
    its taxing districts under section


    5721.10


    of the Revised Code for the amount of taxes, assessments, interest, and penalty
    charged against a certificate parcel, superior to all other liens and encumbrances
    upon the parcel described in the tax certificate, in the amount of the certificate
    redemption price, except liens for delinquent taxes that attached to the certificate
    parcel prior to the attachment of the lien being conveyed by the sale of such
    tax certificate. With respect to the priority as among such first liens of the
    state and its taxing districts for different years, the priority shall be determined
    by the date such first liens of the state and its taxing districts attached pursuant
    to section


    323.11


    of the Revised Code, with first priority to the earliest attached lien and each
    immediately subsequent priority based upon the next earliest attached lien.


    (B)(1) A certificate holder or the county treasurer may record the tax certificate
    or memorandum thereof in the office of the county recorder of the county in which
    the certificate parcel is situated, as a mortgage of land under division (A)(20)
    of section


    317.08


    of the Revised Code. The county recorder shall index the certificate in the indexes
    provided for under section


    317.18


    of the Revised Code. If the lien is subsequently canceled, the cancellation also
    shall be recorded by the county recorder.


    (2) Notwithstanding Chapter 1309., Title LIII, or any other provision of the Revised
    Code, a secured party holding a security interest in a tax certificate or memorandum
    thereof may perfect that security interest only by one of the following methods:


    (a) Possession;


    (b) Registering the tax certificate with the county treasurer in the name of the
    secured party, or its agent or custodian, as certificate holder;


    (c) Recording the name of the secured party in the tax certificate register in
    the office of the county treasurer of the county in which the certificate parcel
    is situated.'
