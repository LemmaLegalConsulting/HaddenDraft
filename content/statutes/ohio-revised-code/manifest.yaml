- section: '3767.99'
  title: Penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.99/7-14-1980/3767.99-7-14-1980.pdf
  text: '(A) Whoever is guilty of contempt under sections


    3767.01


    to


    3767.11


    or violates section


    3767.14


    of the Revised Code is guilty of a misdemeanor of the first degree.


    (B) Whoever violates section


    3767.12


    or


    3767.29


    , or, being an association, violates section


    3767.30


    of the Revised Code is guilty of a misdemeanor of the fourth degree.


    (C) Whoever violates section


    3767.13


    ,


    3767.19


    , or


    3767.32


    or, being a natural person, violates section


    3767.30


    of the Revised Code is guilty of a misdemeanor of the third degree. The sentencing
    court may, in addition to or in lieu of the penalty provided in this division,
    require a person who violates section


    3767.32


    of the Revised Code to remove litter from any public or private property, or in
    or on waters of the state.


    (D) Whoever violates section


    3767.16


    ,


    3767.17


    ,


    3767.18


    ,


    3767.201


    , or


    3767.34


    of the Revised Code is guilty of a minor misdemeanor.'
