- section: '2715.044'
  title: Effective date of order of attachment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.044
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.044/3-13-1986/2715.044-3-13-1986.pdf
  text: 'An order of attachment issued by a court shall not be effective until the
    plaintiff that filed the motion for attachment files with the court a bond to
    the defendant against whom the motion was filed, executed by the plaintiff''s
    surety, in an amount twice the approximate value of the property to be attached
    under the order, to the effect that, should judgment be issued against the plaintiff,
    the plaintiff will return the property taken or pay the value so assessed, at
    the election of the defendant, and also pay the damages suffered by the defendant
    as a result of the taking and detention of, and any injury to, the property and
    the costs of the action. If the plaintiff does not know the approximate value
    of the property sought to be attached under the order, or if the identity of the
    property to be attached is not known, the bond shall be in an amount twice that
    of the plaintiff''s claim, as indicated in the plaintiff''s affidavit filed pursuant
    to section


    2715.03


    of the Revised Code.


    In lieu of the bond, the plaintiff may deposit with the clerk of the court cash
    in an amount equal to twice the approximate value of the property or, if that
    value is not known or the identity of the property to be attached is not known,
    equal to twice the amount of the claim of the plaintiff.


    When the ground of attachment is that the defendant is a foreign corporation,
    or not a resident of this state, the order of attachment may be issued without
    a bond.


    If the plaintiff is indigent, the court may, on motion of the plaintiff or on
    its own motion, waive the bond required by this section or may set the bond in
    a lower amount, as fairness requires.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
