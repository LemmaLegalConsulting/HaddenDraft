- section: '1322.56'
  title: Adoption of rules to comply with NMLS requirements.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.56
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.56/3-23-2018/1322.56-3-23-2018.pdf
  text: 'The superintendent of financial institutions may adopt, in accordance with
    Chapter 119. of the Revised Code, any rule necessary to comply with the requirements
    of the nationwide mortgage licensing system and registry, including requirements
    pertaining to all of the following:


    (A) Payment of nonrefundable fees to apply for, maintain, and renew licenses through
    the nationwide mortgage licensing system and registry;


    (B) Renewal or reporting dates;


    (C) Procedures to amend or to surrender a license;


    (D) Any other activity necessary for participation in the nationwide mortgage
    licensing system and registry.'
