- section: '4781.36'
  title: Whistleblower protection.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.36
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.36/9-10-2012/4781.36-9-10-2012.pdf
  text: '(A) Subject to section


    4781.37


    of the Revised Code, a park operator shall not retaliate against a resident by
    increasing the resident''s rent, decreasing services that are due to the resident,
    refusing to renew or threatening to refuse to renew the rental agreement with
    the resident, or bringing or threatening to bring an action for possession of
    the resident''s premises because:


    (1) The resident has complained to an appropriate governmental agency of a violation
    of a building, housing, health, or safety code that is applicable to the premises,
    and the violation materially affects health and safety;


    (2) The resident has complained to the park operator of any violation of section


    4781.38


    of the Revised Code;


    (3) The resident joined with other residents for the purpose of negotiating or
    dealing collectively with the park operator on any of the terms and conditions
    of a rental agreement.


    (B) If a park operator acts in violation of division (A) of this section, the
    resident may:


    (1) Use the retaliatory action of the park operator as a defense to an action
    by the park operator to recover possession of the premises;


    (2) Recover possession of the premises;


    (3) Terminate the rental agreement.


    In addition, the resident may recover from the park operator any actual damages
    together with reasonable attorneys fees.


    (C) Nothing in division (A) of this section prohibits a park operator from increasing
    the rent to reflect the cost of improvements installed by the park operator in
    or about the premises or to reflect an increase in other costs of operation of
    the premises.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
