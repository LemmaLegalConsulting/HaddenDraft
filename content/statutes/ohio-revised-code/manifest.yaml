- section: '5301.692'
  title: Holding land or interests in land for purpose of retaining use of land predominantly
    in agriculture.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.692
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.692/4-5-1999/5301.692-4-5-1999.pdf
  text: 'The legislative authority of a municipal corporation, board of county commissioners
    of a county, or board of township trustees of a township, in addition to the legislative
    authority''s or board''s other powers, may hold land or interests in land for
    the purpose of retaining the use of the land predominantly in agriculture. The
    authority and boards may do all things necessary or appropriate to achieve that
    purpose, including, without limitation, performing any of the activities described
    in division (A)(1) or (2) of section


    5713.30


    of the Revised Code or entering into contracts to lease or rent the land or interests
    in land so held to persons or governmental entities who will use the land predominantly
    in agriculture.'
