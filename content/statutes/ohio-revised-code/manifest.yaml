- section: '2715.25'
  title: Disposal of attached property.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.25
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.25/8-26-1982/2715.25-8-26-1982.pdf
  text: The court may make proper orders for the preservation of property attached
    during the pendency of a suit and direct a sale of it when, because of its perishable
    nature or the costs of its keeping, that will be for the benefit of the parties.
    The sale shall be public, after such advertisement as is prescribed for the sale
    of like property on execution, and shall be made in such manner and on such terms
    of credit, with security, as, having regard to the probable duration of the action,
    the court or judge directs. The sheriff shall hold and pay over all proceeds of
    the sale collected by him and all money received by him from garnishees under
    the same requirements and responsibilities of himself and sureties as are provided
    in respect to money deposited in lieu of bail.
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
