- section: '4781.281'
  title: Inspector certification fees.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.281
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.281/9-30-2021/4781.281-9-30-2021.pdf
  text: '(A) The division of industrial compliance may charge a fee for inspector
    certification. The fees shall include all of the following:


    (1) The nonrefundable certification fee for inspectors shall not be greater than
    fifty dollars for each three-year certification period.


    (2) The nonrefundable certification renewal fee for inspectors shall not be greater
    than fifty dollars.


    (3) The nonrefundable late fee for certification renewal shall not be greater
    than twenty-five dollars in addition to the renewal fee.


    (B) The division may adopt rules pursuant to Chapter 119. of the Revised Code
    establishing fees less than those described in division (A) of this section.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
