- section: '4781.37'
  title: Action for possession of the premises.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.37
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.37/1-21-2018/4781.37-1-21-2018.pdf
  text: '(A) Notwithstanding section


    4781.36


    of the Revised Code, a park operator may bring an action under Chapter 1923. of
    the Revised Code for possession of the premises if any of the following applies:


    (1) The resident is in default in the payment of rent.


    (2) The violation of the applicable building, housing, health, or safety code
    that the resident complained of was primarily caused by any act or lack of reasonable
    care by the resident, by any other person in the resident''s household, or by
    anyone on the premises with the consent of the resident.


    (3) The resident is holding over the resident''s term.


    (4) The resident is in violation of rules of the division of industrial compliance
    adopted pursuant to section


    4781.26


    of the Revised Code or rules of the manufactured home park adopted pursuant to
    the rules of the division.


    (5) The resident has been absent from the manufactured home park for a period
    of thirty consecutive days prior to the commencement of the action, and the resident''s
    manufactured home, mobile home, or recreational vehicle parked in the manufactured
    home park has been left unoccupied for that thirty-day period, without notice
    to the park operator and without payment of rent due under the rental agreement.


    (B) The maintenance of an action by the park operator under this section does
    not prevent the resident from recovering damages for any violation by the park
    operator of the rental agreement or of section


    4781.38


    of the Revised Code.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
