- section: '1345.51'
  title: Consumer protection enforcement fund.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.51
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.51/9-30-2011/1345.51-9-30-2011.pdf
  text: 'There is hereby created in the state treasury the consumer protection enforcement
    fund. The fund shall include civil penalties ordered pursuant to divisions (A)
    and (D) of section


    1345.07


    of the Revised Code and paid as provided in division (G) of that section, all
    civil penalties assessed under division (A) of section


    1349.192


    of the Revised Code, all costs awarded to the attorney general and all penalties
    imposed under section


    4549.48


    of the Revised Code, and all money unclaimed under section


    4549.50


    of the Revised Code. The money in the consumer protection enforcement fund shall
    be used for the sole purpose of paying expenses incurred by the consumer protection
    section of the office of the attorney general.'
