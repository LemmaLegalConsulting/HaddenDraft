- section: '2329.57'
  title: Execution issued to another county may be returned by mail.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.57
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.57/10-1-1953/2329.57-10-1-1953.pdf
  text: When execution is issued in a county and directed to the sheriff or coroner
    of another county, the sheriff or coroner having the execution, after discharging
    all the duties required of him, may transmit it by mail to the clerk of the court
    who issued the writ. On proof by such sheriff or coroner that it was mailed soon
    enough to reach the office where it was issued within the time prescribed by law,
    he shall not be liable to amercement or penalty if it does not reach the office
    in due time.
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
  normalized_text_sha256: 200fd8ea84c524aed2d6826acc283a39789f363ac86f3b77d194b3e73d353786
