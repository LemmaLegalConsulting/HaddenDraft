- section: '5301.99'
  title: Penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.99/6-16-2026/5301.99-6-16-2026.pdf
  text: '(A) Any individual, corporation, or other business entity that violates section


    5301.254


    of the Revised Code shall be fined not less than five thousand dollars nor more
    than an amount equal to twenty-five percent of the market value of the real property
    or mineral or mining rights about which information must be filed with the secretary
    of state pursuant to section


    5301.254


    of the Revised Code.


    (B) Whoever violates section


    5301.61


    of the Revised Code is guilty of a misdemeanor of the first degree.


    (C) Whoever violates division (A) of section


    5301.77


    of the Revised Code is guilty of a misdemeanor of the second degree.'
