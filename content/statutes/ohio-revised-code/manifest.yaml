- section: '3767.04'
  title: Procedure in injunction action.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.04/6-1-1992/3767.04-6-1-1992.pdf
  text: '(A) The civil action provided for in section


    3767.03


    of the Revised Code shall be commenced in the court of common pleas of the county
    in which the nuisance is located. At the commencement of the action, a complaint
    alleging the facts constituting the nuisance shall be filed in the office of the
    clerk of the court of common pleas.


    (B)(1) After the filing of the complaint, an application for a temporary injunction
    may be filed with the court or a judge of the court. A hearing shall be held on
    the application within ten days after the filing.


    (2) If an application for a temporary injunction is filed, the court or a judge
    of the court, on application of the complainant, may issue an ex parte restraining
    order restraining the defendant and all other persons from removing or in any
    manner interfering with the personal property and contents of the place where
    the nuisance is alleged to exist until the decision of the court or judge granting
    or refusing the requested temporary injunction and until the further order of
    the court. The restraining order may be served by handing it to and leaving a
    copy of it with any person who is in charge of the place where the nuisance is
    alleged to exist or who resides in that place, by posting a copy of it in a conspicuous
    place at or upon one or more of the principal doors or entrances to that place,
    or by both delivery and posting. The officer serving the restraining order forthwith
    shall make and return into court an inventory of the personal property and contents
    situated in and used in conducting or maintaining the nuisance. Any violation
    of the restraining order is a contempt of court, and, if the order is posted,
    its mutilation or removal while it remains in force is a contempt of court, provided
    the posted order contains a notice to that effect.


    (3) A copy of the complaint, a copy of the application for the temporary injunction,
    and a notice of the time and place of the hearing on the application shall be
    served upon the defendant at least five days before the hearing. If the hearing
    then is continued on the motion of any defendant, the requested temporary injunction
    shall be granted as a matter of course. If, upon hearing, the allegations of the
    complaint are sustained to the satisfaction of the court or judge, the court or
    judge shall issue a temporary injunction without additional bond restraining the
    defendant and any other person from continuing the nuisance. Except as provided
    in division (C) of this section, if at the time of granting the temporary injunction
    it further appears that the person owning, in control, or in charge of the nuisance
    so enjoined had received five days'' notice of the hearing and unless that person
    shows to the satisfaction of the court or judge that the nuisance complained of
    is abated or that he proceeded forthwith to enforce his rights under section


    3767.10


    of the Revised Code, the court or judge forthwith shall issue an order closing
    the place against its use for any purpose of lewdness, assignation, prostitution,
    or other prohibited conduct until a final decision is rendered on the complaint
    for the requested permanent injunction. Except as provided in division (C) of
    this section, the order closing the place also shall continue in effect for that
    further period any restraining order already issued under division (B)(2) of this
    section, or, if a restraining order was not so issued, the order closing the place
    shall include an order restraining for that further period the removal or interference
    with the personal property and contents located in the place. The order closing
    the place shall be served and an inventory of the personal property and contents
    situated in the place shall be made and filed as provided in division (B)(2) of
    this section for restraining orders.


    (C) The owner of any real or personal property closed or restrained or to be closed
    or restrained may appear in the court of common pleas between the time of the
    filing of the complaint for the permanent injunction described in division (A)
    of this section and the hearing on the complaint, and, if all costs incurred are
    paid and if the owner of the real property files a bond with sureties approved
    by the clerk, in the full value of the real property as ascertained by the court
    or, in vacation, by the judge, and conditioned that the owner of the real property
    immediately will abate the nuisance and prevent it from being established or kept
    until the decision of the court or judge is rendered on the complaint for the
    permanent injunction, the court or judge in vacation, if satisfied of the good
    faith of the owner of the real property and of innocence on the part of any owner
    of the personal property of any knowledge of the use of the personal property
    as a nuisance and that, with reasonable care and diligence, the owner of the personal
    property could not have known of its use as a nuisance, shall deliver the real
    or personal property, or both, to the respective owners and discharge or refrain
    from issuing at the time of the hearing on the application for the temporary injunction
    any order closing the real property or restraining the removal or interference
    with the personal property. The release of any real or personal property under
    this division shall not release it from any judgment, lien, penalty, or liability
    to which it may be subjected.'
