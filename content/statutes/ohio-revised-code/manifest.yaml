- section: '1345.65'
  title: Contract contents.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.65
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.65/3-28-1985/1345.65-3-28-1985.pdf
  text: 'Every contract for invention development services shall set forth in boldface
    type of not less than ten-point size, or in capital letters of a size not less
    than that used in a standard office typewriter, both of the following:


    (A) The terms and conditions of payment and contract revocation rights required
    by section


    1345.62


    of the Revised Code.


    (B) The name and principal place of business in Ohio of the invention developer.
    In the event that a substantial portion of the contractual services are to be
    performed outside of the state of Ohio, the name and address of the invention
    developer who will perform those services.'
