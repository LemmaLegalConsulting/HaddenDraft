- section: '2715.30'
  title: Garnishee may pay money into court.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.30/8-26-1982/2715.30-8-26-1982.pdf
  text: 'A garnishee under this chapter shall deliver the property in his hands or
    pay the money other than personal earnings owing by him to the defendant, or so
    much thereof as the court orders, into court in accordance with section


    2715.32


    of the Revised Code. He shall be discharged from liability to the defendant for
    property so delivered or money so paid and shall not be subjected to costs beyond
    those caused by his resistance of the claims against him.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
