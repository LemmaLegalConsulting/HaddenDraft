- section: '323.69'
  title: Complaint for foreclosure - dismissal by board.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.69
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.69/10-3-2023/323.69-10-3-2023.pdf
  text: '(A) Upon the completion of the title search required by section


    323.68


    of the Revised Code, the prosecuting attorney, representing the county treasurer,
    the county land reutilization corporation, or the certificate holder may file
    with the clerk of court a complaint for the foreclosure of each parcel of abandoned
    land appearing on the abandoned land list, and for the equity of redemption on
    each parcel. The complaint shall name all parties having any interest of record
    in the abandoned land that was discovered in the title search. The prosecuting
    attorney, county land reutilization corporation, or certificate holder may file
    such a complaint regardless of whether the parcel has appeared on a delinquent
    tax list or delinquent vacant land tax list published pursuant to division (B)
    of section


    5721.03


    of the Revised Code.


    (B)(1) In accordance with Civil Rule 4, the clerk of court promptly shall serve
    notice of the summons and the complaint filed under division (A) of this section
    to the last known address of the record owner of the abandoned land and to the
    last known address of each lienholder or other person having a legal or equitable
    ownership interest or security interest of record identified by the title search.
    The notice shall inform the addressee that delinquent taxes stand charged against
    the abandoned land; that the land will be sold at public auction or otherwise
    disposed of if not redeemed by the owner or other addressee; that the sale or
    transfer will occur at a date, time, and place, and in the manner prescribed in
    sections


    323.65


    to


    323.79


    of the Revised Code; that the owner or other addressee may redeem the land by
    paying the total of the impositions against the land at any time before confirmation
    of sale or transfer of the parcel as prescribed in sections


    323.65


    to


    323.79


    of the Revised Code or before the expiration of the alternative redemption period,
    as may be applicable to the proceeding; that the case is being prosecuted by the
    prosecuting attorney of the county in the name of the county treasurer for the
    county in which the abandoned land is located or by a certificate holder, whichever
    is applicable; of the name, address, and telephone number of the county board
    of revision before which the action is pending; of the board case number for the
    action, which shall be maintained in the official file and docket of the clerk
    of court; and that all subsequent pleadings, petitions, and papers associated
    with the case and filed by any interested party must be filed with the clerk of
    court and will become part of the case file for the board of revision.


    (2) The notice required by division (B)(1) of this section also shall inform the
    addressee that any owner of record may, at any time on or before the fourteenth
    day after service of process is perfected, file a pleading with the clerk of court
    requesting that the board transfer the case to a court of competent jurisdiction
    to be conducted in accordance with the applicable laws.


    (C) Subject to division (D) of this section, subsequent pleadings, motions, or
    papers associated with the case and filed with the clerk of court shall be served
    upon all parties of record in accordance with Civil Rules 4 and 5, except that
    service by publication in any case requiring such service shall require that any
    such publication shall be advertised in the manner, and for the time periods and
    frequency, prescribed in section


    5721.18


    of the Revised Code. Any inadvertent noncompliance with those rules does not serve
    to defeat or terminate the case, or subject the case to dismissal, as long as
    actual notice or service of filed papers is shown by a preponderance of the evidence
    or is acknowledged by the party charged with notice or service, including by having
    made an appearance or filing in relation to the case. The county board of revision
    may conduct evidentiary hearings on the sufficiency of process, service of process,
    or sufficiency of service of papers in any proceeding arising from a complaint
    filed under this section. Other than the notice and service provisions contained
    in Civil Rules 4 and 5, the Rules of Civil Procedure shall not be applicable to
    the proceedings of the board. The board of revision may utilize procedures contained
    in the Rules of Civil Procedure to the extent that such use facilitates the needs
    of the proceedings, such as vacating orders, correcting clerical mistakes, and
    providing notice to parties. To the extent not otherwise provided in sections


    323.65


    to


    323.79


    of the Revised Code, the board may apply the procedures prescribed by sections


    323.25


    to


    323.28


    or Chapters 5721., 5722., and 5723. of the Revised Code. Board practice shall
    be in accordance with the practice and rules, if any, of the board that are promulgated
    by the board under section


    323.66


    of the Revised Code and are not inconsistent with sections


    323.65


    to


    323.79


    of the Revised Code.


    (D)(1) A party shall be deemed to be in default of the proceedings in an action
    brought under sections


    323.65


    to


    323.79


    of the Revised Code if either of the following occurs:


    (a) The party fails to appear at any hearing after being served with notice of
    the summons and complaint by certified or ordinary mail.


    (b) For a party upon whom notice of summons and complaint is required by publication
    as provided under section


    5721.18


    of the Revised Code and has been considered complete pursuant to that section,
    the party fails to appear, move, or plead to the complaint within twenty-eight
    days after service by publication is considered complete.


    (2) If a party is deemed to be in default pursuant to division (D)(1) of this
    section, no further service of any subsequent pleadings, papers, or proceedings
    is required on the party by the court or any other party.


    (E) At any time after a foreclosure action is filed under this section, the county
    board of revision may, upon its own motion, transfer the case to a court pursuant
    to section


    323.691


    of the Revised Code if it determines that, given the complexity of the case or
    other circumstances, a court would be a more appropriate forum for the action.'
