- section: '4781.28'
  title: Fees.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.28
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.28/1-21-2018/4781.28-1-21-2018.pdf
  text: 'The division of industrial compliance may charge a fee for an annual license
    to operate a manufactured home park. The fee for a license shall be determined
    in accordance with section


    4781.27


    of the Revised Code and shall include the cost of licensing and all inspections.


    Any fees collected shall be transmitted to the treasurer of state and shall be
    credited to the industrial compliance operating fund created in section


    121.084


    of the Revised Code and used only for the purpose of administering and enforcing
    sections


    4781.26


    to


    4781.35


    of the Revised Code and the rules adopted thereunder.'
