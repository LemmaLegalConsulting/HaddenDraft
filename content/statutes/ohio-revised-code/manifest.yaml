- section: '1309.623'
  title: Right to redeem collateral - UCC 9-623.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.623
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.623/7-1-2001/1309.623-7-1-2001.pdf
  text: '(A) A debtor, any secondary obligor, or any other secured party or lienholder
    may redeem collateral.


    (B) To redeem collateral, a person shall tender:


    (1) Fulfillment of all obligations secured by the collateral; and


    (2) The reasonable expenses and attorney''s fees described in division (A)(1)
    of section


    1309.615


    of the Revised Code.


    (C) A redemption may occur at any time before a secured party:


    (1) Has collected collateral under section


    1309.607


    of the Revised Code;


    (2) Has disposed of collateral or entered into a contract for its disposition
    under section


    1309.610


    of the Revised Code; or


    (3) Has accepted collateral in full or partial satisfaction of the obligation
    it secures under section


    1309.622


    of the Revised Code.'
