- section: '1345.78'
  title: Buyback violations.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.78
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.78/9-15-1999/1345.78-9-15-1999.pdf
  text: '(A) Failure to comply with section


    1345.76


    of the Revised Code, in connection with a consumer transaction as defined in division
    (A) of section


    1345.01


    of the Revised Code, is an unfair and deceptive act or practice in violation of
    division (A) of section


    1345.02


    of the Revised Code.


    (B) The attorney general shall investigate any alleged violation of division (D)
    of section


    1345.76


    of the Revised Code and, in an appropriate case, may bring an appropriate action
    in a court of competent jurisdiction, charging a manufacturer with a violation
    of that division.'
