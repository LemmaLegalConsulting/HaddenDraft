- section: '5303.32'
  title: Sale of property given for a religious use.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.32/10-1-1953/5303.32-10-1-1953.pdf
  text: When real estate, except burial grounds or cemeteries, has been donated, bequeathed,
    or otherwise entrusted to, or purchased by any person or trustee, for public religious
    use, but not to or for the use of a specific or particular religious society or
    denomination, or when it has been donated, bequeathed, or entrusted to, or purchased
    by a particular religious society or denomination, and abandoned for such use,
    the court of common pleas of the county in which it is located, on good cause
    shown, upon the petition of a citizen of the vicinity, may make an order for the
    sale of such property, whether or not it has been built upon or otherwise improved,
    and make such order as to costs and the disposition of the proceeds of the sale
    to such religious or other public use as is just and equitable. The purchaser
    shall be invested with as full and complete a title thereto as the character of
    the original grant for such religious use permits.
