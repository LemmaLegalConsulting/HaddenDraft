- section: '5301.24'
  title: Acquisition of property by state not to affect mortgage lien - state, a party.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.24
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.24/10-1-1953/5301.24-10-1-1953.pdf
  text: 'The lien or priority of any existing valid mortgage or lien shall not be
    affected by reason of the fact that this state or any political subdivision thereof
    acquires the property on which said lien exists, unless said property is acquired
    by regular judicial proceedings. The state, or any board or commission of the
    state, may be made a party in any court of common pleas or probate court, to any
    foreclosure proceedings, or other proceedings to sell real estate and marshal
    liens, to secure an adjudication concerning any claim, mortgage, or other lien
    which the state has or claims on the premises involved.


    Service of summons shall be made by the clerk of the court who shall, by registered
    mail, send service of summons and a copy of the petition to the attorney general.
    The answer day and other proceedings thereafter shall be the same as though a
    personal service had been made as of the date the return receipt is signed, and
    thereafter the procedure shall be the same as though a private corporation had
    been sued under the laws of this state.


    No subsequent statute shall modify or change this section unless such statute
    specifically provides that it is modifying or changing this section.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
