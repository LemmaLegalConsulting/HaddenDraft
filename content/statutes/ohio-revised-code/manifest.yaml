- section: '4781.43'
  title: Applying for release of rent.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.43
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.43/9-10-2012/4781.43-9-10-2012.pdf
  text: '(A) A park operator who receives notice that rent due the park operator has
    been deposited with a clerk of court pursuant to section


    4781.41


    of the Revised Code, may:


    (1) Apply to the clerk of court for release of the rent on the ground that the
    condition contained in the notice given pursuant to division (A) of section


    4781.41


    of the Revised Code has been remedied. The clerk shall forthwith release the rent,
    less costs, to the park operator if the resident gives written notice to the clerk
    that the condition has been remedied.


    (2) Apply to the court for release of the rent on the grounds that the resident
    did not comply with the notice requirement of division (A) of section


    4781.41


    of the Revised Code, or that the resident was not current in rent payments due
    under the rental agreement at the time the resident initiated rent deposits with
    the clerk of courts under division (B)(1) of section


    4781.41


    of the Revised Code;


    (3) Apply to the court for release of the rent on the grounds that there was no
    violation of any obligation imposed upon the park operator by section


    4781.38


    of the Revised Code or by the rental agreement, or by any building, housing, health,
    or safety code, or that the condition contained in the notice given pursuant to
    division (A) of section


    4781.41


    of the Revised Code has been remedied.


    (B) The resident shall be named as a party to any action filed by the park operator
    under this section, and shall have the right to file an answer and counterclaim,
    as in other civil cases. A trial shall be held within sixty days of the date of
    filing of the park operator''s complaint, unless for good cause shown the court
    grants a continuance.


    (C) If the court finds that there was no violation of any obligation imposed upon
    the park operator by section


    4781.38


    of the Revised Code or by the rental agreement, or by any building, housing, health,
    or safety code, or that the condition contained in the notice given pursuant to
    division (A) of section


    4781.41


    of the Revised Code has been remedied, or that the resident did not comply with
    the notice requirement of division (A) of section


    4781.41


    of the Revised Code, or that the resident was not current in rent payments at
    the time the resident initiated rent deposits with the clerk of court under division
    (B)(1) of section


    4781.41


    of the Revised Code, the court shall order the release to the park operator of
    rent on deposit with the clerk, less costs.


    (D) If the court finds that the condition contained in the notice given pursuant
    to division (A) of section


    4781.41


    of the Revised Code was the result of an act or omission of the resident, or that
    the resident intentionally acted in bad faith in proceeding under section


    4781.41


    of the Revised Code, the resident shall be liable for damages caused to the park
    operator, and for costs, together with reasonable attorneys'' fees if the resident
    intentionally acted in bad faith.'
