- section: '5301.55'
  title: Liberal construction of statutes.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.55
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.55/9-29-1961/5301.55-9-29-1961.pdf
  text: 'Sections


    5301.47


    to


    5301.56


    , inclusive, of the Revised Code, shall be liberally construed to effect the legislative
    purpose of simplifying and facilitating land title transactions by allowing persons
    to rely on a record chain of title as described in section


    5301.48


    of the Revised Code, subject only to such limitations as appear in section


    5301.49


    of the Revised Code.'
