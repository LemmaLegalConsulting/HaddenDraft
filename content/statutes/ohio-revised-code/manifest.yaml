- section: '5303.13'
  title: Judgment and execution on verdict for plaintiff.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.13/10-1-1953/5303.13-10-1-1953.pdf
  text: 'If, under section


    5303.11


    of the Revised Code, the jury reports a sum in favor of the plaintiff in ejectment
    on the assessment and valuation of the valuable and lasting improvements, the
    assessment of damages for waste, and the net annual value of the rents and profits,
    the court shall render a judgment therefor, without pleadings, and issue execution
    thereon as in other cases. In such case, or in cases in which no such excess is
    reported, such plaintiff is barred from having or maintaining an action for mesne
    profits.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
