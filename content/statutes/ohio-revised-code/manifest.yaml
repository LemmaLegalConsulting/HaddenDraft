- section: '1349.44'
  title: Report on financial institutions division operations.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.44
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.44/3-23-2018/1349.44-3-23-2018.pdf
  text: '(A) The superintendent of financial institutions shall report semiannually
    to the governor and the general assembly on the operations of the division of
    financial institutions with respect to the following:


    (1) Enforcement actions instituted by the superintendent for a violation of or
    failure to comply with any provision of Chapter 1322. of the Revised Code, and
    their final dispositions;


    (2) Suspensions, revocations, or refusals to issue or renew certificates of registration
    and licenses under Chapter 1322. of the Revised Code;


    (3) Outreach efforts of the office of consumer affairs to provide education regarding
    predatory lending, borrowing, and related financial topics.


    (B) The information required under divisions (A)(1) and (2) of this section does
    not include information that, pursuant to section


    1322.36


    of the Revised Code, is confidential.'
