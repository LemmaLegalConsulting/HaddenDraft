- section: '5301.39'
  title: When court to order clerk to make entry on record of mortgage.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.39
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.39/12-17-1973/5301.39-12-17-1973.pdf
  text: 'The court in which proceedings are commenced, relative to a mortgage or other
    lien, change of title, or partition of lands, the final judgment, order, or decree
    in which is to release or declare such mortgage or other lien void, in whole or
    in part, or require the judicial sale of property included in the mortgage or
    other lien, in case of failure to pay the amount secured thereby, or when the
    title has been changed by judgment or decree, or partition made and confirmed
    between tenants in common, at the rendition of such final judgment, order, or
    decree, shall make the necessary order for the proper entry of a memorandum, release,
    or satisfaction, by the clerk of such court, on the record of such mortgage or
    other lien, and in cases of change of title or partition, for the record of so
    much of the decree in the records in the office of the county recorder, as is
    necessary to show such change of title or partition.


    In a county in which the county recorder has determined to use the microfilm process
    as provided by section


    9.01


    of the Revised Code and has elected to require a separate instrument for satisfactions
    and other actions affecting mortgages and other liens on real property, the court
    order for proper entry as referred to in this section, or certified copy thereof,
    may constitute the separate instrument and shall be recorded according to the
    type of action involved.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 31942de65a367a5b2ed63ca934b62c6a49cb155592b2f2b4fb503cbdc7c15a64
