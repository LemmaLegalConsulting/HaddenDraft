- section: '1345.421'
  title: Surety bond where facility under construction and not available for service
    at time buyer signs contract.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.421
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.421/7-26-1984/1345.421-7-26-1984.pdf
  text: If the facility that is the subject of the contract is under construction,
    and is not available for service at the time the buyer signs the contract, the
    seller shall maintain a surety bond issued by a surety company authorized to do
    business in this state the principal sum of which shall be a minimum of ten thousand
    dollars. The seller is relieved from the obligation to maintain the bond twenty-four
    months after completion of the facility and commencement of service. The bond
    shall be in favor of the state of Ohio for the benefit of any person injured by
    having paid moneys for the use of a facility which fails to open within one hundred
    eighty days after the date upon which the buyer and seller entered into a contract,
    or closes within twenty-four months after completion of a facility and commencement
    of service. However, the aggregate liability of the surety to all persons for
    all breaches of the conditions of the bond provided herein shall in no event exceed
    the amount of the bond. Evidence of the bond shall be available for inspection
    upon request by the office of the attorney general, current contract holders,
    or prospective buyers.
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
  normalized_text_sha256: 9c386a812b6f5ee4b8285de59acc1712541020c5c9e5ac5b21e4bad4f7acee73
