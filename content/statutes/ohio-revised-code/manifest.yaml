- section: '323.68'
  title: Title search to identify persons with interest in land.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.68
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.68/4-7-2009/323.68-4-7-2009.pdf
  text: '(A)(1) For each parcel subject to foreclosure under sections


    323.65


    to


    323.79


    of the Revised Code, the prosecuting attorney shall cause a title search to be
    conducted for the purpose of identifying any lienholders or other persons having
    a legal or equitable ownership interest or other security interest of record in
    such abandoned land.


    (2) If a certificate holder or a county land reutilization corporation compiles
    a list of the parcels that the certificate holder or corporation determines to
    be abandoned land under division (A) of section


    323.67


    of the Revised Code, the certificate holder or corporation shall cause a title
    search to be conducted for the purpose of identifying any lienholders or other
    persons having a legal or equitable ownership interest or other security interest
    of record in the abandoned land.


    (B) Notwithstanding section


    5301.252


    of the Revised Code, an affidavit of a type described in that section shall not
    be considered a lien or encumbrance on the abandoned land, and the recording of
    an affidavit of a type described in that section shall not serve in any way to
    impede the bona fide purchaser status of the purchaser of any abandoned land sold
    at public auction under sections


    323.65


    to


    323.79


    of the Revised Code or of any other recipient of abandoned land transferred under
    those sections. However, any affiant who records an affidavit pursuant to section


    5301.252


    of the Revised Code shall be given notice and summons under sections


    323.69


    to


    323.79


    of the Revised Code in the same manner as any lienholder.'
