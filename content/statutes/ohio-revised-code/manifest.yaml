- section: '3767.201'
  title: Destroying or removing barriers along limited access highways.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.201
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.201/9-28-1973/3767.201-9-28-1973.pdf
  text: No person, firm or corporation shall cut, injure, remove, or destroy any fence
    or other barrier designed and erected to prevent traffic from entering or leaving
    a limited access highway without the permission of the director of transportation,
    except in a case of emergency where life or property is in danger. No person,
    firm, or corporation shall cause a vehicle of any character to enter or leave
    a limited access highway at any point other than intersections designated by the
    director for such purpose, except in a case of emergency where life or property
    is in danger.
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
