- section: '1322.52'
  title: Buyer civil action; state civil action; criminal prosecution.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.52
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.52/9-1-2021/1322.52-9-1-2021.pdf
  text: '(A)(1) A buyer injured by a violation of section


    1322.07


    ,


    1322.40


    , or


    1322.46


    of the Revised Code may bring an action for recovery of damages.


    (2) Damages awarded under division (A)(1) of this section shall not be less than
    all compensation paid directly and indirectly to a registrant or mortgage loan
    originator from any source, plus reasonable attorney''s fees and court costs.


    (3) The buyer may be awarded punitive damages.


    (B)(1) The superintendent of financial institutions or a buyer may directly bring
    an action to enjoin a violation of any provision of this chapter. The attorney
    general may directly bring an action to enjoin a violation of any provision of
    this chapter with the same rights, privileges, and powers as those described in
    section


    1345.06


    of the Revised Code. The prosecuting attorney of the county in which the action
    may be brought may bring an action to enjoin a violation of any provision of this
    chapter only if the prosecuting attorney first presents any evidence of the violation
    to the attorney general and, within a reasonable period of time, the attorney
    general has not agreed to bring the action.


    (2) The superintendent may initiate criminal proceedings under this chapter by
    presenting any evidence of criminal violation to the prosecuting attorney of the
    county in which the offense may be prosecuted. If the prosecuting attorney does
    not prosecute the violations, or at the request of the prosecuting attorney, the
    superintendent shall present any evidence of criminal violations to the attorney
    general, who may proceed in the prosecution with all the rights, privileges, and
    powers conferred by law on prosecuting attorneys, including the power to appear
    before grand juries and to interrogate witnesses before such grand juries. These
    powers of the attorney general shall be in addition to any other applicable powers
    of the attorney general.


    (3) The prosecuting attorney of the county in which an alleged offense may be
    prosecuted may initiate criminal proceedings under this chapter.


    (4) In order to initiate criminal proceedings under this chapter, the attorney
    general shall first present any evidence of criminal violations to the prosecuting
    attorney of the county in which the alleged offense may be prosecuted. If, within
    a reasonable period of time, the prosecuting attorney has not agreed to prosecute
    the violations, the attorney general may proceed in the prosecution with all the
    rights, privileges, and powers described in division (B)(2) of this section.


    (5) When a judgment under this section becomes final, the clerk of court shall
    mail a copy of the judgment, including supporting opinions, to the superintendent.


    (C) The remedies provided by this section are in addition to any other remedy
    provided by law.


    (D) In any proceeding or action brought under this chapter, the burden of proving
    an exemption under those sections is on the person claiming the benefit of the
    exemption.


    (E) No person shall be deemed to violate any provision of this chapter with respect
    to any act taken or omission made in reliance on a written notice, written interpretation,
    or written report from the superintendent, unless there is a subsequent amendment
    to that written notice, written interpretation, written report from the superintendent,
    or those provisions, or rules promulgated thereunder, that affects the superintendent''s
    notice, interpretation, or report.


    (F) Upon disbursement of mortgage loan proceeds to or on behalf of the buyer,
    the registrant that assisted the buyer to obtain the mortgage loan is deemed to
    have completed the performance of the registrant''s services for the buyer and
    owes no additional duties or obligations to the buyer with respect to the mortgage
    loan. However, nothing in this division shall be construed to limit or preclude
    the civil or criminal liability of a registrant for failing to comply with this
    chapter or any rule adopted under this chapter, for failing to comply with any
    provision of or duty arising under an agreement with a buyer or lender under this
    chapter, or for violating any other provision of state or federal law.


    (G) A buyer injured by a violation of any of the sections specified in division
    (A)(1) of this section is precluded from recovering any damages, plus reasonable
    attorney''s fees and costs, if the buyer has also recovered any damages in a cause
    of action initiated under section


    1322.45


    of the Revised Code and the recovery of damages for a violation of any of the
    sections specified in division (A)(1) of this section is based on the same acts
    or circumstances as the basis for recovery of damages in section


    1322.45


    of the Revised Code.'
