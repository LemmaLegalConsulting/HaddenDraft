  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.07/7-21-2025/4112.07-7-21-2025.pdf
  text: 'Every person subject to division (A), (B), (C), (D), or (E) of section


    4112.02


    of the Revised Code shall post in a conspicuous place or places on the person''s
    premises, or on the internet in a manner that is accessible to the public, a notice
