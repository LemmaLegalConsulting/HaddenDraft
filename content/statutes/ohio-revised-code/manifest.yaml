- section: '2737.12'
  title: Objections to sureties.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.12/8-26-1982/2737.12-8-26-1982.pdf
  text: 'The movant or the respondent may object to the surety of the other by filing
    with the court within ten days after the filing of the surety''s bond an exception
    to the sufficiency of the surety. All objections to sureties are otherwise waived.
    When an exception to a surety is made, that surety shall show to the court that
    it is sufficient to fulfill the obligations of its bond. After an exception has
    been made, the levying officer may execute the order of possession in accordance
    with section


    2737.09


    of the Revised Code, but shall not take any further action until the surety is
    found by the court to be sufficient or is replaced by sufficient surety.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
