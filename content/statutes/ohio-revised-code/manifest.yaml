- section: '5321.06'
  title: Terms and conditions of rental agreement.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.06/11-4-1974/5321.06-11-4-1974.pdf
  text: A landlord and a tenant may include in a rental agreement any terms and conditions,
    including any term relating to rent, the duration of an agreement, and any other
    provisions governing the rights and obligations of the parties that are not inconsistent
    with or prohibited by Chapter 5321. of the Revised Code or any other rule of law.
