- section: '3767.14'
  title: Prohibition against throwing refuse, oil, or filth into lakes, streams, or
    drains.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.14/10-1-1953/3767.14-10-1-1953.pdf
  text: No person shall intentionally throw, deposit, or permit to be thrown or deposited,
    coal dirt, coal slack, coal screenings, or coal refuse from coal mines, refuse
    or filth from a coal oil refinery or gasworks, or whey or filthy drainage from
    a cheese factory, into a river, lake, pond, or stream, or a place from which it
    may wash therein. No person shall cause or permit petroleum, crude oil, refined
    oil, or a compound, mixture, residuum of oil or filth from an oil well, oil tank,
    oil vat, or place of deposit of crude or refined oil, to run into or be poured,
    emptied, or thrown into a river, ditch, drain, or watercourse, or into a place
    from which it may run or wash therein. Prosecution for a violation of this section
    must be brought in the county in which such coal mine, coal oil refinery, gasworks,
    cheese factory, oil well, oil tank, oil vat, or place of deposit of crude or refined
    oil is situated.
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
  normalized_text_sha256: 44dff66f681fa21457122bade7ca6cdda6d07b6dc052297d481b3a26785859a1
