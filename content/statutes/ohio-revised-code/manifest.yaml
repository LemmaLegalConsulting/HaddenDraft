- section: '2329.151'
  title: Conduct of judicial sale.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.151
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.151/9-28-2016/2329.151-9-28-2016.pdf
  text: 'Except as provided in sections


    2329.152


    to


    2329.154


    of the Revised Code, all public auctions of goods, chattels, or lands levied upon
    by execution shall be conducted personally by one of the following:


    (A) An officer of the court;


    (B) For the public auction of goods and chattels, a resident of this state licensed
    as an auctioneer under Chapter 4707. of the Revised Code;


    (C) For the public auction of lands, a private selling officer.'
