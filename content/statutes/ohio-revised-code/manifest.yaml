- section: '1923.03'
  title: Judgment not a bar.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.03/3-17-1987/1923.03-3-17-1987.pdf
