- section: '5301.16'
  title: Execution of conveyance by state when purchaser dies before deed made.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.16
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.16/10-1-1953/5301.16-10-1-1953.pdf
  text: When the purchaser of land from the state dies before a deed is made, and
    the lands pass to another by descent or devise, and the title still remains in
    him, or when the person to whom the lands have so passed has conveyed them or
    his interest therein to another person, by deed of general warranty or quitclaim,
    upon the proof of such facts being made to him and the attorney general, the governor
    shall execute the deed directly to the person entitled to the lands, although
    such person derives his title through one or more successive conveyances from
    the person to whom the lands passed by descent or devise.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
