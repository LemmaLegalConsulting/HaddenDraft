- section: '4112.022'
  title: Unlawful discriminatory practice of educational institution.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.022
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.022/3-17-2000/4112.022-3-17-2000.pdf
  text: 'As used in this section, "educational institution" means a state university
    or college, state-assisted institution of higher education, nonprofit educational
    institution described in Chapter 1713. of the Revised Code, or institution registered
    under Chapter 3332. of the Revised Code.


    It shall be an unlawful discriminatory practice for any educational institution
    to discriminate against any individual on account of any disability:


    (A) In admission or assignment to any academic program, course of study, internship,
    or class offered by the institution;


    (B) In permitting participation in any activity that is sponsored by the institution
    or that takes place on property owned, operated, or controlled by the institution;


    (C) In the awarding of any form of financial aid or other benefits available to
    students;


    (D) In admission or assignment to housing or other facilities owned, operated,
    or controlled by the institution;


    (E) In awarding of grades or granting of certificates, diplomas, or degrees offered
    by the institution.


    Nothing in this section prohibits any educational institution from establishing
    bona fide requirements or standards for admission or assignment to academic programs,
    courses, internships, or classes; for permitting participation in activities;
    for awarding of financial aid or other benefits; or for the granting of grades,
    certificates, diplomas, or degrees, which requirements or standards may include
    reasonable qualifications for demonstrating necessary skill, aptitude, physical
    capability, intelligence, and previous education.


    Nothing in this section requires any educational institution to construct, reconstruct,
    improve, enlarge, or alter any building, facility, or property owned, operated,
    or controlled by the institution, in any manner, for the purpose of making the
    building, facility, or property accessible to persons with a disability, provided
    that this section does not exempt an educational institution from compliance with
    standards adopted under section


    3781.111


    of the Revised Code.'
