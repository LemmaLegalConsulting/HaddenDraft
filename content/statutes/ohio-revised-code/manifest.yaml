- section: '5301.02'
  title: Words necessary to create a fee simple estate.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.02/10-1-1953/5301.02-10-1-1953.pdf
  text: The use of terms of inheritance or succession are not necessary to create
    a fee simple estate, and every grant, conveyance, or mortgage of lands, tenements,
    or hereditaments shall convey or mortgage the entire interest which the grantor
    could lawfully grant, convey, or mortgage, unless it clearly appears by the deed,
    mortgage, or instrument that the grantor intended to convey or mortgage a less
    estate.
