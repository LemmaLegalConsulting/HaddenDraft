- section: '1319.06'
  title: Husband and wife must join in chattel mortgage on household property.
  url: https://codes.ohio.gov/ohio-revised-code/section-1319.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1319
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1319/1319.06/10-1-1953/1319.06-10-1-1953.pdf
  text: 'No husband or wife shall create any lien by chattel mortgage or otherwise
    upon any personal household property owned by either or both of them, without
    the joint consent of both husband and wife. No such mortgage is valid unless executed
    by both husband and wife.


    This section does not apply to any mortgage or lien for the purchase price of
    such property.'
