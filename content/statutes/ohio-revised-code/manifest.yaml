- section: '5301.88'
  title: Filing and recording of environmental covenants.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.88
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.88/12-30-2004/5301.88-12-30-2004.pdf
  text: '(A) Except as otherwise provided in division (B) of this section, an environmental
    covenant and any amendment or termination of the environmental covenant shall
    be filed in the office of the county recorder of each county in which the real
    property that is subject to the environmental covenant is located and shall be
    recorded in the same manner as a deed to the property. For purposes of indexing,
    a holder shall be treated as a grantee.


    (B) Pursuant to Chapter 5309. of the Revised Code, an environmental covenant and
    any amendment or termination of the environmental covenant in connection with
    registered land, as defined in section


    5309.01


    of the Revised Code, shall be entered as a memorial on the page of the register
    where the title of the owner is registered.


    (C) Except as otherwise provided in division (C) of section


    5301.89


    of the Revised Code, an environmental covenant is subject to the laws of this
    state governing recording and priority of interest in real property.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
