- section: '3767.25'
  title: Venue.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.25
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.25/8-11-1955/3767.25-8-11-1955.pdf
  text: 'An offense charged under sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, shall be held to be committed in any county
    whose inhabitants are, or have been, aggrieved thereby. The continuance of such
    nuisance for five days after the prosecution thereof is begun is an additional
    offense.'
