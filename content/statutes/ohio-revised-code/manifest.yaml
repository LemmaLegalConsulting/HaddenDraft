- section: '5301.32'
  title: Assignment or partial release by separate instrument.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.32/1-30-2014/5301.32-1-30-2014.pdf
  text: 'A mortgage may be assigned or partially released by a separate instrument
    of assignment or partial release, acknowledged as provided by section


    5301.01


    of the Revised Code. The separate instrument of assignment or partial release
    shall be recorded in the county recorder''s official records. The county recorder
    shall be entitled to charge the fee for that recording as provided by section


    317.32


    of the Revised Code for recording deeds. The signature of a person on the assignment
    or partial release may be a facsimile of that person''s signature. A facsimile
    of a signature on an assignment or partial release is equivalent to and constitutes
    the written signature of the person for all requirements regarding mortgage assignments
    or partial releases.


    In a county in which the county recorder has determined to use the microfilm process
    as provided by section


    9.01


    of the Revised Code, the county recorder may require that all assignments and
    partial releases of mortgages be by separate instruments. The original instrument
    bearing the proper endorsement may be used as the separate instrument.


    An assignment of a mortgage shall contain the then current mailing address of
    the assignee.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 320d8e16dc8e8395ff03b6fffd48f1b8f0a37454152288fa8784540b6fbf96c4
