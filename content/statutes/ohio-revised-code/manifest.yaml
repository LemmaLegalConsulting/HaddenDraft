- section: '2329.51'
  title: New appraisement.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.51
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.51/10-1-1953/2329.51-10-1-1953.pdf
  text: When real estate taken on execution and appraised, advertised, and offered
    for sale is unsold for want of bidders, the court from which the execution issued,
    on motion of the plaintiff, shall set aside such appraisement and order a new
    appraisement to be made, or shall set aside the levy and appraisement and award
    a new execution to issue. When such real estate or a part of it has been two times
    appraised and thereafter advertised and offered for sale, and is unsold for want
    of bidders, the court may direct the amount for which it shall be sold.
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
