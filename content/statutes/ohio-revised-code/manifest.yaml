- section: '2737.18'
  title: Action on bond.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.18/8-26-1982/2737.18-8-26-1982.pdf
  text: 'A party may seek recovery of damages awarded pursuant to section


    2737.14


    of the Revised Code and the costs of judgment execution against the other party''s
    surety on a bond filed pursuant to section


    2737.10


