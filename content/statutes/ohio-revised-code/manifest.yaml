- section: '2715.34'
  title: Payment of costs by plaintiff.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.34
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.34/10-1-1953/2715.34-10-1-1953.pdf
  text: 'If the plaintiff proceeds against the garnishee by action, as provided in
    section


    2715.33


    of the Revised Code, for the cause that his disclosure was unsatisfactory, unless
    it appears on the trial that such disclosure was incomplete, the plaintiff must
    pay the costs thereof. When the claim of the plaintiff in attachment is satisfied,
    on motion, the defendant may be substituted as the plaintiff in the judgment.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
