- section: '4722.08'
  title: Owners' causes of action.
  url: https://codes.ohio.gov/ohio-revised-code/section-4722.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4722
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4722/4722.08/8-31-2012/4722.08-8-31-2012.pdf
  text: 'For a violation of Chapter 4722. of the Revised Code, an owner has a cause
    of action and is entitled to relief as follows:


    (A) Where the violation was an act prohibited by section


    4722.02


    ,


    4722.03


    , or


    4722.04


    of the Revised Code, the owner may, in an individual action, rescind the transaction
    or recover the owner''s actual economic damages plus an amount not exceeding five
    thousand dollars in noneconomic damages.


    (B) In any action for rescission, revocation of the transaction must occur within
    a reasonable time after the owner discovers or should have discovered the ground
    for it and before any substantial change in condition of the subject of the transaction.


    (C) Any owner may seek a declaratory judgment, an injunction, or other appropriate
    relief against an act or practice that violates this chapter.


    (D) The court may award to the prevailing party a reasonable attorney''s fee limited
    to the work reasonably performed, if either of the following apply:


    (1) The owner complaining of the act or practice that violated this chapter has
    brought or maintained an action that is groundless, and the owner filed or maintained
    the action in bad faith;


    (2) The home construction service supplier has knowingly committed an act or practice
    that violates this chapter.


    (E) As used in this section, "actual economic damages" means damages for direct,
    incidental, or consequential pecuniary losses resulting from a violation of Chapter
    4722. of the Revised Code and does not include damages for noneconomic loss as
    defined in section


    2315.18


    of the Revised Code.


    (F) Nothing in this section shall preclude an owner from also proceeding with
    a cause of action under any other theory of law.'
  raw_html_sha256: 231368761f93f5cdcc032fb43b3a2ad7b5b1eb83b4c748bb139227965a8142b9
