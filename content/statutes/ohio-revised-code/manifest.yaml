- section: '1923.061'
  title: Defenses - counterclaims.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.061
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.061/9-10-2012/1923.061-9-10-2012.pdf
  text: '(A) Any defense in an action under this chapter may be asserted at trial.


    (B) In an action for possession of residential premises based upon nonpayment
    of the rent or in an action for rent when the tenant or manufactured home park
    resident is in possession, the tenant or resident may counterclaim for any amount
    the tenant or resident may recover under the rental agreement or under Chapter
    4781. or 5321. of the Revised Code. In that event, the court from time to time
    may order the tenant or resident to pay into court all or part of the past due
    rent and rent becoming due during the pendency of the action. After trial and
    judgment, the party to whom a net judgment is owed shall be paid first from the
    money paid into court, and any balance shall be satisfied as any other judgment.
    If no rent remains due after application of this division, judgment shall be entered
    for the tenant or resident in the action for possession. If the tenant or resident
    has paid into court an amount greater than that necessary to satisfy a judgment
    obtained by the landlord, the balance shall be returned by the court to the tenant
    or resident.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
  normalized_text_sha256: 690d2e43b934b7e6d0000b1e45214949f68d85730a2dfd112909a0f305f0f45a
