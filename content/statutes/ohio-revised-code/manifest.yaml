- section: '2715.48'
  title: Bond.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.48
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.48/10-1-1953/2715.48-10-1-1953.pdf
  text: 'The party who appeals under section


    2715.47


    of the Revised Code must give a bond to the adverse party, with surety to be approved
    by the clerk of the court of appeals, in double the amount of the appraised value
    of the property attached, conditioned to pay such adverse party all damages sustained
    by him in consequence of filing such appeal, in the event of the discharge of
    the order of attachment by the court in which it is filed because the order was
    wrongfully obtained. When the appeal is filed and a bond is given, the sheriff
    or other officer shall continue to hold the property attached, subject to the
    further order of the court.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
