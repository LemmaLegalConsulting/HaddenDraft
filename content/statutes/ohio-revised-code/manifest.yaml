- section: '4112.023'
  title: Inherently military civilian job discrimination claims.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.023
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.023/3-24-2008/4112.023-3-24-2008.pdf
  text: The decision of Fisher v. Peters, 249 F.3d 433 (6th Cir. 2001), which held
    that if a person's civilian job is inherently military, the person must pursue
    military, rather than civilian, channels when pursuing employment discrimination
    claims, shall be applied when construing the prohibitions contained in this chapter
    against discrimination on the basis of a person's military status.
