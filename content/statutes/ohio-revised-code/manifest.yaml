- section: '4112.34'
  title: New African immigrants grant and gift fund.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.34
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.34/10-3-2023/4112.34-10-3-2023.pdf
  text: 'There is hereby created in the state treasury the new African immigrants
    grant and gift fund. The fund shall consist of money received as grants or gifts
    under section


    4112.31


    of the Revised Code and any money transferred or appropriated to the fund by the
    general assembly. The new African immigrants commission shall use the money to
    support the commission''s duties, including the operation of the office of new
    African immigrant affairs established under section


    4112.33


    of the Revised Code. Investment earnings of the fund shall be credited to the
    fund.'
