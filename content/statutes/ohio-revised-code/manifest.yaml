- section: '2737.13'
  title: Duty of levying officer after taking possession of property pursuant to order
    of possession.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.13/8-26-1982/2737.13-8-26-1982.pdf
  text: After the levying officer takes possession of property pursuant to an order
    of possession, and until the property is delivered to the movant, he shall keep
    the property in a secure place. If removal of the property from the address where
    it is detained would be unreasonably expensive, the levying officer may take possession
    by conspicuously placing a notice of possession on the property. The court may
    order a sale of the property if, because of its perishable nature or the existence
    of circumstances that would diminish its value, a sale would be for the benefit
    of the parties. The sale may be made in the manner and on the terms the court
    directs. The proceeds of the sale shall be deposited with the court until the
    entry of final judgment or dismissal of the action, which entry shall include
    an order for delivery of the proceeds of the sale to the successful party. The
    costs to the levying officer of taking possession, storing, or selling the property
    shall be taxed as costs in the action.
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
