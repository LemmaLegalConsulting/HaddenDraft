- section: '4112.09'
  title: Power to administer oaths, take affidavits and acknowledgments, and attest
    execution of instrument in writing.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.09/4-6-2017/4112.09-4-6-2017.pdf
  text: 'The executive director, administrative law judge, compliance officer, each
    field investigator, field coordinator, mediator, regional director, and supervisor
    of the Ohio civil rights commission, and any person appointed and commissioned
    as a notary public in this state, with respect to matters relating to official
    duties, may administer oaths, take affidavits, and acknowledgements, and attest
    the execution of any instrument in writing. The executive director shall file
    in the office of the secretary of the state the name and residence address of
    the occupant of each of the offices listed in this section on a quarterly basis.


    The secretary of state shall record and index the filings required under this
    section and the filings shall be open to public inspection.'
