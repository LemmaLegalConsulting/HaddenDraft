- section: '1349.18'
  title: Printing credit card number and expiration date on receipt.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.18/7-1-2004/1349.18-7-1-2004.pdf
  text: '(A) No person or limited liability company that accepts credit cards for
    the transaction of business shall print more than the last five digits of the
    credit card account number, or print the expiration date of a credit card, on
    any receipt provided to the cardholder.


    (B) This section applies only to receipts that are electronically printed and
    does not apply to any transaction in which the sole means of recording the cardholder''s
    credit card account number is by handwriting or by an imprint or copy of the credit
    card.


    (C) A violation of this section is deemed an unfair or deceptive act or practice
    in violation of section


    1345.02


    of the Revised Code. A person injured by a violation of this section has a cause
    of action and is entitled to the same relief available to a consumer under section


    1345.09


    of the Revised Code, and all powers and remedies available to the attorney general
    to enforce sections


    1345.01


    to


    1345.13


    of the Revised Code are available to the attorney general to enforce this section.


    (D) As used in this section, "credit card" includes, but is not limited to, a
    credit card, charge card, debit card, or other card, code, device, or other means
    of access to a customer''s account for the purpose of obtaining money, property,
    labor, or services on credit, or for initiating an electronic fund transfer at
    a point-of-sale terminal, an automated teller machine, or a cash dispensing machine.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
