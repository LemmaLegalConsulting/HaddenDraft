- section: '4781.41'
  title: Effect of operator's noncompliance with rental agreement or statutes.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.41
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.41/9-10-2012/4781.41-9-10-2012.pdf
  text: '(A) If a park operator fails to fulfill any obligation imposed upon the park
    operator by section


    4781.38


    of the Revised Code or by the rental agreement, or the conditions of the premises
    are such that the resident reasonably believes that a park operator has failed
    to fulfill any such obligations, or a governmental agency has found that the premises
    are not in compliance with building, housing, health, or safety codes which apply
    to any condition of the residential premises that could materially affect the
    health and safety of an occupant, the resident may give notice in writing to the
    park operator specifying the acts, omissions, or code violations that constitute
    noncompliance with such provisions. The notice shall be sent to the person or
    place where rent is normally paid.


    (B) If a park operator receives the notice described in division (A) of this section
    and after receipt of the notice fails to remedy the condition within a reasonable
    time, considering the severity of the condition and the time necessary to remedy
    such condition, or within thirty days, whichever is sooner, and if the resident
    is current in rent payments due under the rental agreement, the resident may do
    one of the following:


    (1) Deposit all rent that is due and thereafter becomes due the park operator
    with the clerk of court of the municipal or county court having jurisdiction in
    the territory in which the residential premises are located;


    (2) Apply to the court for an order directing the park operator to remedy the
    condition. As part thereof, the resident may deposit rent pursuant to division
    (B)(1) of this section, and may apply for an order reducing the periodic rent
    due the park operator until such time as the park operator does remedy the condition,
    and may apply for an order to use the rent deposited to remedy the condition.
    In any order issued pursuant to this division, the court may require the resident
    to deposit rent with the clerk of court as provided in division (B)(1) of this
    section.'
