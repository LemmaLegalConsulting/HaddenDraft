  text: 'Notwithstanding section


    1303.35


    of the Revised Code, a buyer who executes a prepaid entertainment contract or
    a note in connection with such a contract may assert as a defense to a claim by
    a holder in due course, as defined in section


    1303.32


    of the Revised Code, any defense that the buyer may assert against the seller
    of the prepaid entertainment contract.'
