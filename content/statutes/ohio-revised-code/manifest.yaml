- section: '2715.44'
  title: Motion to discharge attachment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.44
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.44/8-26-1982/2715.44-8-26-1982.pdf
  text: Before judgment, upon reasonable notice to the plaintiff, the defendant may
    move to discharge an attachment as to the whole or any of the property attached.
    The motion shall promptly be heard and decided by the court.
