- section: '2329.05'
  title: Judgment of supreme court.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.05
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.05/10-1-1953/2329.05-10-1-1953.pdf
  text: 'A judgment of the supreme court for money shall bind the lands and tenements
    of the judgment debtor in any county from the time there is filed, docketed, and
    indexed, in the office of the clerk of the court of common pleas of such county,
    a certificate of such judgment, issued by the clerk of the supreme court or by
    the clerk of the court to which the mandate of the supreme court is directed or
    to which such judgment is finally remanded for execution, in like manner as is
    provided in sections


    2329.02


    and


    2329.04


    of the Revised Code. The goods and chattels of the judgment debtor shall be bound
    from the time they are seized in execution. This section does not affect the lien
    of any judgment which, having attached to property of a judgment debtor in any
    county, is preserved pending the review of such judgment upon appeal in the court
    of appeals or the supreme court.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
