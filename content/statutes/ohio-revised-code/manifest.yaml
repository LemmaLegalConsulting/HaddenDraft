- section: '2716.11'
  title: Garnishment of property, other than personal earnings of judgment debtor.
  url: https://codes.ohio.gov/ohio-revised-code/section-2716.11
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2716
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2716/2716.11/9-30-2008/2716.11-9-30-2008.pdf
  text: 'A proceeding for garnishment of property, other than personal earnings, may
    be commenced after a judgment has been obtained by a judgment creditor by the
    filing of an affidavit in writing made by the judgment creditor or the judgment
    creditor''s attorney setting forth all of the following:


    (A) The name of the judgment debtor whose property the judgment creditor seeks
    to garnish;


    (B) A description of the property;


    (C) The name and address of the garnishee who may have in the garnishee''s hands
    or control money, property, or credits, other than personal earnings, of the judgment
    debtor.'
