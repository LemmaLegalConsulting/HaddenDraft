- section: '5721.21'
  title: Validity of delinquent land tax certificate or master list of delinquent
    tracts.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.21
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.21/3-25-1987/5721.21-3-25-1987.pdf
  text: No issuance of a delinquent land tax certificate or delivery of a master list
    of delinquent tracts shall be invalid on account of its having been charged on
    the duplicate in a name other than that of the rightful owner, if in other respects
    it is sufficiently described on the duplicate, and the taxes, assessments, interest,
    and penalty set forth in said certificate or master list were due and unpaid at
    that time.
