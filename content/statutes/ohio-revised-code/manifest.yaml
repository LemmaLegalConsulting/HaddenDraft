- section: '5303.25'
  title: Report and confirmation of sale and deed.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.25
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.25/10-1-1953/5303.25-10-1-1953.pdf
  text: 'A sale of an estate described in section


    5303.21


    of the Revised Code shall be reported to the court of common pleas authorizing
    such sale. On examination thereof, if it appears that the sale was fairly conducted
    and made, and that the price obtained is the reasonable value of the estate sold,
    the court shall confirm the sale and direct a deed of conveyance of the premises
    sold to be made to the purchaser on payment of the purchase money, or on securing
    its payment as the court approves.'
