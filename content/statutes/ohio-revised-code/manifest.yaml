- section: '2716.01'
  title: Garnishing personal earnings or property of judgment debtor.
  url: https://codes.ohio.gov/ohio-revised-code/section-2716.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2716
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2716/2716.01/3-22-2001/2716.01-3-22-2001.pdf
  text: '(A) A person who obtains a judgment against another person may garnish the
    personal earnings of the person against whom judgment was obtained only through
    a proceeding in garnishment of personal earnings and only in accordance with this
    chapter.


    (B) A person who obtains a judgment against another person may garnish the property,
    other than personal earnings, of the person against whom judgment was obtained,
    if the property is in the possession of a person other than the person against
    whom judgment was obtained, only through a proceeding in garnishment and only
    in accordance with this chapter.


    (C) As used in this chapter:


    (1) "Employer" means a person who is required to withhold taxes out of payments
    of personal earnings made to a judgment debtor.


    (2) "Personal earnings" means money, or any other consideration or thing of value,
    that is paid or due to a person in exchange for work, labor, or personal services
    provided by the person to an employer.


    (3) "Judgment creditor" means a person who has obtained a judgment in a civil
    action against another person.


    (4) "Judgment debtor" means a person against whom a judgment has been obtained
    in a civil action.


    (5) "Support order" has the same meaning as in section


    3119.01


    of the Revised Code.'
  raw_html_sha256: 507246b4fe973da2bfe8a4f7a926f711e0efffb253f6b1fb67e7f08308ba39aa
  normalized_text_sha256: c064a413615be0c896d5730b50e411980074257e256736bc5096e2ee99cc5552
  effective_date: March 22, 2001
