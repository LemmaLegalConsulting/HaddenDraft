- section: '5301.43'
  title: Certified copy of record of instrument as evidence.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.43
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.43/10-1-1953/5301.43-10-1-1953.pdf
  text: A copy of the record of a deed or other instrument of writing, certified by
    the county recorder with his official seal affixed thereto, shall be received
    in all courts and places within this state, as prima-facie evidence of the existence
    of such instrument, and as conclusive evidence of the existence of such record.
