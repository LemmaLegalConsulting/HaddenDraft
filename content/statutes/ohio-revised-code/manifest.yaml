  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.70/3-14-1980/5301.70-3-14-1980.pdf
  text: 'Conservation easements are not unenforceable for lack of privity of contract
    or estate or lack of benefit to a particular dominant estate. Conservation easements
    are assignable to another entity authorized to hold conservation easements. Nothing
    in sections


    5301.67


    to


    5301.70


    of the Revised Code affects the enforceability of any article of dedication, restriction,
    easement, covenant, or condition that does not meet the requirements of those
    sections.


    The terms of a conservation easement may be enforced by injunction or in any other
    civil action by the holder of the easement.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
