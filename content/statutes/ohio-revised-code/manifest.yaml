- section: '1349.72'
  title: Product listing disclosure.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.72
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.72/7-6-2022/1349.72-7-6-2022.pdf
  text: An online marketplace shall disclose to consumers in a clear and conspicuous
    manner on the product listing of any high-volume third-party seller a reporting
    mechanism that allows for electronic and telephonic reporting of suspicious marketplace
    activity to the online marketplace.
