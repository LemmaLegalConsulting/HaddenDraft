- section: '1923.051'
  title: Judgment of restitution based on drug offenses taking place at leased premises.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.051
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.051/7-31-2003/1923.051-7-31-2003.pdf
  text: '(A) Notwithstanding the time-for-service of a summons provision of division
    (A) of section


    1923.06


    of the Revised Code, if the complaint described in section


    1923.05


    of the Revised Code that is filed by a landlord in an action under this chapter
    states that the landlord seeks a judgment of restitution based on the grounds
    specified in divisions (A)(6)(a) and (b) of section


    1923.02


    of the Revised Code, then the clerk of the municipal court, county court, or court
    of common pleas in which the complaint is filed shall cause both of the following
    to occur:


    (1) The service and return of the summons in the action in accordance with the
    Rules of Civil Procedure, which service shall be made, if possible, within three
    working days after the filing of the complaint;


    (2) The action to be set for trial not later than the thirtieth calendar day after
    the date that the tenant is served with a copy of the summons in accordance with
    division (A)(1) of this section.


    (B) The tenant in an action under this chapter as described in division (A) of
    this section is not required to file an answer to the complaint of the landlord,
    and may present any defenses that the tenant may possess at the trial of the action
    in accordance with section


    1923.061


    of the Revised Code.


    (C) No continuances of an action under this chapter as described in division (A)
    of this section shall be permitted under section


    1923.08


    of the Revised Code, and if the tenant in the action does not appear at the trial
    and the summons in the action was properly served in accordance with division
    (A)(1) of this section, then the court shall try the action in accordance with
    section


    1923.07


    of the Revised Code.


    (D) All provisions of this chapter that are not inconsistent with this section
    shall apply to an action under this chapter as described in division (A) of this
    section.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
