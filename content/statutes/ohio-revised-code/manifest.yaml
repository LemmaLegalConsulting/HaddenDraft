- section: '2329.16'
  title: Another levy allowed.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.16
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.16/10-1-1953/2329.16-10-1-1953.pdf
  text: When a writ is issued directing the sale of property previously taken in execution,
    the officer who issues the writ, if requested by the person entitled to the benefit
    thereof, his agent or attorney, shall add thereto a command to the officer to
    whom it is directed, that if, in his opinion, the property remaining in his hands
    not sold is insufficient to satisfy the judgment, he shall levy the writ upon
    lands and tenements, goods and chattels, or either, of the judgment debtor, as
    the law permits, sufficient to satisfy the debt.
