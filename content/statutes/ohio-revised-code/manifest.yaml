- section: '4781.42'
  title: Rent deposits.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.42
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.42/9-10-2012/4781.42-9-10-2012.pdf
  text: '(A) Whenever a resident deposits rent with the clerk of a court as provided
    in section


    4781.41


    of the Revised Code, the clerk shall give written notice of this fact to the park
    operator and to the park operator''s agent, if any.


    (B) The clerk shall place all rent deposited with the clerk in a separate rent
    escrow account in the name of the clerk in a bank or building and loan association
    domiciled in this state.


    (C) The clerk shall keep in a separate docket an account of each deposit, with
    the name and address of the resident, and the name and address of the park operator
    and of the park operator''s agent, if any.


    (D) For the clerk''s costs, the clerk may charge a fee of one per cent of the
    amount of the rent deposited, which shall be assessed as court costs.


    (E) All interest that has accrued on the rent deposited by the clerk of a county
    court under division (B) of this section shall be paid into the treasury of the
    political subdivision for which the clerk performs the clerk''s duties. All interest
    that has accrued on the rent deposited by the clerk of a municipal court under
    division (B) of this section shall be paid into the city treasury as defined in
    division (B) of section


    1901.03


    of the Revised Code.'
