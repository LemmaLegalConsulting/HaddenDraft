- section: '5303.17'
  title: Action by occupying claimant after election.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.17/10-1-1953/5303.17-10-1-1953.pdf
  text: 'When an application is made for the value of improvements to land, the occupying
    claimant or his heirs shall not be evicted from the possession of such land except
    as provided in sections


    5303.15


    and


    5303.16


    of the Revised Code. When an election has been made by the successful claimant,
    his heirs, or their guardians, to surrender the land, if the occupying claimant
    or his heirs, within the time allowed, pay into court its value, without improvements,
    thereafter they may bring suit in the courts which gave judgment of eviction,
    and obtain judgment for the title to the land, if it was not previously conveyed
    to such occupant.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
