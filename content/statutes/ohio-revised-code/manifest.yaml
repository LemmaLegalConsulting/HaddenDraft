- section: '2715.46'
  title: Appeal to reverse, vacate, or modify order of attachment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.46
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.46/3-17-1987/2715.46-3-17-1987.pdf
  text: A party to a suit affected by an order discharging or refusing to discharge
    an order of attachment may appeal on questions of law to reverse, vacate, or modify
    it as in other cases; and the original action shall proceed to trial and judgment
    as though no appeal had been taken.
