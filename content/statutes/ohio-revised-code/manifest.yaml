- section: '5721.021'
  title: Employing collectors to collect delinquent taxes.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.021
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.021/6-15-2004/5721.021-6-15-2004.pdf
  text: 'If the board of county commissioners serving a county with a population of
    at least two hundred thousand deems it necessary, it may, with the consent of
    the prosecuting attorney, authorize the county treasurer to employ collectors
    to collect the delinquent taxes on the list mentioned in section


    5721.011


    of the Revised Code, or part thereof, and fix the compensation of such collectors,
    and provide for the reasonable and necessary expenses of such collectors in the
    pursuit of their duties, which shall be paid out of the county treasury. All such
    compensation and expenses shall be apportioned ratably by the county auditor among
    all the funds entitled to share in the distribution of the taxes. As used in this
    section, "delinquent taxes" has the same meaning as under division (E) of section


    323.01


    of the Revised Code.'
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
