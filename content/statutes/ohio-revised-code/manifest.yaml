- section: '2329.20'
  title: Land not to be sold for less than two thirds of appraised value.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.20
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.20/9-28-2016/2329.20-9-28-2016.pdf
  text: 'Except as otherwise provided in this section or sections


    2329.51


    and


    2329.52


    of the Revised Code, no tract of land shall be sold for less than two-thirds the
    amount of the appraised value as determined pursuant to section


    2329.17


    of the Revised Code. In all cases in which a junior mortgage or other junior lien
    is sought to be enforced against real estate by an order, judgment, or decree
    of court, subject to a prior lien thereon, and such prior lien, and the claims
    or obligations secured thereby, are unaffected by such order, judgment, or decree,
    the court making such order, judgment, or decree, may determine the minimum amount
    for which such real estate may be sold. In such a case, the minimum amount shall
    be not less than two-thirds of the difference between the appraised value of the
    real estate as determined in that section, and the amount remaining unpaid on
    the claims or obligations secured by such prior lien.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
