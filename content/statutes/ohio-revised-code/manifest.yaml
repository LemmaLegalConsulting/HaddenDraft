- section: '5301.46'
  title: Assignment, release, or cancellation of interest made by separate instrument
    to contain description.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.46
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.46/10-10-1991/5301.46-10-10-1991.pdf
  text: '(A) As used in this section, "separate instrument" means an instrument other
    than the writing in which was created the interest in real property that is being
    assigned, released, or canceled.


    (B) In any county that maintains sectional indexes pursuant to section


    317.20


    of the Revised Code, each assignment, release, or cancellation of an interest
    in real property that is made by a separate instrument shall contain a description
    of the real property that is subject to the interest sufficient to enable the
    county recorder to index the assignment, release, or cancellation correctly, and
    the description shall include all of the following:


    (1) The permanent parcel number, if there is one, for the real property;


    (2) The section, range, tract, subdivision, addition, lot, quarter, and municipal
    corporation, town, or township associated with the real property.


    (C) If division (B) of this section requires a description of the subject real
    property to be contained in an assignment, release, or cancellation of an interest
    in real property that is made by a separate instrument, the omission in the assignment,
    release, or cancellation of any part of the description does not invalidate that
    instrument.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 4fe1ff431c23c006c87397c7327ad927f00a455d7608373bb0b00f61a10b7a63
  effective_date: October 10, 1991
