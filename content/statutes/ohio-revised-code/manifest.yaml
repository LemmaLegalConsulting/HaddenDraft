- section: '1349.61'
  title: Sale of gift card expiring within two years of sale prohibited.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.61
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.61/7-3-2019/1349.61-7-3-2019.pdf
  text: '(A)(1) Subject to division (C) of this section, no person or entity shall
    sell a gift card to a purchaser containing an expiration date that is less than
    two years after the date the gift card is issued.


    (2) No person or entity, within two years after a gift card is issued, shall charge
    service charges or fees relative to that gift card, including dormancy fees, latency
    fees, or administrative fees, that have the effect of reducing the total amount
    for which the holder of the gift card may redeem the gift card.


    (B) A gift card sold without an expiration date is valid until redeemed or replaced
    with a new gift card.


    (C) Division (A) of this section does not apply to any of the following gift cards:


    (1) A gift card that is distributed by the issuer to a consumer pursuant to an
    awards, loyalty, or promotional program without any money or anything of value
    being given in exchange for the gift card by the consumer;


    (2) A gift card that is sold below face value at a volume discount to employers
    or to nonprofit and charitable organizations for fundraising purposes, if the
    expiration date on that gift card is not more than thirty days after the date
    of sale;


    (3) A gift card that is sold by a nonprofit or charitable organization for fundraising
    purposes;


    (4) A gift card that an employer gives to an employee if use of the gift card
    is limited to the employer''s business establishment, which may include a group
    of merchants that are affiliated with that business establishment;


    (5) A gift certificate issued in accordance with section


    1533.131


    of the Revised Code that may be used to obtain hunting and fishing licenses, fur
    taker, special deer, and special wild turkey permits, and wetlands habitat stamps;


    (6) A gift card that is usable with multiple, unaffiliated sellers of goods or
    services;


    (7) A gift card that an employer issues to an employee in recognition of services
    performed by the employee.


    (D) Whoever violates division (A)(2) of this section is liable to the holder for
    any amount that the redemption value of the gift card was reduced, any court costs
    incurred, and reasonable attorney''s fees.


    (E) As used in this section:


    (1) "Gift card" means a certificate, electronic card, or other medium issued by
    a merchant that evidences the giving of consideration in exchange for the right
    to redeem the certificate, electronic card, or other medium for goods, food, services,
    credit, or money of at least an equal value, including any electronic card issued
    by a merchant with a monetary value where the issuer has received payment for
    the full monetary value for the future purchase or delivery of goods or services
    and any certificate issued by a merchant where the issuer has received payment
    for the full monetary face value of the certificate for the future purchase or
    delivery of goods and services. "Gift card" does not include a prepaid calling
    card used to make telephone calls.


    (2) "Employee" means every person who may be required or directed by any employer,
    in consideration of direct or indirect gain or profit, to engage in any employment,
    or to go, or work, or be at any time in any place of employment.


    (3) "Employer" means every person, firm, corporation, agent, manager, representative,
    or other person having control or custody of any employment, place of employment,
    or employee.'
