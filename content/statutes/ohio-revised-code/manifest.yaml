- section: '5303.23'
  title: Order for sale and effect.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.23
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.23/10-1-1953/5303.23-10-1-1953.pdf
  text: 'Upon the hearing, if it is proved that a sale of an estate described in section


    5303.21


    of the Revised Code would be for the benefit of the tenant in tail, or for life,
    and do no substantial injury to the heirs in tail, or others in expectancy, succession,
    reversion, or remainder, the court shall direct a sale to be made, the manner
    thereof and appoint some suitable person to make it. Such sale shall vest the
    estate sold in the purchaser, free from the entailment, limitation, or condition.'
