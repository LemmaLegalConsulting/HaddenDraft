- section: '4112.13'
  title: Commission - powers and duties.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.13/4-6-2023/4112.13-4-6-2023.pdf
  text: '(A) In addition to any duties and responsibilities that the Ohio state university
    Bell national resource center may prescribe for the commission on African-Americans
    under section


    4112.12


    of the Revised Code, the commission shall do all of the following:


    (1) Oversee and supervise four separate and distinct subcommittees devoted to
    solving problems and advancing recommendations exclusively pertinent to African-Americans
    in the areas of unemployment, criminal justice, education, and health;


    (2) Conduct research to determine the nature and extent of the problems concerning
    African-Americans in the four areas targeted in division (A)(1) of this section;


    (3) Hold public hearings for the purpose of collecting data;


    (4) Identify existing federal, state, and local programs that address problems
    and solutions relevant to the four targeted areas of study;


    (5) Implement appropriate new programs and demonstration projects especially designed
    for African-Americans;


    (6) Develop and implement community education and public awareness programs especially
    designed for African-Americans;


    (7) Develop strategies to improve the social condition of African-Americans;


    (8) Report to the governor, the general assembly, the auditor of state, the secretary
    of state, the attorney general, and the chief justice of the Ohio supreme court
    at least biennially on the activities, findings, and recommendations of the commission;


    (9) Accept gifts, grants, donations, contributions, benefits, and other funds
    from any public agency or private source to carry out any or all of the commission''s
    powers or duties. Such funds shall be deposited in the commission on African-Americans
    fund, which is hereby created in the state treasury. All gifts, grants, donations,
    contributions, benefits, and other funds received by the commission under division
    (A)(9) of this section, when appropriated to the commission, shall be used solely
    to support the operations of the commission.


    (B) The chairperson of the commission on African-Americans may appoint any number
    of individuals to serve on the subcommittees created in division (A)(1) of this
    section. Members of subcommittees serve at the discretion of the chairperson.'
  raw_html_sha256: 63e8f9c4a3ee07bd4b1b593bfbcf0432452b1114038f07f56e7880e64347160d
