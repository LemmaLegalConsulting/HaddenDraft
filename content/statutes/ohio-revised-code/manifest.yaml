- section: '2715.091'
  title: Leaving notice of attachment and copy of order with garnishee.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.091
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.091/3-19-1987/2715.091-3-19-1987.pdf
  text: '(A) When the plaintiff, his agent, or attorney, in the affidavit accompanying
    a motion for attachment filed under section


    2715.03


    of the Revised Code, states that he has good reason to believe, and does believe,
    that a person named in the affidavit has property of the defendant other than
    personal earnings in his possession, and the levying officer attempts to get possession
    of such property but cannot do so, he shall leave with the person a copy of the
    order of attachment, with a written notice that he appear in court and answer,
    as provided in section


    2715.29


    of the Revised Code. The person is the garnishee and the proceeding in relation
    to the garnishee is a garnishment proceeding. Any court of common pleas that issues
    an order of attachment has jurisdiction to serve process pursuant to this section
    upon a garnishee who does not reside within the jurisdiction of the court. Any
    county court or municipal court that issues an order of attachment has jurisdiction
    to serve process pursuant to this section upon a garnishee who resides in any
    county that is contiguous to that in which the court is located. When the garnishee
    does not reside within the jurisdiction of the court that issued the order, the
    process may be served by the proper officer of the county in which the garnishee
    resides, or may be personally served.


    If the garnishee is an individual, a copy of the order and notice shall be served
    upon him personally, or left at his usual place of residence. When a partnership
    is garnisheed by its company name, a copy of the order and notice shall be left
    at its usual place of doing business, or with a member of such partnership. If
    the garnishee is a corporation, a copy of the order and notice shall be left with
    an officer or a managing or general agent of the corporation. If such corporation
    is a railroad company, a copy of the order and notice may be left with a regular
    ticket or freight agent thereof, in any county in which the railroad is located.


    (B) This section applies only to property of a defendant other than personal earnings
    and only prior to the entry of judgment against a defendant. Garnishment of personal
    earnings may be granted only after a judgment has been obtained by the plaintiff,
    and only pursuant to Chapter 2716. of the Revised Code. Garnishment of property
    other than personal earnings of a person against whom judgment has been entered
    may be granted only pursuant to Chapter 2716. of the Revised Code.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: 3276f7678eb8ee09af345ccc666ea0bd5d04f7e17d39d094e28bbc145cbd9161
