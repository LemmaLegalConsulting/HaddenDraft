- section: '1349.76'
  title: Legislative intent.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.76
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.76/7-6-2022/1349.76-7-6-2022.pdf
  text: 'The intent of the general assembly in enacting sections


    1349.65


    to


    1349.76


    of the Revised Code is to establish a statewide, comprehensive enactment that
    applies to all parts of the state, operates uniformly throughout the state, and
    sets forth police regulations. No political subdivision as defined in section


    2744.01


    of the Revised Code shall establish, mandate, or otherwise require online marketplaces
    or sellers to undertake different or additional measures to verify or disclose
    the same information as or information similar to that which is the subject of
    sections


    1349.65


    to


    1349.73


    of the Revised Code.'
