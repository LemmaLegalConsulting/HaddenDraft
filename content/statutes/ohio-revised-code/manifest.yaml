  text: 'When it is necessary to ascertain the amount or value of personal property
    exempt under sections


    2329.63


    to


    2329.71


    of the Revised Code, it shall be estimated and appraised by two disinterested
    householders of the county, who shall be selected by the officer holding the execution
    and sworn by the officer to impartially make the appraisement.'
