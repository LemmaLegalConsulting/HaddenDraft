- section: '1349.33'
  title: Rules adopting similar provisions where federal law is amended or modified.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.33
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.33/5-24-2002/1349.33-5-24-2002.pdf
  text: '(A) Notwithstanding any provision of sections


    1349.25


    to


    1349.36


    of the Revised Code, or any rule adopted thereunder, if the "Home Ownership and
    Equity Protection Act of 1994," 108 Stat. 2190, 15 U.S.C.A. 1601 note, as amended,
    or any regulation adopted thereunder by the federal reserve board, as amended,
    is amended or otherwise modified after the effective date of this section, the
    superintendent of financial institutions may by rule adopt similar provisions.
    If an amendment or other modification to the "Home Ownership and Equity Protection
    Act of 1994" requires the adoption of implementing regulations by the federal
    reserve board, the superintendent shall not adopt any rule under the authority
    of this section until those regulations are adopted.


    (B) The superintendent shall adopt the rules authorized by division (A) of this
    section in accordance with section


    111.15


    of the Revised Code. Chapter 119. of the Revised Code does not apply to rules
    adopted under the authority of this section.


    (C) A rule adopted by the superintendent under the authority of this section is
    effective on the later of the following dates:


    (1) The date the superintendent issues the rule;


    (2) The date the regulation, rule, interpretation, procedure, or guideline the
    superintendent''s rule is based on becomes effective.


    (D) The superintendent may, upon thirty days'' written notice, revoke any rule
    adopted under the authority of this section. A rule adopted under the authority
    of this section, and not revoked by the superintendent, lapses and has no further
    force and effect thirty months after its effective date.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: 1c0bc5abd323ca1d3d2d991224a845cea5e6f830cf937d3fe13bee564199ebb7
