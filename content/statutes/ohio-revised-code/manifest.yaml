- section: '5301.34'
  title: Release of mortgage on certificate of mortgagee or assignee.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.34
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.34/1-30-2014/5301.34-1-30-2014.pdf
  text: 'A mortgage shall be discharged upon the record of the mortgage by the county
    recorder when there is presented to the county recorder a certificate executed
    by the mortgagee or the mortgagee''s assigns, acknowledged as provided in section


    5301.01


    of the Revised Code, or when there is presented to the recorder a deed of release
    executed by the governor as provided in section


    5301.19


    of the Revised Code, certifying that the mortgage has been fully paid and satisfied.
    In addition to the discharge on the records by the county recorder, such certificate
    shall be recorded in the official records kept by the county recorder. The county
    recorder is entitled to the fees for such recording as provided by section


    317.32


    of the Revised Code for recording deeds.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
