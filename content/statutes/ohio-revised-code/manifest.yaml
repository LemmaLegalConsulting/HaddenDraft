- section: '1923.08'
  title: Continuance and bond.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.08/3-17-1987/1923.08-3-17-1987.pdf
  text: No continuance in an action under this chapter shall be granted for a period
    longer than eight days, unless the plaintiff applies for the continuance and the
    defendant consents to it, or unless the defendant applies for the continuance
    and gives a bond to the plaintiff, with good and sufficient surety, that is approved
    by the court and conditioned for the payment of rent that may accrue, if judgment
    is rendered against the defendant.
