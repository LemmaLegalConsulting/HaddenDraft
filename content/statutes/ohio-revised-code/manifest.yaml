- section: '4781.32'
  title: Permit for developing in flood plain.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.32/1-21-2018/4781.32-1-21-2018.pdf
  text: '(A) No person shall cause development to occur or cause the replacement of
    a mobile or manufactured home within any portion of a manufactured home park that
    is located within a one-hundred-year flood plain unless the person first obtains
    a permit from the division of industrial compliance. If the development for which
    a permit is required under this division is to occur on a lot where a mobile or
    manufactured home is or is to be located, the owner of the home and the operator
    of the manufactured home park shall jointly obtain the permit. Each of the persons
    to whom a permit is jointly issued is responsible for compliance with the provisions
    of the approved permit that are applicable to that person.


    The division of industrial compliance shall disapprove an application for a permit
    required under this division unless the division finds that the proposed development
    or replacement of a mobile or manufactured home complies with the rules adopted
    under section


    4781.26


    of the Revised Code. No permit is required under this division for the construction,
    erection, or manufacture of any building to which section


    3781.06


    of the Revised Code applies.


    The division of industrial compliance may suspend or revoke a permit issued under
    this division for failure to comply with the rules adopted under section


    4781.26


    of the Revised Code pertaining to flood plain management or for failure to comply
    with the approved permit.


    Any person aggrieved by the disapproval, suspension, or revocation of a permit
    under this division by the division of industrial compliance may request a hearing
    on the matter within thirty days after receipt of the notice of the disapproval,
    suspension, or revocation. The hearing shall be held in accordance with Chapter
    119. of the Revised Code. Thereafter, an appeal of the disapproval, suspension,
    or revocation may be taken in the manner provided in section


    119.12


    of the Revised Code.


    (B) The division of industrial compliance shall establish fees for the issuance
    of permits under division (A) of this section and for necessary inspections conducted
    to determine compliance with those permits.


    (C) The division of industrial compliance shall charge the appropriate fee established
    under division (B) of this section for the issuance of a permit under division
    (A) of this section or for conducting any necessary inspection to determine compliance
    with the permit. If the division issues such a permit or conducts such an inspection,
    the fee for the permit or inspection shall be transmitted to the treasurer of
    state and shall be credited to the industrial compliance operating fund created
    in section


    121.084


    of the Revised Code. Moneys so credited to the fund shall be used only for the
    purpose of administering and enforcing sections


    4781.26


    to


    4781.35


    of the Revised Code and rules adopted under those sections.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
