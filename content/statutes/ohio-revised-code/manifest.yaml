- section: '1309.609'
  title: Secured party's right to take possession after default - UCC 9-609.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.609
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.609/7-1-2001/1309.609-7-1-2001.pdf
  text: '(A) After default, a secured party:


    (1) May take possession of the collateral; and


    (2) Without removal, may render equipment unusable and dispose of collateral on
    a debtor''s premises under section


    1309.610


    of the Revised Code.


    (B) A secured party may act under division (A) of this section:


    (1) Pursuant to judicial process; or


    (2) Without judicial process if it acts without breach of the peace.


    (C) If so agreed, and in any event after default, a secured party may require
    the debtor to assemble the collateral and make it available to the secured party
    at a place that is designated by the secured party and that is reasonably convenient
    to both parties.'
