- section: '5301.251'
  title: Memorandum of lease recording.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.251
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.251/2-1-2002/5301.251-2-1-2002.pdf
  text: 'In lieu of the recording of a lease, there may be recorded a memorandum of
    that lease, executed and acknowledged in accordance with section


    5301.01


    of the Revised Code. The memorandum of lease shall contain the names of the lessor
    and the lessee and their addresses as set forth in the lease, a reference to the
    lease with its date of execution, a description of the leased premises with such
    certainty as to identify the property, including the reference provided for in
    section


    5301.011


    of the Revised Code, the term of the lease, together with any rights of renewal
    or extension of the lease, and the date of commencement of the term or the manner
    of determining the commencement of the term as set forth in the lease.


    A memorandum of lease that is entitled to be so recorded also may set forth any
    other provisions contained in the lease, or the substance of those provisions,
    and shall be constructive notice of only that information contained in the memorandum.


    Sections


    317.08


    ,


    5301.251


    , and


    5301.33


    of the Revised Code shall not be construed to affect the enforceability, validity,
    or legal effect of instruments recorded in those lease records prior to August
    9, 1963.'
