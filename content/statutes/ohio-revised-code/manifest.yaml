- section: '5301.89'
  title: Environmental covenant perpetual - exceptions - judicial termination - limitation.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.89
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.89/12-30-2004/5301.89-12-30-2004.pdf
  text: '(A) An environmental covenant is perpetual unless any of the following applies:


    (1) The environmental covenant is limited by its terms to a specific duration
    or is terminated by its terms by the occurrence of a specific event.


    (2) The environmental covenant is terminated by consent pursuant to section


    5301.90


    of the Revised Code.


    (3) The environmental covenant is terminated pursuant to division (B) of this
    section.


    (4) The environmental covenant is terminated by foreclosure of an interest that
    has priority over the environmental covenant.


    (5) The environmental covenant is terminated or modified in an eminent domain
    proceeding, but only if all of the following apply:


    (a) The agency that signed the environmental covenant is a party to the proceeding.


    (b) All persons identified in divisions (A) and (B) of section


    5301.90


    of the Revised code are given notice of the pendency of the proceeding.


    (c) The court determines, after a hearing, that the termination or modification
    will not adversely affect human health or safety or the environment.


    (B) If the agency that signed an environmental covenant has determined that the
    intended benefits of the environmental covenant can no longer be realized, a court,
    under the doctrine of changed circumstances, in an action in which all persons
    identified in divisions (A) and (B) of section


    5301.90


    of the Revised Code have been given notice, may terminate the environmental covenant
    or reduce its burden on the real property that is subject to the environmental
    covenant.


    (C) Except as otherwise provided in divisions (A) and (B) of this section, an
    environmental covenant may not be extinguished, limited, or impaired through issuance
    of a tax deed, foreclosure of a tax lien, or application of the doctrine of adverse
    possession, prescription, abandonment, waiver, lack of enforcement, or acquiescence
    or a similar doctrine.


    (D) An environmental covenant may not be extinguished, limited, or impaired by
    application of sections


    5301.47


    to


    5301.56


    of the Revised Code.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 71ae689daaddc9242a101802e229b53764a0bdcb4505e229cda7f8bd82617abc
