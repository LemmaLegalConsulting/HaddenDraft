- section: '5303.14'
  title: Proceedings if verdict is for occupying claimant.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.14/10-1-1953/5303.14-10-1-1953.pdf
  text: 'If, under section


    5303.11


    of the Revised Code, the jury reports a sum in favor of the occupying claimant,
    on the assessment and valuation of the valuable and lasting improvements, deducting
    therefrom the damages, sustained by waste, together with the net annual value
    of the rents and profits which the defendant received after commencement of the
    action, the successful claimant, or his heirs, or, if they are minors, their guardians,
    may demand of the occupying claimant the value of the land without the improvements
    so assessed and tender a deed of it to him, or pay him the sum so allowed by the
    jury in his favor, within such reasonable time as the court allows.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
