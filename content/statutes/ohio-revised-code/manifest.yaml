- section: '5301.85'
  title: Environmental covenant runs with land - enforceability.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.85
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.85/12-30-2004/5301.85-12-30-2004.pdf
  text: '(A) An environmental covenant that complies with sections


    5301.80


    to


    5301.92


    of the Revised Code runs with the land.


    (B) An environmental covenant that is otherwise effective is valid and enforceable
    even if any of the following limitations on enforcement of interests applies:


    (1) It is not appurtenant to an interest in real property.


    (2) It can be or has been assigned to a person other than the original holder.


    (3) It is not of a character that has been recognized traditionally at common
    law.


    (4) It imposes a negative burden.


    (5) It imposes an affirmative obligation on a person having an interest in the
    real property or on the holder.


    (6) The benefit or burden of the environmental covenant does not touch or concern
    real property.


    (7) There is no privity of estate or contract.


    (8) The holder dies, ceases to exist, resigns, or is replaced.


    (9) The owner of an interest that is subject to the environmental covenant and
    the holder are the same person.


    (C) An instrument that creates restrictions or obligations with respect to real
    property that would qualify as activity and use limitations except for the fact
    that the instrument was recorded before the effective date of sections


    5301.80


    to


    5301.92


    of the Revised Code is not invalid or unenforceable because of any of the limitations
    on enforcement of interests described in division (B) of this section or because
    it was identified as an easement, servitude, deed restriction, or other interest.
    Sections


    5301.80


    to


    5301.92


    of the Revised Code do not apply in any other respect to such an instrument.


    (D) Sections


    5301.80


    to


    5301.92


    of the Revised Code do not invalidate or render unenforceable any interest, whether
    designated as an environmental covenant or other interest, that is otherwise enforceable
    under the laws of this state.


    (E) Nothing in sections


    5301.80


    to


    5301.92


    of the Revised Code shall be construed to restrict, affect, or impair the rights
    of any person under the Revised Code or common law to enter into or record a restrictive
    covenant, institutional control, easement, servitude, or other restriction on
    the use of property that does not satisfy the requirements of division (A) of
    section


    5301.82


    of the Revised Code and does not have the permission, approval, or consent of
    an agency, political subdivision, regulatory body, or other unit of government.
    However, a restrictive covenant, institutional control, easement, servitude, or
    other restriction on the use of property entered into or recorded without such
    permission, approval, or consent is not an environmental covenant and is not binding
    on an agency, political subdivision, regulatory body, or other unit of government.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: dea12d38dafc83a56b9546721c3458a9a216f9a3b52117a38e279f6cd553d848
  effective_date: December 30, 2004
