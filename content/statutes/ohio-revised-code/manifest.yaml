- section: '5721.17'
  title: Foreclosure proceeding against property that includes building constituting
    a public nuisance.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.17/7-18-1990/5721.17-7-18-1990.pdf
  text: '(A) Upon the delivery by the county auditor of a delinquent land tax certificate
    for, a delinquent vacant land tax certificate for, or a master list of delinquent
    vacant tracts or delinquent tracts that includes, any property on which is located
    a building subject to a receivership under section


    3767.41


    of the Revised Code, the prosecuting attorney may institute a foreclosure proceeding
    under section


    5721.18


    of the Revised Code or a foreclosure and forfeiture proceeding under section


    5721.14


    of the Revised Code. The proceeds resulting from the sale of that property pursuant
    to a foreclosure or forfeiture sale shall be distributed in the order set forth
    in division (B)(1) or (2) of this section.


    (B)(1) In rendering its judgment in a foreclosure proceeding under section


    5721.18


    of the Revised Code that relates to property as described in division (A) of this
    section and in ordering the distribution of the proceeds of the resulting foreclosure
    sale, a court shall comply with sections


    5721.18


    and


    5721.19


    of the Revised Code, except that the court shall order that the proceeds of the
    sale shall be distributed in the following order of priority:


    (a) First, in satisfaction of any notes issued by the receiver pursuant to division
    (F) of section


    3767.41


    of the Revised Code, in their order of priority;


    (b) Second, any unreimbursed expenses and other amounts paid in accordance with
    division (F) of section


    3767.41


    of the Revised Code by the receiver, and the fees of the receiver approved pursuant
    to division (H)(1) of that section;


    (c) Third, any remaining proceeds in the order set forth in division (D) of section


    5721.19


    of the Revised Code.


    (2) In rendering its judgment in a foreclosure and forfeiture proceeding under
    section


    5721.14


    of the Revised Code that relates to property as described in division (A) of this
    section and in ordering the distribution of the proceeds of the resulting forfeiture
    sale, a court shall comply with sections


    5721.14


    and


    5721.16


    and Chapter 5723. of the Revised Code, except that the court shall order that
    the proceeds of the sale shall be distributed in the following order of priority:


    (a) First, in satisfaction of any notes issued by the receiver pursuant to division
    (F) of section


    3767.41


    of the Revised Code, in their order of priority;


    (b) Second, any unreimbursed expenses and other amounts paid in accordance with
    division (F) of section


    3767.41


    of the Revised Code by the receiver, and the fees of the receiver approved pursuant
    to division (H)(1) of that section;


    (c) Third, any remaining proceeds in the order set forth in division (A) of section


    5723.18


    of the Revised Code.


    (C) If, after the distribution of available proceeds pursuant to division (B)(1)
    or (2) of this section, the proceeds from the foreclosure or forfeiture sale are
    insufficient to pay in full the notes, unreimbursed expenses and other amounts,
    and fees described in divisions (B)(1)(a) and (b) or (B)(2)(a) and (b) of this
    section, and the amounts due under division (D) of section


    5721.19


    or division (A) of section


    5723.18


    of the Revised Code, the court shall enter a deficiency judgment for the unpaid
    amount pursuant to section


    5721.192


    of the Revised Code.


    (D) When property as described in division (A) of this section is the subject
    of a foreclosure proceeding under section


    5721.18


    of the Revised Code or a foreclosure and forfeiture proceeding under section


    5721.14


    of the Revised Code, the notice of foreclosure set forth in division (B) of section


    5721.181


    of the Revised Code and the notice set forth in division (C) of that section,
    the notice of foreclosure and forfeiture set forth in division (B) of section


    5721.15


    of the Revised Code and the notice set forth in division (C) of that section,
    and the advertisements for sale set forth in sections


    5721.191


    and


    5723.10


    of the Revised Code shall be modified to reflect the provisions of divisions (B)
    and (C) of this section.'
