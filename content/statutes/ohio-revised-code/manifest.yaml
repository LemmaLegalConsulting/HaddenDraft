- section: '5301.12'
  title: Purchaser at tax sale.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.12/10-1-1953/5301.12-10-1-1953.pdf
  text: When real estate is sold at tax sale, and the purchaser has received a deed
    therefor, and it has been placed upon the tax duplicate in his name, or those
    claiming under him, who openly and notoriously claim the title and ownership to
    such property, and pay the taxes thereon, as against any title acquired by deed
    executed after such tax sale, such facts are prima-facie evidence of the possession
    of such real estate by such purchaser, or those holding under him, from the date
    of such sale until it is set aside or redeemed. The knowledge, by a person acquiring
    title by deed executed after such tax sale, of the payment of taxes, and the claim
    of title and ownership shall, as to him, be conclusive proof of possession.
