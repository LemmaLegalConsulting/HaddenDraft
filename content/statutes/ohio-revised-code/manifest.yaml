- section: '1923.12'
  title: Eviction of resident or resident's estate from manufactured home park; notice
    to remove home or vehicle.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.12/9-29-2017/1923.12-9-29-2017.pdf
  text: '(A) If a resident or a resident''s estate has been evicted from a manufactured
    home park pursuant to a judgment entered under section


    1923.09


    or


    1923.11


    of the Revised Code and if the resident or estate has abandoned or otherwise left
    unoccupied the resident''s manufactured home, mobile home, or recreational vehicle
    on the residential premises of the manufactured home park for a period of three
    days following the entry of the judgment, the operator of the manufactured home
    park may provide to the titled owner of the home or vehicle a written notice to
    remove the home or vehicle from the manufactured home park within fourteen days
    from the date of the delivery of the notice. The park operator shall deliver or
    cause the delivery of the notice by personal delivery to the owner or by ordinary
    mail sent to the last known address of the owner. Except as provided in divisions
    (D) and (E) of this section, if the owner of the manufactured home, mobile home,
    or recreational vehicle does not remove it or cause it to be removed from the
    manufactured home park within fourteen days from the date of the delivery of the
    notice, the park operator may follow the procedures of division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code to permit the removal of the home or vehicle from the manufactured
    home park, and the potential sale, destruction, or transfer of ownership of the
    home or vehicle.


    (B) Every notice provided to the titled owner of a manufactured home, mobile home,
    or recreational vehicle under this section shall contain the following language
    printed in a conspicuous manner: "You are being asked to remove your manufactured
    home, mobile home, or recreational vehicle from the residential premises of __________,
    a manufactured home park, in accordance with a judgment of eviction entered in
    __________ court on __________ against ___________ If the manufactured home, mobile
    home, or recreational vehicle is not removed from the manufactured home park within
    fourteen days from the date of delivery of this notice, the home or vehicle may
    be sold or destroyed, or its title may be transferred to __________, pursuant
    to division (B) of both sections


    1923.13


    and


    1923.14


    of the Revised Code. If you are in doubt regarding your legal rights, it is recommended
    that you seek legal assistance."


    (C)(1) Before requesting a writ of execution under division (B) of section


    1923.13


    of the Revised Code, the park operator shall conduct or cause to be conducted
    a search of the appropriate public records that relate to the manufactured home,
    mobile home, or recreational vehicle, and make or cause to be made reasonably
    diligent inquiries, for the purpose of identifying any persons who have an outstanding
    right, title, or interest in the home or vehicle.


    (2) If the search or inquiries pursuant to division (C)(1) of this section reveal
    any person who has an outstanding right, title, or interest in the manufactured
    home, mobile home, or recreational vehicle, the park operator shall provide to
    the person a written notice to remove the home or vehicle from the manufactured
    home park or arrange for the sale of the home or vehicle within twenty-one days
    from the date of the delivery of the notice.


    The notice shall contain the following language printed in a conspicuous manner:
    "You are being asked to remove the manufactured home, mobile home, or recreational
    vehicle that you have an outstanding right, title, or interest in from the residential
    premises of __________, a manufactured home park, in accordance with a judgment
    of eviction entered in __________ court on __________ against ___________ If the
    manufactured home, mobile home, or recreational vehicle is not removed from the
    manufactured home park within twenty-one days from the date of delivery of this
    notice, the home or vehicle may be sold or destroyed, or its title may be transferred
    to __________, pursuant to division (B) of both sections


    1923.13


    and


    1923.14


    of the Revised Code. If you are in doubt regarding your legal rights, it is recommended
    that you seek legal assistance."


    The park operator shall deliver or cause the delivery of the notice by personal
    delivery to the person or by ordinary mail sent to the last known address of the
    person. If a sale of the home or vehicle is arranged, the person shall pay any
    rent due to the park operator during the pendency of the sale. If the person does
    not remove the home or vehicle or arrange for its sale within twenty-one days
    from the date of the delivery of the notice, the park operator may follow the
    procedures of division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code to permit the removal of the home or vehicle from the manufactured
    home park, and the potential sale, destruction, or transfer of ownership of the
    home or vehicle.


    (3) If the search or inquiries reveal no person who has an outstanding right,
    title, or interest in the manufactured home, mobile home, or recreational vehicle,
    the park operator may follow the procedures of division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code to permit the removal of the home or vehicle from the manufactured
    home park, and the potential sale, destruction, or transfer of ownership of the
    home or vehicle.


    (D) When a deceased resident or a resident''s estate has been evicted from a manufactured
    home park pursuant to a judgment entered under section


    1923.09


    or


    1923.11


    of the Revised Code, the removal from the park and potential sale, destruction,
    or transfer of ownership of the resident''s manufactured home, mobile home, or
    recreational vehicle and any personal property abandoned on the residential premises
    shall be conducted in the manner prescribed by the probate court in which letters
    testamentary or of administration have been granted for the estate in accordance
    with Title XXI of the Revised Code. The park operator may store the resident''s
    manufactured home, mobile home, or recreational vehicle at a storage facility
    or at another location within the manufactured home park during the administration
    of the estate. The park operator shall notify the executor or administrator of
    the resident''s estate where the manufactured home, mobile home, or recreational
    vehicle will be stored during the administration of the estate. The costs for
    the removal and storage of the manufactured home, mobile home, or recreational
    vehicle shall be a claim against the resident''s estate without further presentation
    of the claim to the executor or administrator.


    (E)(1) When the resident who has been evicted from a manufactured home park pursuant
    to a judgment entered under section


    1923.09


    or


    1923.11


    of the Revised Code is the titled owner of a manufactured home, mobile home, or
    recreational vehicle and is or becomes deceased prior to the removal of the home
    or vehicle from the manufactured home park, and no probate court has granted administration
    with respect to the resident''s estate within ninety days of the deceased''s death,
    the park operator may store the home or vehicle at a storage facility or at another
    location within the manufactured home park before and after a probate court grants
    letters testamentary or of administration with respect to the resident''s estate
    pursuant to Title XXI of the Revised Code.


    (2) If a probate court grants administration with respect to the resident''s estate
    within ninety days of the date of the eviction of the resident from the park,
    the removal of the manufactured home, mobile home, or recreational vehicle from
    the park and potential sale, destruction, or transfer of ownership of the home
    or vehicle shall be conducted pursuant to division (D) of this section.


    (3) If no probate court grants administration with respect to the resident''s
    estate within ninety days of the date of the eviction of the resident from the
    manufactured home park pursuant to a judgment entered under section


    1923.09


    or


    1923.11


    of the Revised Code, the park operator shall conduct or cause to be conducted
    a search of the appropriate public records that relate to the manufactured home,
    mobile home, or recreational vehicle, and make or cause to be made reasonably
    diligent inquiries, for the purpose of identifying any persons who have an outstanding
    right, title, or interest in the home or vehicle.


    (a) If the search or inquiries pursuant to division (E)(3) of this section reveal
    any person who has an outstanding right, title, or interest in the manufactured
    home, mobile home, or recreational vehicle, the park operator shall provide to
    the person a written notice to remove the home or vehicle from the manufactured
    home park or arrange for the sale of the home or vehicle within twenty-one days
    from the date of the delivery of the notice. The notice shall be in the form described
    in division (C)(2) of this section. The park operator shall deliver or cause the
    delivery of the notice by personal delivery to the person or by ordinary mail
    sent to the last known address of the person. If a sale of the home or vehicle
    is arranged, the person shall pay any rent due to the park operator during the
    pendency of the sale. If the person does not remove the home or vehicle or arrange
    for its sale within twenty-one days from the date of the delivery of the notice,
    the park operator may follow the procedures of division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code to permit the removal of the home or vehicle from the manufactured
    home park, and the potential sale, destruction, or transfer of ownership of the
    home or vehicle.


    (b) If the search or inquiries reveal no person who has an outstanding right,
    title, or interest in the manufactured home, mobile home, or recreational vehicle,
    the park operator shall publish notice of a petition for a writ of execution in
    a newspaper of general circulation in the county where the home or vehicle has
    been abandoned. The publication shall contain the name of the deceased and the
    last known address of the home or vehicle and shall run for two consecutive weeks.
    The park operator shall provide to the clerk of the court written certification
    by the newspaper of the dates of the publication and an affidavit signed by the
    operator attesting to the publication. The park operator may then follow the procedures
    of division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code to permit the removal of the home or vehicle from the manufactured
    home park, and the potential sale, destruction, or transfer of ownership of the
    home or vehicle.'
