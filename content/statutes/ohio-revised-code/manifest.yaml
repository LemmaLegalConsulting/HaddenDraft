- section: '2329.36'
  title: Deed of sheriff, master.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.36
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.36/9-11-2008/2329.36-9-11-2008.pdf
  text: '(A) The attorney who files the writ of execution shall, not later than seven
    days after the filing of the order of confirmation of sale pursuant to section


    2329.31


    of the Revised Code, make to the purchaser a deed, containing the names of the
    parties to the judgment, the names of the owners of the property sold, a reference
    to the volume and page of the recording of the next preceding recorded instrument
    by or through which the owners claim title, the date and amount of the judgment,
    the substance of the execution or order on which the property was sold, the substance
    of the officer''s return thereon, and the order of confirmation and deliver the
    deed to the officer who sold the real property. The deed shall be executed, acknowledged,
    and recorded as other deeds. The officer or the officer''s legal representative
    may review and approve or reject the deed for form and substance.


    (B) By placing a bid at a sale conducted pursuant to this chapter, the purchaser
    appoints the officer who makes the sale as agent of the purchaser for the sole
    purpose of accepting delivery of the deed described in division (A) of this section.


    (C) The officer who sells the real property shall record the deed, or for registered
    land file the documents required by section


    5309.64


    of the Revised Code, with the county recorder within fourteen business days of
    the date the purchaser pays the balance due on the purchase price of the lands
    and tenements. The officer shall charge the purchaser a fee to cover the actual
    costs of recording the deed or filing the documents.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
  normalized_text_sha256: eff4cb910e38b8d7788800653dc95dc733808935532fdd0333f0ad48191e7145
