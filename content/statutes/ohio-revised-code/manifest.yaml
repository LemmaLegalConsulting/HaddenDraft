- section: '1345.12'
  title: Applicability of chapter - exceptions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.12/8-11-1978/1345.12-8-11-1978.pdf
  text: 'Sections


    1345.01


    to


    1345.13


    of the Revised Code do not apply to:


    (A) An act or practice required or specifically permitted by or under federal
    law, or by or under other sections of the Revised Code, except as provided in
    division (B) of section


    1345.11


    of the Revised Code;


    (B) A publisher, broadcaster, printer, or other person engaged in the dissemination
    of information or the reproduction of printed or pictorial matter insofar as the
    information or matter has been disseminated or reproduced on behalf of others
    without knowledge that it violated sections


    1345.01


    to


    1345.13


    of the Revised Code;


    (C) Claims for personal injury or death.'
