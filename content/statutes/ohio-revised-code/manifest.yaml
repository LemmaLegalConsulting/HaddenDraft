- section: '1923.05'
  title: Complaint filed and recorded - no minor tenants listed as defendants.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.05
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.05/4-9-2025/1923.05-4-9-2025.pdf
  text: '(A) The summons shall not issue in an action under this chapter until the
    plaintiff files a complaint in writing with the court. The complaint shall particularly
    describe the premises so entered upon and detained, and set forth either an unlawful
    and forcible entry and detention, or an unlawful and forcible detention after
    a peacable or lawful entry of the described premises. The complaint shall be copied
    into, and made a part of the record.


    (B) No person shall file an action under this chapter listing a minor tenant as
    a defendant if a parent or adult guardian is also listed as a defendant on the
    same complaint.


    (C) The court shall dismiss without prejudice any action filed in violation of
    division (B) of this section and order the person that filed the action to pay
    the minor tenant''s reasonable attorneys'' fees.'
