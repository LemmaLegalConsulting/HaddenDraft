- section: '3767.01'
  title: Nuisances - disorderly houses definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.01/3-20-2025/3767.01-3-20-2025.pdf
  text: 'As used in all sections of the Revised Code relating to nuisances:


    (A) "Place" includes any building, erection, or place or any separate part or
    portion thereof or the ground itself;


    (B) "Person" includes any individual, corporation, association, partnership, trustee,
    lessee, agent, or assignee;


    (C) "Nuisance" means any of the following:


    (1) That which is defined and declared by statutes to be a nuisance;


    (2) Any place in or upon which lewdness, assignation, or prostitution is conducted,
    permitted, continued, or exists, or any place, in or upon which lewd, indecent,
    lascivious, or obscene films or plate negatives, film or plate positives, films
    designed to be projected on a screen for exhibition films, or glass slides either
    in negative or positive form designed for exhibition by projection on a screen,
    are photographed, manufactured, developed, screened, exhibited, or otherwise prepared
    or shown, and the personal property and contents used in conducting and maintaining
    any such place for any such purpose. This chapter shall not affect any newspaper,
    magazine, or other publication entered as second class matter by the post-office
    department.


    (3) Any room, house, building, boat, vehicle, structure, or place where beer or
    intoxicating liquor is manufactured, sold, bartered, possessed, or kept in violation
    of law and all property kept and used in maintaining the same, and all property
    designed for the unlawful manufacture of beer or intoxicating liquor and beer
    or intoxicating liquor contained in the room, house, building, boat, structure,
    or place, or the operation of such a room, house, building, boat, structure, or
    place as described in division (C)(3) of this section where the operation of that
    place substantially interferes with public decency, sobriety, peace, and good
    order. "Violation of law" includes, but is not limited to, sales to any person
    under the legal drinking age as prohibited in division (A) of section


    4301.22


    or division (A) of section


    4301.69


    of the Revised Code and any violation of section


    2913.46


    or


    2925.03


    of the Revised Code.


    (4) Any place in which a pattern of continuous or repeated violations of division
    (B)(1) of section


    2927.02


    of the Revised Code has occurred.'
