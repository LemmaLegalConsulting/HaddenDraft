- section: '1345.95'
  title: Remedies waiver of rights.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.95
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.95/10-31-1996/1345.95-10-31-1996.pdf
  text: 'The remedies in sections


    1345.90


    to


    1345.95


    of the Revised Code are in addition to remedies otherwise available for the same
    conduct under state or local law.


    Any waiver of rights by a consumer of the provisions of sections


    1345.90


    to


    1345.95


    of the Revised Code is void.'
