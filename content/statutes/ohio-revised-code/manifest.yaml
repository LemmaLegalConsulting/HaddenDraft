- section: '1349.41'
  title: Prohibited conduct in mortgage loan sale or purchase.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.41
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.41/1-1-2007/1349.41-1-1-2007.pdf
  text: '(A) As used in this section:


    (1) "Consumer" means an individual to whom credit is offered or extended primarily
    for personal, family, or household purposes.


    (2) "Lender" means a nonbank mortgage lender as defined in section


    1345.01


    of the Revised Code. "Lender" does not include a person that purchases or is assigned
    a loan or that functions solely as the servicer of a loan.


    (3) "Mortgage" has the same meaning as in section


    1322.01


    of the Revised Code.


    (B) A lender shall not engage in a transaction, practice, or course of business
    that is not in good faith or fair dealing, or that operates a fraud upon any person,
    in connection with the attempted or actual making, purchase, or sale of any mortgage
    loan.


    (C) If a lender fails to comply with division (B) of this section, the affected
    consumer may recover damages of not less than all compensation paid directly or
    indirectly to the lender from any source, plus reasonable attorney''s fees and
    court costs.


    (D) The duty created by this section shall not be waived or modified.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: 943c3e619a1d3b8bbd7134f2e4a6bc5a1d4672d0151d8b58db7a46584d7d2430
