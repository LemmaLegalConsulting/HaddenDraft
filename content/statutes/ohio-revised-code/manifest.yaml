- section: '3767.15'
  title: Fine and costs are a lien.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.15
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.15/10-1-1953/3767.15-10-1-1953.pdf
  text: 'The fine and costs imposed in division (D) of section


    3767.99


    of the Revised Code shall be a lien on such oil well, oil tank, oil refinery,
    oil vat, or place of deposit and the contents thereof until paid, and such oil
    well, oil tank, oil refinery, oil vat, or place of deposit and the contents thereof,
    may be sold for the payment of such fine and costs upon execution issued for that
    purpose.'
