- section: '4781.34'
  title: Owner to repair home substantially damaged.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.34
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.34/1-21-2018/4781.34-1-21-2018.pdf
  text: '(A) If a mobile or manufactured home that is located in a flood plain is
    substantially damaged, the owner of the home shall make all alterations, repairs,
    or changes to the home, and the operator of the manufactured home park shall make
    all alterations, repairs, or changes to the lot on which the home is located,
    that are necessary to ensure compliance with the flood plain management rules
    adopted under section


    4781.26


    of the Revised Code. Such alterations, repairs, or changes may include, without
    limitation, removal of the home or other structures.


    No person shall fail to comply with this division.


    (B) No person shall cause to be performed any alteration, repair, or change required
    by division (A) of this section unless the person first obtains a permit from
    the division of industrial compliance.


    The division of industrial compliance shall disapprove an application for a permit
    required under this division unless the division finds that the proposed alteration,
    repair, or change complies with the rules adopted under section


    4781.26


    of the Revised Code. No permit is required under this division for the construction,
    erection, or manufacture of any building to which section


    3781.06


    of the Revised Code applies.


    The division of industrial compliance may suspend or revoke a permit issued under
    this division for failure to comply with the rules adopted under section


    4781.26


    of the Revised Code pertaining to flood plain management or for failure to comply
    with the approved permit for making alterations, repairs, or changes to the lot
    on which the manufactured home is located.


    Any person aggrieved by the disapproval, suspension, or revocation of a permit
    under this division by the division of industrial compliance may request a hearing
    on the matter within thirty days after receipt of the notice of the disapproval,
    suspension, or revocation. The hearing shall be held in accordance with Chapter
    119. of the Revised Code. Thereafter, an appeal of the disapproval, suspension,
    or revocation may be taken in the manner provided in section


    119.12


    of the Revised Code and for necessary inspections conducted to determine compliance
    with those permits.


    (C) The division of industrial compliance shall establish fees for the issuance
    of permits under division (B) of this section and for necessary inspections conducted
    to determine compliance with those permits for making alterations, repairs, or
    changes to the lot on which the manufactured home is located.


    (D) The division of industrial compliance shall charge the appropriate fee established
    under division (C) of this section for the issuance of a permit under division
    (B) of this section or for conducting any necessary inspection to determine compliance
    with the permit. If the division of industrial compliance issues such a permit
    or conducts such an inspection, the fee for the permit or inspection shall be
    transmitted to the treasurer of state and shall be credited to the industrial
    compliance operating fund created in section


    121.084


    of the Revised Code. Moneys so credited to the fund shall be used only for the
    purpose of administering and enforcing sections


    4781.26


    to


    4781.35


    of the Revised Code and rules adopted under those sections.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
