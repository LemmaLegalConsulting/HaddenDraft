- section: '2329.33'
  title: Redemption by judgment debtor.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.33
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.33/9-28-2016/2329.33-9-28-2016.pdf
  text: 'Except as provided in division (C) of section


    2308.03


    or any other section of the Revised Code, in sales of real estate on execution
    or order of sale, at any time before the confirmation thereof, the debtor may
    redeem it from sale by depositing in the hands of the clerk of the court of common
    pleas to which such execution or order is returnable, the amount of the judgment
    or decree upon which such lands were sold, with all costs, including poundage,
    and interest at the rate of eight per cent per annum on the purchase money from
    the day of sale to the time of such deposit, except where the judgment creditor
    is the purchaser, the interest at such rate on the excess above the judgment creditor''s
    claim. The court of common pleas thereupon shall make an order setting aside such
    sale, and apply the deposit to the payment of such judgment or decree and costs,
    and award such interest to the purchaser, who shall receive from the officer making
    the sale the purchase money paid by the purchaser, and the interest from the clerk.
    This section does not take away the power of the court to set aside such sale
    for any reason for which it might have been set aside prior to April 16, 1888.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
