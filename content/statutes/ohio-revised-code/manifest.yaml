- section: '2715.22'
  title: Notice of appointment of receiver.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.22
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.22/10-1-1953/2715.22-10-1-1953.pdf
  text: 'The receiver appointed under section


    2715.20


    of the Revised Code forthwith shall give written or printed notice of his appointment
    to the persons indebted to the defendant in attachment, which notice must be served
    on the debtor by a copy personally, or by a copy left at his residence. From the
    date of such service, the debtors shall be liable to the plaintiff in attachment
    for the amount of money and credits of the defendant in attachment in their hands,
    or due from them to him, and shall account therefor to the receiver.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
