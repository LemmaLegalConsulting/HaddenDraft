- section: '5321.18'
  title: Written rental agreement for residential premises provisions.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.18/11-4-1974/5321.18-11-4-1974.pdf
  text: '(A) Every written rental agreement for residential premises shall contain
    the name and address of the owner and the name and address of the owner''s agent,
    if any. If the owner or the owner''s agent is a corporation, partnership, limited
    partnership, association, trust, or other entity, the address shall be the principal
    place of business in the county in which the residential property is situated
    or if there is no place of business in such county then its principal place of
    business in this state, and shall include the name of the person in charge thereof.


    (B) If the rental agreement is oral, the landlord, at the commencement of the
    term of occupancy, shall deliver to tenant a written notice containing the information
    required in division (A) of this section.


    (C) If the landlord fails to provide the notice of the name and address of the
    owner and owner''s agent, if any, required under division (A) or (B) of this section,
    the notices to the landlord required under division (A) of section


    5321.07


    and division (A) of section


    5321.08


    of the Revised Code shall be waived by the landlord and his agent.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
  normalized_text_sha256: e7099645bda28a8a9fdf842441eb7adda4f15056fca441c6bfd2b0ac3ea192ae
