- section: '1322.99'
  title: Penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.99/3-23-2018/1322.99-3-23-2018.pdf
  text: '(A)(1) Whoever violates division (A) of section


    1322.07


    or division (E), (F), or (G) of section


    1322.40


    of the Revised Code is guilty of a felony of the fifth degree.


    (2) Whoever violates division (B) of section


    1322.07


    of the Revised Code is guilty of a misdemeanor of the first degree.


    (B) The offenses established under divisions (A) and (B) of section


    1322.07


    of the Revised Code are strict liability offenses, and section


    2901.20


    of the Revised Code does not apply. The designation of these offenses as strict
    liability offenses shall not be construed to imply that any other offense for
    which there is no specified degree of culpability, whether in this section or
    another section of the Revised Code, is not a strict liability offense.'
