- section: '5303.02'
  title: Vendee may recoup.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.02
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.02/10-1-1953/5303.02-10-1-1953.pdf
  text: In actions to recover the purchase money of real estate by vendor against
    vendee, the vendee, notwithstanding his continued possession, may by way of counterclaim
    set up any breach of the covenants of title acquired by him from the plaintiff,
    and make any person claiming an adverse interest therein a party to the action.
    Upon the hearing, he may recoup against the plaintiff's demand the present worth
    of any existing lien or encumbrance thereon. If the adverse interest of the claimant
    is an estate in reversion or remainder, or contingent upon a future event, with
    his assent, the court of common pleas may order the vendee to surrender possession
    to his vendor upon the repayment of so much of the purchase money as has been
    paid, with interest, or direct the payment of the purchase money claimed in the
    action, upon the plaintiff's giving bond in double its amount with two or more
    sureties to be approved by the court, for the payment thereof with interest, if
    by reason of the defect the defendant or his privies are subsequently evicted.
