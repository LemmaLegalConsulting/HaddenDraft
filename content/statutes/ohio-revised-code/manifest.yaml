- section: '2329.271'
  title: Identifying information submitted by purchaser.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.271
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.271/9-29-2017/2329.271-9-29-2017.pdf
  text: '(A)(1) Subject to division (A)(2) of this section, the purchaser of lands
    and tenements taken in execution shall submit to the officer who makes the sale
    the following information:


    (a)(i) If the purchaser is an individual, the information shall include the individual''s
    name, mailing address, which shall not be a post office box, electronic mail address,
    telephone number, and financial transaction device information of the purchaser;


    (ii) If the purchaser is an entity, the information shall include the entity''s
    legal name, trade name if different from its legal name, state and date of formation,
    active status with the office of the secretary of state, mailing address, telephone
    number, financial transaction device information, the name of an individual contact
    person for the entity, and the contact person''s title, mailing address, which
    shall not be a post office box, electronic mail address, and telephone number.


    (b) An attorney or a law firm that represents a purchaser may submit the information
    required under division (A)(1)(a) of this section in a representative capacity,
    either as an individual or entity.


    (c) If the lands and tenements taken in execution are intended to be used as residential
    rental property and the residential rental property is purchased by a trust, business
    trust, estate, partnership, limited partnership, limited liability company, association,
    corporation, or any other business entity, the name, address, and telephone number
    of the following with the provision that the purchaser be readily accessible through
    the identified contact person:


    (i) A trustee, in the case of a trust or business trust;


    (ii) The executor or administrator, in the case of an estate;


    (iii) A general partner, in the case of a partnership or a limited partnership;


    (iv) A member, manager, officer, or contact person, in the case of a limited liability
    company;


    (v) An associate, in the case of an association;


    (vi) An officer, in the case of a corporation;


    (vii) A member, manager, or officer, in the case of any other business entity.


    (d) A statement indicating if the purchaser intends to use the lands and tenements
    taken in execution as residential rental property.


    (2) If the lands and tenements taken in execution are not residential rental property
    and the purchaser of those lands and tenements is a corporation, partnership,
    association, estate, trust, or other business organization the only place of business
    of which is in the county in which the real property is located, the information
    required by divisions (A)(1)(a) and (d) of this section shall be the contact information
    for an employee or contact person of the purchasing entity that is located in
    that county and that the purchasing entity has designated to receive notices or
    inquiries about the property. If the purchasing entity has a place of business
    outside the county in which the real property is located and the purchasing entity''s
    principal place of business is located in this state, the information required
    by divisions (A)(1)(a) and (d) of this section shall be the contact information
    for an employee or contact person of the purchasing entity that is located in
    this state and that the purchasing entity has designated to receive notices or
    inquiries about the property. If the purchasing entity''s principal place of business
    is not located in this state, the information required by divisions (A)(1)(a)
    and (d) of this section shall be the contact information for an employee or contact
    person at the purchasing entity''s principal place of business outside of this
    state and whom the purchasing entity has designated to receive notices or inquiries
    about the property.


    (B)(1) The information required by division (A) of this section shall be part
    of the record of the court of common pleas. If the court has ordered or the clerk
    of the court has issued an order for the sheriff to advertise and sell the lands
    and tenements, the information also shall be part of the sheriff''s record of
    proceedings. Except as provided in division (B)(2) of this section, the information
    is a public record and open to public inspection.


    (2) The electronic mail address, telephone number, and financial transaction device
    information required in division (A)(1) of this section are confidential and not
    public records for purposes of section


    149.43


    of the Revised Code.


    (C) The requirements of division (A) of this section shall not apply if the purchaser
    of the lands and tenements of the sale is the plaintiff or a lien holder who is
    a party to the action.


    (D) As used in this section


    (1) "Financial transaction device" has the same meaning as in section


    301.28


    of the Revised Code.


    (2) "Residential rental property" has the same meaning as in section


    5323.01


    of the Revised Code.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
