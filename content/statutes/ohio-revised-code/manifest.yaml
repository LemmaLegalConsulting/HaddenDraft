- section: '2715.19'
  title: Property and garnishee bound.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.19
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.19/3-13-1986/2715.19-3-13-1986.pdf
  text: 'An order of attachment shall bind the property attached from the time of
    service. A garnishee under this chapter shall be liable to the plaintiff in attachment
    for all property of the defendant in his hands, and money and credits due from
    him to the defendant, other than personal earnings, from the time he is served
    with the written notice required in section


    2715.091


    of the Revised Code. When property is attached in the hands of a consignee, lienholder,
    or secured party whose lien or security interest is then perfected by possession,
    his lien or security interest relative to the property shall not be affected by
    the attachment.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: 7a50dcd78234e4f0e451e01e855d0c343eda9f788067e8b5a30836b35eec32e8
