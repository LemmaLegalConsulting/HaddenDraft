- section: '4781.31'
  title: Submitting development plans to division.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.31
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.31/1-21-2018/4781.31-1-21-2018.pdf
  text: '(A) No person shall cause development to occur within any portion of a manufactured
    home park until the plans for the development have been submitted to and reviewed
    and approved by the division of industrial compliance. This division does not
    require that plans be submitted to the division of industrial compliance for approval
    for the replacement of manufactured or mobile homes on previously approved lots
    in a manufactured home park when no development is to occur in connection with
    the replacement. Within thirty days after receipt of the plans, all supporting
    documents and materials required to complete the review, and the applicable plan
    review fee established under division (D) of this section, the division of industrial
    compliance shall approve or disapprove the plans.


    (B) Any person aggrieved by the division''s disapproval of a set of plans under
    division (A) of this section may request a hearing on the matter within thirty
    days after receipt of the division''s notice of the disapproval. The hearing shall
    be held in accordance with Chapter 119. of the Revised Code. Thereafter, the disapproval
    may be appealed in the manner provided in section


    119.12


    of the Revised Code.


    (C) The division of industrial compliance shall establish a system by which development
    occurring within a manufactured home park is inspected or verified in accordance
    with rules adopted under section


    4781.26


    of the Revised Code to ensure that the development complies with the plans approved
    under division (A) of this section.


    (D) The division of industrial compliance shall establish fees for reviewing plans
    under division (A) of this section and conducting inspections under division (C)
    of this section.


    (E) The division of industrial compliance shall charge the appropriate fees established
    under division (D) of this section for reviewing plans under division (A) of this
    section and conducting inspections under division (C) of this section. All such
    plan review and inspection fees received by the division shall be transmitted
    to the treasurer of state and shall be credited to the industrial compliance operating
    fund created in section


    121.084


    of the Revised Code. Moneys so credited to the fund shall be used only for the
    purpose of administering and enforcing sections


    4781.26


    to


    4781.35


    of the Revised Code and rules adopted under those sections.


    (F) Plan approvals issued under this section do not constitute an exemption from
    the land use and building requirements of the political subdivision in which the
    manufactured home park is or is to be located.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 383179d68cd832fcf2e8b96adc603bb3672f9639b22baf9a11685d55961e5675
