- section: '2329.023'
  title: Notice of filing.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.023
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.023/7-29-1983/2329.023-7-29-1983.pdf
  text: '(A) When a foreign judgment is filed pursuant to section


    2329.022


    of the Revised Code, the judgment creditor or his attorney shall make and file
    with the clerk of the court in which the foreign judgment is filed an affidavit
    setting forth the name and last known address of the judgment debtor and of the
    judgment creditor.


    (B) Upon the filing of a foreign judgment pursuant to section


    2329.022


    of the Revised Code and the affidavit pursuant to division (A) of this section,
    the judgment creditor or his attorney shall file with the clerk of the court a
    praecipe instructing the clerk to issue a notice of the filing of the foreign
    judgment to the judgment debtor at the address given in the affidavit. The clerk
    shall enter a note of the mailing in the docket. The notice shall include the
    name and address of the judgment creditor, and of the judgment creditor''s attorney,
    if any, in this state. In addition, the judgment creditor may mail a notice of
    the filing of the foreign judgment to the judgment debtor and may file proof of
    mailing with the clerk. The failure of the clerk to mail to the judgment debtor
    notice of the filing of the foreign judgment does not affect the enforcement proceedings
    with respect to the foreign judgment, if the judgment creditor has filed proof
    that he mailed a notice of the filing to the judgment debtor.


    (C) No execution or other process for enforcement of a foreign judgment that is
    filed pursuant to section


    2329.022


    of the Revised Code shall issue until thirty days after the date the foreign judgment
    is filed pursuant to that section.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
