- section: '4781.30'
  title: Rights of operators.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.30/9-10-2012/4781.30-9-10-2012.pdf
  text: '(A) Upon a license being issued under sections


    4781.27


    to


    4781.29


    of the Revised Code, any operator shall have the right to rent or use each lot
    for the parking or placement of a manufactured home or mobile home to be used
    for human habitation without interruption for any period coextensive with any
    license or consecutive licenses issued under sections


    4781.27


    to


    4781.29


    of the Revised Code.


    (B) No operator of a manufactured home park shall sell individual lots in a park
    for eight years following the issuance of the initial license for the park unless,
    at the time of sale, the park fulfills all platting and subdivision requirements
    established by the political subdivision in which the park is located, or the
    political subdivision has entered into an agreement with the operator regarding
    platting and subdivision requirements and the operator has fulfilled the terms
    of that agreement.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
