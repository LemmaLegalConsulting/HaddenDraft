  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.03/11-25-1969/5313.03-11-25-1969.pdf
  text: 'Every vendor under a land installment contract shall, at least once a year
    or on demand of the vendee, but no more than twice a year, furnish a statement
    to the vendee showing the following:


    (A) The amount credited to principal and interest;


    (B) The balance due.


    A land contract passbook issued by the vendor or a financial institution shall
    be sufficient compliance with this section.'
