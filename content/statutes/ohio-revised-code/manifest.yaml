- section: '5321.08'
  title: Rent deposits - duty of clerk of court.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.08/9-1-1975/5321.08-9-1-1975.pdf
  text: '(A) Whenever a tenant deposits rent with the clerk of a court as provided
    in section


    5321.07


    of the Revised Code, the clerk shall give written notice of this fact to the landlord
    and to his agent, if any.


    (B) The clerk shall place all rent deposited with him in a separate rent escrow
    account in the name of the clerk in a bank or building and loan association domiciled
    in this state.


    (C) The clerk shall keep in a separate docket an account of each deposit, with
    the name and address of the tenant, and the name and address of the landlord and
    of his agent, if any.


    (D) For his costs, the clerk may charge a fee of one per cent of the amount of
    the rent deposited, which shall be assessed as court costs.


    (E) All interest that has accrued on the rent deposited by the clerk of a county
    court under division (B) of this section shall be paid into the treasury of the
    political subdivision for which the clerk performs his duties. All interest that
    has accrued on the rent deposited by the clerk of a municipal court under division
    (B) of this section shall be paid into the city treasury as defined in division
    (B) of section


    1901.03


    of the Revised Code.'
