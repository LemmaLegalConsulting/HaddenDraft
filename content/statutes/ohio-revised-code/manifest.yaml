- section: '1349.45'
  title: Misleading or deceptive use of financial institution name or logo prohibited.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.45
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.45/3-23-2018/1349.45-3-23-2018.pdf
  text: '(A) As used in this section, "financial institution" means any bank, savings
    and loan association, savings bank, or credit union; any affiliate or subsidiary
    of a bank, savings and loan association, savings bank, or credit union; any registrant
    as defined in section


    1321.51


    of the Revised Code ; or any person registered as a mortgage lender under Chapter
    1322. of the Revised Code.


    (B) No person shall use the name or logo of any financial institution in connection
    with the sale, offering for sale, distribution, or advertising of any product
    or service without the express written consent of the financial institution, if
    such use is misleading or deceptive as to the source of origin or sponsorship
    of, or the affiliation with, the product or service.'
