- section: '3767.12'
  title: Habitual resort for thieves, burglars, robbers or persons involved in felonious
    conduct.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.12/3-23-2000/3767.12-3-23-2000.pdf
  text: '(A) As used in this section, "felonious conduct" means an offense that is
    a felony or a delinquent act that would be a felony if committed by an adult.


    (B) A house or building used or occupied as a habitual resort for thieves, burglars,
    or robbers, or for persons who are conspiring or planning to commit, who are fleeing
    after having committed or after attempting to commit, or who are in hiding after
    having committed or after attempting to commit, felonious conduct is a public
    nuisance, and the court may order the public nuisance abated.


    No person shall keep a house that is a habitual resort for thieves, burglars,
    or robbers, or for persons who are conspiring or planning to commit, who are fleeing
    after having committed or after attempting to commit, or who are in hiding after
    having committed or after attempting to commit, felonious conduct. No person shall
    let a house to be so kept, or knowingly permit a house that the person has let
    to be so kept.'
