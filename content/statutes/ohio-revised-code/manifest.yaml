- section: '4781.33'
  title: Notice of flood event affecting manufactured home park.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.33
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.33/1-21-2018/4781.33-1-21-2018.pdf
  text: 'When a flood event affects a manufactured home park, the operator of the
    manufactured home park, in accordance with rules adopted under section


    4781.26


    of the Revised Code, shall notify the division of industrial compliance and the
    board of health having jurisdiction where the flood event occurred within forty-eight
    hours after the end of the flood event. The division, after receiving notification,
    shall immediately notify the board of health.


    After being notified of such a flood event, the board of health shall cause an
    inspection to be made of the manufactured home park named in the notice. The board
    of health shall issue a report of the inspection to the division of industrial
    compliance within ten days after the inspection is completed.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 8edd2abf11b1295f81aa4359c731b41e6ca821b055c1eee8f5155a973f18a789
