- section: '2715.26'
  title: Discharge of attachment by bond - deposit in lieu of bond.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.26
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.26/3-13-1986/2715.26-3-13-1986.pdf
  text: 'If the defendant, or other person on his behalf, before judgment, executes
    a bond to the plaintiff, with sufficient surety resident in the county and approved
    by the court, in the same amount as the bond filed by the plaintiff under section


    2715.044


    of the Revised Code, or if the plaintiff has not filed such a bond, in double
    the amount of the plaintiff''s claim as stated in his affidavit under section


    2715.03


    of the Revised Code, to the effect that the defendant will perform the judgment
    of the court, the attachment shall be discharged and restitution made of any property
    taken under it, or the proceeds thereof. Such bond shall also discharge the liability
    of a garnishee in the action for property of the defendant in his hands.


    The defendant, in lieu of the bond provided for in this section, may deposit with
    the clerk of the court cash in an amount equal to the approximate value of the
    property or the amount of the bond of the plaintiff if he filed a bond, whichever
    is less.


    If the defendant is indigent, the court may, upon motion of the defendant or on
    its own motion, waive the bond required by this section or set the bond in a lower
    amount, as fairness requires.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: ef5d27fb28e176776794ab4a1e8bf7ab3423397df038a81c810689b2e48f4041
