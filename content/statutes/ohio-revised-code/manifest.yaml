- section: '1349.37'
  title: Office of consumer affairs.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.37
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.37/5-24-2002/1349.37-5-24-2002.pdf
  text: 'There is hereby created in the division of financial institutions the office
    of consumer affairs. The responsibilities of the office shall, at a minimum, include
    all of the following:


    (A) Providing education to residents of this state regarding borrowing and related
    financial topics;


    (B) Providing referrals to credit counseling services;


    (C) Receiving complaints regarding alleged failures to comply with section


    1349.26


    or


    1349.27


    of the Revised Code;


    (D) Contacting the persons that are the subject of such complaints, on behalf
    of the consumers;


    (E) Referring matters to the superintendent of financial institutions for action
    under section


    1349.34


    of the Revised Code.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
