- section: '2716.04'
  title: Proof of service of written demand.
  url: https://codes.ohio.gov/ohio-revised-code/section-2716.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2716
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2716/2716.04/8-29-2000/2716.04-8-29-2000.pdf
  text: 'The affidavit required by section


    2716.03


    of the Revised Code in a proceeding for garnishment of personal earnings shall
    be accompanied by the return receipt requested for the written demand made pursuant
    to section


    2716.02


    of the Revised Code, the unclaimed letter, or a photographic or other direct image
    copy of the receipt or letter if the demand was sent by certified mail, return
    receipt requested; by proof of service by the court of the demand; or by a properly
    completed and stamped certificate of mailing by regular mail, a photographic or
    other direct image copy of the demand, and a sworn statement that it was sent
    by regular mail. The clerk shall serve a copy of the affidavit on the garnishee.'
