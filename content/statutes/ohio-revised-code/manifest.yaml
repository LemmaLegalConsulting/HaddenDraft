- section: '5721.371'
  title: Private attorney's fees in tax certificate actions.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.371
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.371/9-28-2016/5721.371-9-28-2016.pdf
  text: '(A) Private attorney''s fees payable with respect to an action under sections


    5721.30


    to


    5721.46


    of the Revised Code are subject to the following conditions:


    (1) The fees must be reasonable.


    (2) Fees exceeding two thousand five hundred dollars shall be paid only if authorized
    by a court order.


    (B)(1) Fees less than or equal to two thousand five hundred dollars shall be presumed
    to be reasonable.


    (2) If the private attorney''s fees payable are fixed and not determined on an
    hourly basis, the court shall not consider or require evidence of hours expended
    or hourly rates.


    (3) The terms of a sale negotiated under section


    5721.33


    of the Revised Code may include the amount to be paid in private attorney''s fees,
    subject to division (A)(2) of this section.'
