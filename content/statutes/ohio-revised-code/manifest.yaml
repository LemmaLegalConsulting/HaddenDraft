  text: 'Nothing contained in sections


    5301.47


    to


    5301.56


    , inclusive, of the Revised Code, shall be construed to extend the period for
    the bringing of an action or for the doing of any other required act under any
    statutes of limitations, nor, except as provided in sections


    5301.47


    to


    5301.56


    , inclusive, of the Revised Code, to affect the operation of any statutes governing
    the effect of the recording or the failure to record any instrument affecting
    land.'
