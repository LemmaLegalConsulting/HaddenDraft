- section: '2715.24'
  title: Officer to act as receiver.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.24
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.24/8-26-1982/2715.24-8-26-1982.pdf
  text: 'When a receiver is not appointed as provided in section


    2715.20


    of the Revised Code, the levying officer who attaches the property shall have
    the powers and perform the duties of a receiver appointed by the court, and, if
    necessary, as such officer may commence and maintain actions in his own name.
    He also may be required to give security other than his official bond.'
