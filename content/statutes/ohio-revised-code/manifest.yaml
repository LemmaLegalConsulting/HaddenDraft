- section: '2737.14'
  title: Final judgment to award permanent possession.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.14/8-26-1982/2737.14-8-26-1982.pdf
  text: In an action to recover possession of personal property in which an order
    of possession has been issued, the final judgment shall award permanent possession
    of the property and any damages to the party obtaining the award to the extent
    the damages proximately resulted from the taking, withholding, or detention of
    the property by the other, and the costs of the action. If delivery of the property
    cannot be made, the action may proceed as a claim for conversion upon due notice
    being given the respondent of the date, time, place, and purpose of the hearing
    upon such claim.
