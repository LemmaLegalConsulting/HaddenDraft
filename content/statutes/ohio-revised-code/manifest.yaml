- section: '5721.42'
  title: Issuing additional tax certificate upon satisfaction of subsequent delinquency.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.42
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.42/9-29-2011/5721.42-9-29-2011.pdf
  text: 'After the settlement required under division (C) of section


    321.24


    of the Revised Code, the county treasurer shall notify the certificate holder
    of the most recently issued tax certificate, by ordinary first class or certified
    mail or by binary means, that the certificate holder may purchase a subsequent
    tax certificate by paying all delinquent taxes on the related certificate parcel
    the lien against which has not been transferred by the sale of a tax certificate.
    During the thirty days after receiving the notice, the certificate holder possesses
    the exclusive right to purchase the subsequent tax certificate by paying those
    amounts to the county treasurer. The amount of the payment shall constitute a
    separate lien against the certificate parcel that shall be evidenced by the issuance
    by the treasurer to the certificate holder of an additional tax certificate with
    respect to the delinquent taxes so paid on the related certificate parcel. The
    amount of the payment as set forth in the tax certificate shall earn interest
    at the rate of eighteen per cent per year. The certificate period of each subsequent
    tax certificate shall terminate on the expiration date of the certificate period
    of the most recent tax certificate for the same certificate parcel.'
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
