- section: '5301.50'
  title: Interests prior to effective date of root of title.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.50
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.50/9-29-1961/5301.50-9-29-1961.pdf
  text: 'Subject to the matters stated in section


    5301.49


    of the Revised Code, such record marketable title shall be held by its owner and
    shall be taken by any person dealing with the land free and clear of all interests,
    claims, or charges whatsoever, the existence of which depends upon any act, transaction,
    event, or omission that occurred prior to the effective date of the root of title.
    All such interests, claims, or charges, however denominated, whether legal or
    equitable, present or future, whether such interests, claims, or charges are asserted
    by a person sui juris or under a disability, whether such person is within or
    without the state, whether such person is natural or corporate, or is private
    or governmental, are hereby declared to be null and void.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: bacbec4f7ed9a859e1e84b484d3534a6b6d08c577dfeab9fae378e13cb0da1d3
  effective_date: September 29, 1961
  latest_legislation: House Bill 81 - 104th General Assembly
