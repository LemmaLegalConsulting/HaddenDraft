- section: '5301.61'
  title: Removal of fixtures or improvements from mortgaged realty.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.61
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.61/1-1-1974/5301.61-1-1-1974.pdf
  text: No person having an interest in real property, buyer, lessee, tenant, or occupant
    of real property, knowing that such real property is mortgaged or the subject
    of a land contract, shall remove, or cause or permit the removal of any improvement
    or fixture from such real property without the consent of the mortgagee, vendor
    under the land contract, or other person authorized to give such consent.
