- section: '3767.18'
  title: Prohibition against defiling spring or well.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.18/10-1-1953/3767.18-10-1-1953.pdf
  text: No person shall maliciously put a dead animal, carcass, or part thereof, or
    other putrid, nauseous, or offensive substance into, or befoul, a well, spring,
