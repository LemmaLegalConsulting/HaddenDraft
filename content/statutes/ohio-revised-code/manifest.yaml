- section: '4112.15'
  title: Civil rights commission general reimbursement fund.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.15
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.15/6-26-2003/4112.15-6-26-2003.pdf
  text: There is hereby created in the state treasury the civil rights commission
    general reimbursement fund, which shall be used to pay operating costs of the
    commission. All amounts received by the commission, and all amounts awarded by
    a court to the commission, for attorney's fees, court costs, expert witness fees,
    and other litigation expenses shall be paid into the state treasury to the credit
    of the fund. All amounts received by the commission for copies of commission documents
    and for other goods and services furnished by the commission shall be paid into
    the state treasury to the credit of the fund.
