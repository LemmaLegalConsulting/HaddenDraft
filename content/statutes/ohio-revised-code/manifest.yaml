- section: '5313.06'
  title: Notice of forfeiture.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.06/4-1-1986/5313.06-4-1-1986.pdf
  text: 'Following expiration of the period of time provided in section


    5313.05


    of the Revised Code, forfeiture of the interest of a vendee in default under a
    land installment contract shall be initiated by the vendor or by his successor
    in interest, by serving or causing to be served on the vendee or his successor
    in interest, if known to the vendor or his successor in interest, a written notice
    which:


    (A) Reasonably identifies the contract and describes the property covered by it;


    (B) Specifies the terms and conditions of the contract which have not been complied
    with;


    (C) Notifies the vendee that the contract will stand forfeited unless the vendee
    performs the terms and conditions of the contract within ten days of the completed
    service of notice and notifies the vendee to leave the premises.


    Such notice shall be served by the vendor or his successor in interest by handing
    a written copy of the notice to the vendee or his successor in interest in person,
    or by leaving it at his usual place of abode or at the property which is the subject
    of the contract or by registered or certified mail by mailing to the last known
    address of the vendee or his successor in interest.'
  raw_html_sha256: 7fd3338f24c53a3e8ca29d774ecccf1b158db9f6476737e91addc154f72ab77a
