- section: '5321.19'
  title: Effect of chapter on political subdivisions.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.19
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.19/9-23-2022/5321.19-9-23-2022.pdf
  text: '(A) Except as provided in division (B) of this section, no political subdivision
    may enact, adopt, renew, maintain, enforce, or continue in existence any charter
    provision, ordinance, resolution, rule, or other measure that is in conflict with
    this chapter, or that regulates the rights and obligations of parties to a rental
    agreement that are regulated by this chapter, including, without limitation, by
    any way imposing or requiring rent control or rent stabilization.


    (B) This chapter does not preempt any of the following:


    (1) Housing, building, health, or safety code, or any ordinance as described in
    division (A)(9) of section


    5321.04


    of the Revised Code, of any political subdivision;


    (2) Charter provision, ordinance, resolution, rule, or other measure of a political
    subdivision that regulates, or has the effect of regulating in any way, rent charged
    or paid for the use of residential premises that such political subdivision owns
    or operates;


    (3) A political subdivision from adopting any charter provision, ordinance, resolution,
    rule, or other measure to implement a plan to use voluntary incentives or agreements
    that regulates, or has the effect of regulating in any way, rent charged or paid
    for the use of residential premises so long as such regulating is related to voluntary
    incentives or agreements to increase or maintain the supply or improve the quality
    of available residential premises, including, without limitation, incentives authorized
    by federal law, the incentives set forth in sections


    3735.65


    to


    3735.70


    of the Revised Code, tax abatements, tax credit financing, bond or other financing,
    or loans or grants from the political subdivision.'
  raw_html_sha256: 88004bcc9ab8f82fd9b856923f6f352fb64db263449a78a392e12059e697d34c
