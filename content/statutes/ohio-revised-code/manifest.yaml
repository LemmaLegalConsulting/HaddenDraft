- section: '2329.65'
  title: Property kept to put out fires exempt.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.65
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.65/10-1-1953/2329.65-10-1-1953.pdf
  text: Property used, or kept to be used, by a municipal corporation or fire company
    for the purpose of extinguishing fire is exempt from execution or sale to satisfy
    any judgment or order arising upon contract or otherwise, but the owner thereof
