- section: '1349.51'
  title: Prohibiting disclosure of certain consumer information.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.51
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.51/9-23-2004/1349.51-9-23-2004.pdf
  text: '(A) As used in this section:


    (1) "Consumer report" and "consumer reporting agency" have the same meanings as
    in the "Fair Credit Reporting Act," 84 Stat. 1128 (1970), 15 U.S.C.A. 1681a, as
    amended.


    (2) "Licensed resident insurance agent" means any natural person or business entity
    licensed as a resident insurance agent under section


    3905.06


    of the Revised Code.


    (B) No consumer reporting agency shall sell or otherwise furnish any information
    relative to an individual''s insurance coverage that was submitted, in whole or
    in part, in conjunction with an insurance company''s inquiry into an individual''s
    credit history or request for a consumer report. This information includes, but
    is not limited to, the expiration date of an insurance policy, information that
    may be used to find a policy''s expiration date or approximate expiration date,
    and the terms and conditions of an insurance policy.


    (C) Division (B) of this section does not prohibit a consumer reporting agency
    from furnishing information relative to an individual''s insurance coverage to
    the agent or producer that supplied the information.


    (D) Division (B) of this section does not prohibit a consumer reporting agency
    from furnishing information relative to an individual''s insurance coverage to
    an insurance company, the insurer''s affiliates, or members of a holding company
    in which the insurer is a member, if the information was supplied by an agent
    or producer acting on behalf of the insurer.


    (E) Nothing in this section shall be construed to prohibit an insurance company
    from obtaining a claims history or motor vehicle report.


    (F) An insurance company shall indemnify, defend, and hold harmless its licensed
    resident insurance agent from and against all liability, damages, fees, and costs
    arising out of or relating to the actions, errors, or omissions of its licensed
    resident insurance agent resulting from the use of credit information or insurance
    scores for the insurance company, provided that its licensed resident insurance
    agent follows the procedures and instructions established by the insurance company
    for its licensed resident insurance agent, works within the authority granted
    by the insurance company to its licensed resident insurance agent, and complies
    with all applicable laws and regulations. Nothing in this section shall be construed
    to provide a consumer or insured with a cause of action that does not exist in
    the absence of this section.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: b8caaaf92d9fa57d3ef7054b55d9f0e7d415d3f17957711e6b47b3d36d61bfb4
