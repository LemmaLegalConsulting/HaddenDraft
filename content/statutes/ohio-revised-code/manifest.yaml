- section: '2329.14'
  title: Execution against unsold goods.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.14/9-29-1999/2329.14-9-29-1999.pdf
  text: 'When goods and chattels levied upon by execution cannot be sold for want
    of bidders or for want of time, the officer who makes the return shall annex to
    the execution a true inventory of the goods and chattels remaining unsold. The
    plaintiff in that execution may have another execution issued directing the sale
    of the goods and chattels levied upon. The goods and chattels shall not be so
    sold unless the written notice requirements of division (A)(1)(a) of section


    2329.13


    of the Revised Code and the public notice requirements of division (A)(2) of that
    section first have been satisfied. Division (B) of that section also applies to
    any sale of goods and chattels levied upon by virtue of a subsequent execution
    of a court of record under this section.'
