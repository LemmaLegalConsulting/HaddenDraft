- section: '2715.21'
  title: Powers and duties of receiver.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.21
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.21/3-23-2015/2715.21-3-23-2015.pdf
  text: '(A) The receiver appointed under section


    2715.20


    of the Revised Code shall take possession of all notes, due bills, books of account,
    accounts, and other evidences of debt, that have been taken by the levying officer
    as the property of the defendant in attachment, and proceed to settle and collect
    them. For that purpose, the receiver may commence and maintain actions in the
    receiver''s own name, as receiver, but no right of defense in the action shall
    be impaired or affected.


    (B) Under the control of the court that appointed the receiver under section


    2715.20


    of the Revised Code, the receiver may do any of the acts specified in section


    2735.04


    of the Revised Code.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
