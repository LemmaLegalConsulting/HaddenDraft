- section: '4781.26'
  title: Rules of uniform application for manufactured home parks; contracts for inspections.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.26
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.26/1-21-2018/4781.26-1-21-2018.pdf
  text: '(A) The division of industrial compliance, subject to Chapter 119. of the
    Revised Code, shall adopt, and has the exclusive power to adopt, rules of uniform
    application throughout the state governing the review of plans, issuance of flood
    plain management permits, and issuance of licenses for manufactured home parks;
    the location, layout, density, construction, drainage, sanitation, safety, and
    operation of those parks; and notices of flood events concerning, and flood protection
    at, those parks. The rules pertaining to flood plain management shall be consistent
    with and not less stringent than the flood plain management criteria of the national
    flood insurance program adopted under the "National Flood Insurance Act of 1968,"
    82 Stat. 572, 42 U.S.C.A. 4001, as amended. The rules shall not apply to the construction,
    erection, or manufacture of any building to which section


    3781.06


    of the Revised Code is applicable.


    (B) The rules pertaining to manufactured home parks constructed after June 30,
    1971, shall specify that each home must be placed on its lot to provide not less
    than fifteen feet between the side of one home and the side of another home, ten
    feet between the end of one home and the side of another home, and five feet between
    the ends of two homes placed end to end.


    (C) The division of industrial compliance shall determine compliance with the
    installation, blocking, tiedown, foundation, and base support system standards
    for manufactured housing located in manufactured home parks adopted by the division
    pursuant to section


    4781.04


    of the Revised Code. All inspections of the installation, blocking, tiedown, foundation,
    and base support systems of manufactured housing in a manufactured home park that
    the division of industrial compliance conducts shall be conducted by a person
    the division of industrial compliance certifies pursuant to section


    4781.07


    of the Revised Code.


    (D) The division of industrial compliance may enter into contracts for the purpose
    of fulfilling the division of industrial compliance''s annual inspection responsibilities
    for manufactured home parks under this chapter. Boards of health of city or general
    health districts shall have the right of first refusal for those contracts.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 324967f30dac6fbd79b07893b17a8d428def0df80429023dcb1842192dcb3cd4
