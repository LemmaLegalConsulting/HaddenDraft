- section: '1345.022'
  title: Installation of unsafe used tires.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.022
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.022/4-15-2021/1345.022-4-15-2021.pdf
  text: '(A) As used in this section:


    (1) "Passenger car" has the same meaning as in section


    4513.021


    of the Revised Code.


    (2) "Unsafe used tire" means a used tire to which any of the following criteria
    applies:


    (a) The tire is worn to two thirty-seconds of an inch tread depth or less on any
    area of the tread.


    (b) The tire has any damage exposing the reinforcing plies of the tire, including
    cuts, cracks, punctures, scrapes, or wear.


    (c) The tire has any repair in the tread shoulder or belt edge area.


    (d) The tire has a puncture that has not been both sealed or patched on the inside
    and repaired with a cured rubber stem through the outside.


    (e) The tire has repair to the sidewall or bead area of the tire.


    (f) The tire has a puncture repair of damage larger than one-fourth of an inch.


    (g) The tire shows evidence of prior use of a temporary tire sealant without evidence
    of a subsequent proper repair.


    (h) The tire has a defaced or removed United States department of transportation
    tire identification number.


    (i) The tire has any inner liner damage or bead damage.


    (j) There is indication of internal separation, such as bulges or local areas
    of irregular tread wear indicating possible tread or belt separation.


    (B)(1) No supplier shall install an unsafe used tire on a passenger car designed
    primarily for carrying passengers that will operate on a public highway.


    (2) A violation of division (B)(1) of this section shall be considered an unconscionable
    consumer sales act or practice under section


    1345.03


    of the Revised Code.


    (C) This section shall not apply to tires mounted on wheels or rims that are temporarily
    removed from a vehicle and reinstalled on the same vehicle.'
