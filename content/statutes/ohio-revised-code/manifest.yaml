- section: '5301.40'
  title: Mortgage or lien satisfied by suit.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.40
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.40/1-1-1993/5301.40-1-1-1993.pdf
  text: 'When a mortgage or other lien is satisfied or declared void, in whole or
    in part, by a judgment, final order, or decree, the clerk of the court in which
    the proceedings are had shall enter upon the record of the mortgage or other lien,
    in the county recorder''s office where it is recorded, a memorandum of the character
    of the proceedings, giving also the volume and page of the record where they are
    recorded.


    The clerk may tax in the bill of costs the fees of the recorder provided by law
    for the entry of the memorandum, release, satisfaction, or record, including a
    fee to himself for making the entry as provided for in division (K) of section


    2303.20


    of the Revised Code, and the fees provided by law for official copies of records.


    In a county in which the county recorder has determined to use the microfilm process
    as provided by section


    9.01


    of the Revised Code and has elected to require a separate instrument for satisfactions
    of mortgages and other liens, the judgment, final order, or decree may constitute
    the separate instrument and shall be recorded as appropriate for the type of action
    involved.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 2f1d220a196a53089e87d4d914c410ab55313eceb14d4bc4d4d9802292951ffb
