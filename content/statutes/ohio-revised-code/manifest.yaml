- section: '5301.17'
  title: New deed from state to correct errors.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.17/10-1-1953/5301.17-10-1-1953.pdf
  text: When, from satisfactory evidence, it appears to the governor and attorney
    general that an error has occurred in a deed executed and delivered in the name
    of the state, or in the certificate of any public officer, upon which, if correct,
    a conveyance would be required from the state, the governor shall correct such
    error by the execution of a correct title deed, according to the intent and object
    of the original purchase or conveyance, to the party entitled to it, his heirs,
    or legal assigns, and take from such party a release to the state of the property
    erroneously conveyed.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
