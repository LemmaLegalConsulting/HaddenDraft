- section: '2715.43'
  title: Objection to surety - additional security.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.43
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.43/8-26-1982/2715.43-8-26-1982.pdf
  text: '(A) In any case in which a motion for attachment is filed, the defendant
    against whom the motion is filed may object to the surety of the plaintiff that
    filed the motion on the bond filed under section


    2715.044


    of the Revised Code, and the plaintiff may object to the surety of the defendant
    or another person on a bond filed under section


    2715.26


    or


    2715.10


    of the Revised Code, respectively. An objection against a surety under this division
    shall be made by filing with the court within ten days after the filing of the
    surety''s bond an exception to the sufficiency of the surety. All objections to
    sureties are otherwise waived. When an exception to a surety is made, that surety
    shall show to the court that it is sufficient to fulfill the obligations of its
    bond. After an exception has been made, the levying officer may execute the order
    of attachment in accordance with section


    2715.09


    of the Revised Code, but shall not take any further action until the surety is
    found by the court to be sufficient or is replaced by sufficient surety.


    (B) Before judgment, after reasonable notice to the plaintiff in an action in
    attachment, the defendant may move the court for additional security on his part.
    On such motion, if the court is satisfied that the surety in the plaintiff''s
    bond has removed from the state or is not sufficient for its amount, it may vacate
    the order of attachment and direct restitution of property taken under it, unless,
    in a reasonable time, to be fixed by the court, the plaintiff gives sufficient
    security.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: 4534dbdcd4b09c4de9ae71f964d25c403abee392bc7c4a2a59d96323e0010df2
  effective_date: August 26, 1982
