- section: '2715.27'
  title: Claim for causing death or injury.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.27/10-1-1953/2715.27-10-1-1953.pdf
  text: 'When the plaintiff''s claim is for causing death or personal injury by a
    negligent or wrongful act, the bond required by section


    2715.26


