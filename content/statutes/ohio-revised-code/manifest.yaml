- section: '3767.07'
  title: Court shall punish offender for violation of injunction or order.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.07
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.07/10-1-1953/3767.07-10-1-1953.pdf
  text: 'In case of the violation of any injunction or closing order, granted under
    sections


    3767.01


    to


    3767.11


    , inclusive, of the Revised Code, or of a restraining order or the commission
    of any contempt of court in proceedings under such sections, the court or, in
    vacation, a judge thereof, may summarily try and punish the offender. The trial
    may be had upon affidavits or either party may demand the production and oral
    examination of the witnesses.'
