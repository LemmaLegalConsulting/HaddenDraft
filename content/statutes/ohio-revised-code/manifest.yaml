- section: '4112.99'
  title: Civil penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.99/4-15-2021/4112.99-4-15-2021.pdf
  text: '(A) Whoever violates this chapter is subject to a civil action for damages,
    injunctive relief, or any other appropriate relief. Except as otherwise provided
    in division (B) of this section, a person may bring such a civil action in a court
    of competent jurisdiction.


    (B) A person is prohibited from bringing a civil action for employment discrimination
    under this section.'
