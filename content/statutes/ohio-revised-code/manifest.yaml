- section: '5301.10'
  title: Parties defendant in suits to cancel leases.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.10/10-1-1953/5301.10-10-1-1953.pdf
  text: 'The plaintiff in an action to cancel a lease or license mentioned in section


    5301.09


    of the Revised Code, or in any way involving it, in order to finally adjudicate
    and determine all questions involving such lease or license in such action, need
    only make those persons defendants, so far as such lease or license is involved,
    who claim thereunder and are in actual and open possession, and those who then
    appear of record, or by the files in such office, to own or have an interest in
    such lease or license. If there is no claimant in actual and open possession,
    and no persons whose interest appears of record or file, then so far as such lease
    or license is involved, it will only be necessary to make the original lessee
    or licensee defendant in order to finally adjudicate and determine all questions
    concerning such lease or license.'
