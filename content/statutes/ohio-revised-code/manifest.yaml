- section: '4781.48'
  title: Unconscionability.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.48
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.48/9-10-2012/4781.48-9-10-2012.pdf
  text: '(A) If the court as a matter of law finds a rental agreement, or any clause
    of it, to have been unconscionable at the time it was made, it may refuse to enforce
    the rental agreement or it may enforce the remainder of the rental agreement without
    the unconscionable clause, or it may so limit the application of any unconscionable
    clause as to avoid any unconscionable result.


    (B) When it is claimed or appears to the court that the rental agreement, or any
    clause of it, may be unconscionable, the parties shall be afforded a reasonable
    opportunity to present evidence as to its setting, purpose, and effect to aid
    the court in making the determination.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
