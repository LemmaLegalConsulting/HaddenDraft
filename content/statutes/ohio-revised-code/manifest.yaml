- section: '3767.22'
  title: Exceptions.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.22
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.22/10-1-1953/3767.22-10-1-1953.pdf
  text: 'Section


    3767.16


    of the Revised Code does not prohibit the deposit of the contents of privy vaults
    and catch basins into trenches or pits not less than three feet deep excavated
    in a lot, field, or meadow, with the consent of the owner, outside of the limits
    of a municipal corporation and not less than thirty rods distant from a dwelling,
    well or spring of water, lake, bay, pond, canal, run, creek, brook or stream of
    water, public road or highway, provided that such contents so deposited are forthwith
    covered with at least twelve inches of dry earth; nor prohibit the deposit of
    such contents in furrows, as specified for such trenches or pits, to be forthwith
    covered with dry earth by plowing or otherwise, and with the consent of the owner
    or occupant of the land in which such furrows are plowed.


    The board of health of a city or a general health district may allow the contents
    of privy vaults and catch basins to be deposited within corporate limits into
    such trenches, pits, or furrows.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
  normalized_text_sha256: 3f66dd393da90aac348724cdf34bd7c06cd26dcef4b096bbcdea2152e0e1714a
