- section: '2737.01'
  title: Replevin definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.01/3-13-1986/2737.01-3-13-1986.pdf
  text: 'As used in this chapter:


    (A) "Movant" means a party to an action who has filed a motion for an order of
    possession of specific personal property pursuant to section


    2737.03


    of the Revised Code.


    (B) "Respondent" means the party against whom a motion for an order of possession
    of specific personal property pursuant to section


    2737.03


    of the Revised Code is filed.


    (C) "Probable cause to support the motion" means that it is likely that the movant
    will obtain judgment against the respondent that entitles the movant to permanent
    possession of the specific personal property that is the subject of a motion filed
    pursuant to section


    2737.03


    of the Revised Code.


    (D) "Order of possession" means the order issued by a court under this chapter
    for delivery to the movant of possession of specific personal property pending
    final judgment in the action.


    (E) "Levying officer" means the sheriff, another authorized law enforcement officer,
    or a bailiff who is ordered by the court to take possession of property and deliver
    it to the movant.


    (F) "Occupied dwelling unit" means a structure that is used in whole or in part
    as a home, residence, or sleeping place by one person who maintains a household
    or by two or more persons who maintain a common household, and the facilities
    or appurtenances in it and in which any person is present or is likely to be present,
    except that such a structure is not an occupied dwelling unit at any time if,
    after reasonable efforts to personally contact any person who may be present in
    the structure at that time, the person who made the efforts reasonably believes
    that no person is present in the structure at that time.'
