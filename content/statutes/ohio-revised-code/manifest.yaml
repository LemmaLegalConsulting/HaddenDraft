- section: '2329.41'
  title: Separate levies directed on separate tracts.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.41
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.41/10-1-1953/2329.41-10-1-1953.pdf
  text: 'When two or more executions come to the hands of an officer, and it is necessary
    to levy on real estate to satisfy them, and either of the judgment creditors,
    or his assignee , requires him to make a separate levy to satisfy his executions,
    the officer shall obey the direction. The officer who makes the levy on behalf
    of the creditor whose execution, is entitled to a preference by sections


    2329.01


    to


    2329.61


    , inclusive, of the Revised Code, has the choice of such part of the real property
    of the judgment debtor as, at two thirds of the appraised value, will be sufficient
    to satisfy it.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
