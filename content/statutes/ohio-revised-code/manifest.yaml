- section: '2715.12'
  title: Effect of service of process upon public officer.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.12/8-26-1982/2715.12-8-26-1982.pdf
  text: The service of process of garnishment under this chapter upon the sheriff,
    coroner, clerk, constable, master commissioner, marshal of a municipal corporation,
    or other officer having in his possession any money, claim, or other property
    of the defendant, other than personal earnings, or in which the defendant has
    an interest, shall bind it from the time of service and be a legal excuse to such
    officers, to the extent of the demand of the plaintiff, for not paying such money
    or delivering such claim or property to the defendant, as by law or the terms
    of the process in his hands he would otherwise be bound to do.
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
