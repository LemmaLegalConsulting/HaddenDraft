- section: '1345.04'
  title: Jurisdiction.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.04/7-14-1972/1345.04-7-14-1972.pdf
  text: 'The courts of common pleas, and municipal or county courts within their respective
    monetary jurisdiction, have jurisdiction over any supplier with respect to any
    act or practice in this state covered by sections


    1345.01


    to


    1345.13


    of the Revised Code, or with respect to any claim arising from a consumer transaction
    subject to such sections.'
