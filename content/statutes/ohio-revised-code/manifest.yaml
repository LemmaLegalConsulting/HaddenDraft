- section: '3781.03'
  title: Enforcement - supervision - records.
  url: https://codes.ohio.gov/ohio-revised-code/section-3781.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3781/3781.03/9-10-2012/3781.03-9-10-2012.pdf
  text: '(A) The state fire marshal, the fire chief of a municipal corporation that
    has a fire department, or the fire chief of a township that has a fire department
    shall enforce the provisions of this chapter and Chapter 3791. of the Revised
    Code that relate to fire prevention.


    (B) The superintendent of industrial compliance, or the building inspector or
    commissioner of buildings in a municipal corporation, county, or township in which
    the building department is certified by the board of building standards under
    section


    3781.10


    of the Revised Code shall enforce in the jurisdiction of each entity all the provisions
    in this chapter and Chapter 3791. of the Revised Code and any rules adopted pursuant
    to those chapters that relate to the construction, arrangement, and erection of
    all buildings or parts of buildings, as defined in section


    3781.06


    of the Revised Code, including the sanitary condition of those buildings in relation
    to heating and ventilation.


    (C) The division of industrial compliance in the department of commerce, boards
    of health of health districts, certified departments of building inspection of
    municipal corporations, and county building departments that have authority to
    perform inspections pursuant to a contract under division (C)(1) of section


    3703.01


    of the Revised Code, subject to Chapter 3703. of the Revised Code, shall enforce
    this chapter and Chapter 3791. of the Revised Code and the rules adopted pursuant
    to those chapters that relate to plumbing. Building drains are considered plumbing
    for the purposes of enforcement of those chapters.


    (D)(1) In accordance with Chapter 3703. of the Revised Code, the department of
    the city engineer, in cities having such departments, the boards of health of
    health districts, or the sewer purveyor, as appropriate, shall have complete authority
    to supervise and regulate the entire sewerage and drainage system in the jurisdiction
    in which it is exercising the authority described in this division, including
    the building sewer and all laterals draining into the street sewers.


    (2) In accordance with Chapter 3703. of the Revised Code, the department of the
    city engineer, the boards of health of health districts, or the sewer purveyor,
    as appropriate, shall control and supervise the installation and construction
    of all drains and sewers that become a part of the sewerage system and shall issue
    all the necessary permits and licenses for the construction and installation of
    all building sewers and of all other lateral drains that empty into the main sewers.
    The department of the city engineer, the boards of health of health districts,
    and the sewer purveyor, as appropriate, shall keep a permanent record of the installation
    and location of every drain and sewer of the drainage and sewerage system of the
    jurisdiction in which it has exercised the authority described in this division.


    (E) This section does not exempt any officer or department from the obligation
    to enforce this chapter and Chapter 3791. of the Revised Code.'
