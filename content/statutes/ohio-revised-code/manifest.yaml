- section: '5301.291'
  title: Mortgage release, cancellation, or satisfaction not defective.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.291
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.291/9-20-1984/5301.291-9-20-1984.pdf
  text: 'No real estate mortgage release, cancellation, or satisfaction of record
    in the office of the county recorder of the county within this state in which
    such real estate is situated shall be deemed defective because:


    (A) The executor, administrator, guardian, assignee, or trustee signed it individually
    instead of in his representative or official capacity.


    (B) The release, cancellation, or satisfaction is by separate instrument, and
    the certificate of acknowledgment is not on the same sheet of paper as the release,
    cancellation, or satisfaction.


    (C) A satisfaction was not recorded within ninety days as required by division
    (B) of section


    5301.36


    of the Revised Code.'
