- section: '3767.19'
  title: Prohibition against nuisances when near state institutions.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.19
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.19/10-6-1994/3767.19-10-6-1994.pdf
  text: 'No person shall carry on the business of slaughtering, tallow chandlery,
    or the manufacturing of glue, soap, starch, or other article, the manufacture
    of which is productive of unwholesome or noxious odors in a building or place
    within one mile of a benevolent or correctional institution supported wholly or
    in part by the state. No person shall erect or operate, within one hundred twenty
    rods of such benevolent institution, a rolling mill, blast furnace, nail factory,
    copper-smelting works, petroleum oil refinery, or other works which may generate
    unwholesome or noxious odors or make loud noises, or which may annoy or endanger
    the health or prevent the recovery of the inmates of such institution. Each week
    such business is conducted, or works operated, constitutes a separate offense.


    All property, real or personal, which is used with the knowledge of the owner
    thereof in violation of this section, shall be liable, without exemption, for
    the fines and costs assessed for such violation.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
  normalized_text_sha256: 5c818bfebc5346e7333a5b251ab1c5267b7941b68370d403697f6fb4723140d5
