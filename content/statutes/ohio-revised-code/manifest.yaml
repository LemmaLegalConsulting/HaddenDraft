- section: '3767.32'
  title: Littering.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.32/1-15-2021/3767.32-1-15-2021.pdf
  text: '(A) No person, regardless of intent, shall deposit litter or cause litter
    to be deposited on any public property, on private property not owned by the person,
    or in or on waters of the state unless one of the following applies:


    (1) The person is directed to do so by a public official as part of a litter collection
    drive;


    (2) Except as provided in division (B) of this section, the person deposits the
    litter in a litter receptacle in a manner that prevents its being carried away
    by the elements;


    (3) The person is issued a permit or license covering the litter pursuant to Chapter
    3734. or 6111. of the Revised Code.


    (B) No person, without privilege to do so, shall knowingly deposit litter, or
    cause it to be deposited, in a litter receptacle located on any public property
    or on any private property not owned by the person unless one of the following
    applies:


    (1) The litter was generated or located on the property on which the litter receptacle
    is located;


    (2) The person is directed to do so by a public official as part of a litter collection
    drive;


    (3) The person is directed to do so by a person whom the person reasonably believes
    to have the privilege to use the litter receptacle;


    (4) The litter consists of any of the following:


    (a) The contents of a litter bag or container of a type and size customarily carried
    and used in a motor vehicle;


    (b) The contents of an ash tray of a type customarily installed or carried and
    used in a motor vehicle;


    (c) Beverage containers and food sacks, wrappings, and containers of a type and
    in an amount that reasonably may be expected to be generated during routine commuting
    or business or recreational travel by a motor vehicle;


    (d) Beverage containers, food sacks, wrappings, containers, and other materials
    of a type and in an amount that reasonably may be expected to be generated during
    a routine day by a person and deposited in a litter receptacle by a casual passerby.


    (C)(1) As used in division (B)(1) of this section, "public property" includes
    any private property open to the public for the conduct of business, the provision
    of a service, or upon the payment of a fee, but does not include any private property
    to which the public otherwise does not have a right of access.


    (2) As used in division (B)(4) of this section, "casual passerby" means a person
    who does not have depositing litter in a litter receptacle as the person''s primary
    reason for traveling to or by the property on which the litter receptacle is located.


    (D) As used in this section:


    (1) "Litter" means garbage, trash, waste, rubbish, ashes, cans, bottles, wire,
    paper, cartons, boxes, automobile parts, furniture, glass, auxiliary containers,
    or anything else of an unsightly or unsanitary nature.


    (2) "Deposit" means to throw, drop, discard, or place.


    (3) "Litter receptacle" means a dumpster, trash can, trash bin, garbage can, or
    similar container in which litter is deposited for removal.


    (4) "Auxiliary container" means a bag, can, cup, food or beverage service item,
    container, keg, bottle, or other packaging to which all of the following apply:


    (a) It is designed to be either single use or reusable.


    (b) It is made of cloth, paper, plastic, foamed or expanded plastic, cardboard,
    corrugated material, aluminum, metal, glass, postconsumer recycled material, or
    similar materials or substances, including coated, laminated, or multilayered
    substrates.


    (c) It is designed for consuming, transporting, or protecting merchandise, food,
    or beverages from or at a food service operation, retail food establishment, grocery,
    or any other type of retail, manufacturing, or distribution establishment.


    (E) This section may be enforced by any sheriff, deputy sheriff, police officer
    of a municipal corporation, police constable or officer of a township, or township
    or joint police district, wildlife officer designated under section


    1531.13


    of the Revised Code, natural resources officer appointed under section


    1501.24


    of the Revised Code, forest-fire investigator appointed under section


    1503.09


    of the Revised Code, conservancy district police officer, inspector of nuisances
    of a county, or any other law enforcement officer within the law enforcement officer''s
    jurisdiction.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
