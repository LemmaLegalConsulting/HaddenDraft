  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.41/1-9-1961/5301.41-1-9-1961.pdf
  text: 'If the final judgment, order, or decree referred to in section


    5301.39


    of the Revised Code, upon which the entry of release, satisfaction, change of
    title, or partition is based, or in which the order for release, satisfaction,
    or record is included, is reversed, vacated, or modified, such reversal, vacation,
    or modification, so far as it applies to such memorandum, release, or satisfaction
    of such mortgage or other lien, record of change of title, or partition, will
    vacate or modify the entry and record.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
