- section: '1309.624'
  title: Waiver - UCC 9-624.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.624
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.624/7-1-2001/1309.624-7-1-2001.pdf
  text: '(A) A debtor or secondary obligor may waive the right to notification of
    disposition of collateral under section


    1309.611


    of the Revised Code only by an agreement to that effect entered into and authenticated
    after default.


    (B) A debtor may waive the right to require disposition of collateral under division
    (E) of section


    1309.620


    of the Revised Code only by an agreement to that effect entered into and authenticated
    after default.


    (C) Except in a consumer-goods transaction, a debtor or secondary obligor may
    waive the right to redeem collateral under section


    1309.623


    of the Revised Code only by an agreement to that effect entered into and authenticated
    after default.'
