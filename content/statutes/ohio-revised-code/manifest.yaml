- section: '1349.32'
  title: Conforming Ohio law to federal law.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.32
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.32/5-24-2002/1349.32-5-24-2002.pdf
  text: 'The purpose of sections


    1349.25


    to


    1349.36


    of the Revised Code is to bring Ohio law into conformance with the "Home Ownership
    and Equity Protection Act of 1994," 108 Stat. 2190, 15 U.S.C.A. 1601 note, as
    amended, and the regulations and interpretations adopted thereunder by the federal
    reserve board, in order to facilitate the uniform administration and enforcement
    of state and federal laws on the regulation of certain high cost mortgages.


    In furtherance of that purpose, the regulations and interpretations adopted by
    the federal reserve board to implement the "Home Ownership and Equity Protection
    Act of 1994," which regulations and interpretations are effective as of the effective
    date of this section, are hereby deemed applicable to sections


    1349.25


    to


    1349.36


    of the Revised Code. Such regulations and interpretations include the amendment
    of sections


    226.32


    and


    226.34


    of Title 12 of the Code of Federal Regulations, which amendment was approved by
    the federal reserve board on December 12, 2001, and takes effect October 1, 2002.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: 53337aff9a1453fb1e04909a4f4e037a8894453e6cbd3c6ecf70714422a9136c
