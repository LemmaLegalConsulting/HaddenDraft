- section: '4781.50'
  title: Security deposit.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.50
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.50/9-10-2012/4781.50-9-10-2012.pdf
  text: '(A) Any security deposit in excess of fifty dollars or one month''s periodic
    rent, whichever is greater, shall bear interest on the excess at the rate of five
    per cent per annum if the resident remains in possession of the premises for six
    months or more, and shall be computed and paid annually by the park operator to
    the resident.


    (B) Upon termination of the rental agreement any property or money held by the
    park operator as a security deposit may be applied to the payment of past due
    rent and to the payment of the amount of damages that the park operator has suffered
    by reason of the resident''s noncompliance with section


    4781.39


    of the Revised Code or the rental agreement. Any deduction from the security deposit
    shall be itemized and identified by the park operator in a written notice delivered
    to the resident together with the amount due, within thirty days after termination
    of the rental agreement and delivery of possession. The resident shall provide
    the park operator in writing with a forwarding address or new address to which
    the written notice and amount due from the park operator may be sent. If the resident
    fails to provide the park operator with the forwarding or new address as required,
    the resident shall not be entitled to damages or attorneys'' fees under division
    (C) of this section.


    (C) If the park operator fails to comply with division (B) of this section, the
    resident may recover the property and money due the resident, together with damages
    in an amount equal to the amount wrongfully withheld, and reasonable attorneys''
    fees.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 6d5a4632a2fe0f18449c6fc47b95b55cb2f9fc984f94805c44c1c46327173795
  effective_date: September 10, 2012
