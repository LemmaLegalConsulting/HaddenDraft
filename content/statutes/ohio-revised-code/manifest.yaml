- section: '5301.20'
  title: Reversion to owner of land conveyed to state.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.20
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.20/10-1-1953/5301.20-10-1-1953.pdf
  text: 'When a conveyance of lands or tenements made to the state contains a condition
    that the real estate so conveyed shall revert to the grantor on the payment of
    a certain sum of money, or on the performance of other conditions, and the money,
    with legal interest thereon, from the time it was due or payable, is paid to the
    treasurer of state, or other person authorized to receive it, or the other conditions
    stated in such deed are performed according to the stipulations contained therein,
    on receiving a certificate from the proper officer of such payment or other performance,
    the governor shall execute and deliver to the grantor, his heirs, or assigns,
    a deed or release for the property so conveyed.


    When there has been a foreclosure of the equity of redemption for the nonperformance
    of the conditions stated in any such deed of conveyance, this section and section


    5301.19


    of the Revised Code are inoperative as to such case.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
