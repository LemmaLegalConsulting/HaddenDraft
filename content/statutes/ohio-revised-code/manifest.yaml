  text: Whenever the county recorder in making photostatic or photographic records
    leaves no margin suitable for the entering or recording of assignments, cancellations,
    or further transactions relating to the instruments so recorded, or whenever such
    margin is completely filled with assignments, cancellations, or further transactions
