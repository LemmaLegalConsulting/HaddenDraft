- section: '4781.35'
  title: Prosecuting violations.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.35
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.35/1-21-2018/4781.35-1-21-2018.pdf
  text: '(A) No person shall violate sections


    4781.26


    to


    4781.35


    of the Revised Code or the rules adopted thereunder.


    (B) The prosecuting attorney of the county, the city director of law, or the attorney
    general, upon complaint of the division of industrial compliance, shall prosecute
    to termination or bring an action for injunction against any person violating
    sections


    4781.26


    to


    4781.35


    of the Revised Code or the rules adopted thereunder.'
