- section: '2737.06'
  title: Issuing order of possession without hearing.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.06/3-13-1986/2737.06-3-13-1986.pdf
  text: '(A) If a motion for an order of possession has been filed pursuant to section


    2737.03


    of the Revised Code, the court may issue an order of possession without conducting
    a hearing if it finds all of the following:


    (1) The notice, motion, and affidavit have been served on the respondent as required
    by section


    2737.05


    of the Revised Code;


    (2) The respondent has not requested a hearing within the prescribed time pursuant
    to section


    2737.04


    of the Revised Code, and a continuance of the scheduled hearing has not been granted
    pursuant to division (B) of this section;


    (3) The respondent has not filed a bond on or before the fifth business day after
    he received the notice;


    (4) The court finds, on the basis of the affidavit, that there is probable cause
    to support the motion.


    (B) If the respondent does not request a hearing on the motion within the prescribed
    time pursuant to section


    2737.04


    of the Revised Code, the court nevertheless may grant a continuance of the scheduled
    hearing if the respondent, prior to the time at which the hearing was scheduled,
    as indicated on the notice served on the respondent under section


    2737.04


    of the Revised Code or the time of issuance of an order of possession, whichever
    is earlier, establishes a reasonable justification for his failure to request
    the hearing within the prescribed time. If the court grants such a continuance
    of the hearing, it shall cause the matter to be set for hearing as soon as practicable
    thereafter, but in no event shall the continued hearing be set for a time that
    is more than five business days after the date on which the original hearing was
    scheduled unless the movant consents to the setting of a hearing at a later time.
    The continued hearing shall be conducted in accordance with section


    2737.07


    of the Revised Code.


    (C) If the court grants a continuance of the scheduled hearing pursuant to division
    (B) of this section, the court shall not issue an order of possession without
    a hearing pursuant to division (A) of this section unless the respondent subsequently
    delivers written notice to the contrary to the court.'
