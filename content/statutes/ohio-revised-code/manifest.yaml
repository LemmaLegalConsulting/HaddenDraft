- section: '323.70'
  title: Final hearing on complaint - dismissal on petition.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.70
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.70/9-4-2014/323.70-9-4-2014.pdf
  text: '(A) Subject to this section and to sections


    323.71


    and


    323.72


    of the Revised Code, a county board of revision shall conduct a final hearing
    on the merits of a complaint filed under section


    323.69


    of the Revised Code, including the validity or amount of any impositions alleged
    in the complaint, not sooner than thirty days after the service of notice of summons
    and complaint has been perfected. If, after a hearing, the board finds that the
    validity or amount of all or a portion of the impositions is not supported by
    a preponderance of the evidence, the board may order the county auditor to remove
    from the tax list and duplicate amounts the board finds invalid or not supported
    by a preponderance of the evidence. The auditor shall remove all such amounts
    from the tax list and duplicate as ordered by the board of revision, including
    any impositions asserted under sections


    715.26


    and


    715.261


    of the Revised Code.


    (B) If, on or before the fourteenth day after service of process is perfected
    under division (B) of section


    323.69


    of the Revised Code, a record owner files with the clerk of court a motion requesting
    that the county board of revision order the case to be transferred to a court
    pursuant to section


    323.691


    of the Revised Code, the board shall, without conducting a hearing on the matter,
    promptly transfer the case for foreclosure of that land to a court pursuant to
    section


    323.691


    of the Revised Code to be conducted in accordance with the applicable laws.


    (C) A county board of revision, in accordance with the Rules of Civil Procedure,
    may issue subpoenas compelling the attendance of witnesses and the production
    of papers, books, accounts, and testimony as necessary to conduct a hearing under
    this section or to otherwise adjudicate a case under sections


    323.65


    to


    323.79


    of the Revised Code.'
