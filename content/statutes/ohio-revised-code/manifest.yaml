- section: '2737.10'
  title: Filing of bond before order of possession is effective.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.10/3-13-1986/2737.10-3-13-1986.pdf
  text: 'An order of possession issued by a court shall not be effective until the
    movant files with the court a bond to the respondent, executed by the movant''s
    surety, in an amount twice the approximate value of the property described in
    the order, to the effect that, should judgment be issued against the movant, the
    movant will return the property taken or pay the value so assessed, at the election
    of the respondent, and also pay the damages suffered by the respondent as a result
    of the taking and detention of, and any injury to, the property and the costs
    of the action.


    In lieu of the bond, the movant may deposit with the clerk of the court cash in
    an amount equal to twice the approximate value of the property.


    If the movant is indigent, the court may, on motion of the movant or on its own
    motion, waive the bond required by this section, or may set the bond in a lower
    amount, as fairness requires.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
  normalized_text_sha256: ba717797960c9b929f66ce6496642f7a95fd8beaad85a801f8c62d6b7cd4d3fc
