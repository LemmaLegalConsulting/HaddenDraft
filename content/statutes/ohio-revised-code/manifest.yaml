- section: '5301.47'
  title: Marketable title definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.47
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.47/9-29-1961/5301.47-9-29-1961.pdf
  text: 'As used in sections


    5301.47


    to


    5301.56


    , inclusive, of the Revised Code:


    (A) "Marketable record title" means a title of record, as indicated in section


    5301.48


    of the Revised Code, which operates to extinguish such interests and claims, existing
    prior to the effective date of the root of title, as are stated in section


    5301.50


    of the Revised Code.


    (B) "Records" includes probate and other official public records, as well as records
    in the office of the recorder of the county in which all or part of the land is
    situate.


    (C) "Recording," when applied to the official public records of the probate or
    other court, includes filing.


    (D) "Person dealing with land" includes a purchaser of any estate or interest
    therein, a mortgagee, a levying or attaching creditor, a land contract vendee,
    or any other person seeking to acquire an estate or interest therein, or impose
    a lien thereon.


    (E) "Root of title" means that conveyance or other title transaction in the chain
    of title of a person, purporting to create the interest claimed by such person,
    upon which he relies as a basis for the marketability of his title, and which
    was the most recent to be recorded as of a date forty years prior to the time
    when marketability is being determined. The effective date of the "root of title"
    is the date on which it is recorded.


    (F) "Title transaction" means any transaction affecting title to any interest
    in land, including title by will or descent, title by tax deed, or by trustee''s,
    assignee''s, guardian''s, executor''s, administrator''s, or sheriff''s deed, or
    decree of any court, as well as warranty deed, quit claim deed, or mortgage.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: dba41f40c706962d42ce78bfed2ac16ad0efb3c8c1537e06cf196ef058b6b9c9
  effective_date: September 29, 1961
