- section: '5321.16'
  title: Procedures for security deposits.
  url: https://codes.ohio.gov/ohio-revised-code/section-5321.16
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5321
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5321/5321.16/11-4-1974/5321.16-11-4-1974.pdf
  text: '(A) Any security deposit in excess of fifty dollars or one month''s periodic
    rent, whichever is greater, shall bear interest on the excess at the rate of five
    per cent per annum if the tenant remains in possession of the premises for six
    months or more, and shall be computed and paid annually by the landlord to the
    tenant.


    (B) Upon termination of the rental agreement any property or money held by the
    landlord as a security deposit may be applied to the payment of past due rent
    and to the payment of the amount of damages that the landlord has suffered by
    reason of the tenant''s noncompliance with section


    5321.05


    of the Revised Code or the rental agreement. Any deduction from the security deposit
    shall be itemized and identified by the landlord in a written notice delivered
    to the tenant together with the amount due, within thirty days after termination
    of the rental agreement and delivery of possession. The tenant shall provide the
    landlord in writing with a forwarding address or new address to which the written
    notice and amount due from the landlord may be sent. If the tenant fails to provide
    the landlord with the forwarding or new address as required, the tenant shall
    not be entitled to damages or attorneys fees under division (C) of this section.


    (C) If the landlord fails to comply with division (B) of this section, the tenant
    may recover the property and money due him, together with damages in an amount
    equal to the amount wrongfully withheld, and reasonable attorneys fees.'
