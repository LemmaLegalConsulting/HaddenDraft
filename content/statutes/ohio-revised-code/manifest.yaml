- section: '1349.22'
  title: Advancing funds for incidental fees.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.22
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.22/1-1-1996/1349.22-1-1-1996.pdf
  text: 'Nothing in section


    1349.21


    of the Revised Code prohibits an escrow or closing agent from advancing funds
    not exceeding one thousand dollars from an escrow account or otherwise on behalf
    of a party to an escrow transaction for the purpose of paying incidental fees,
    such as conveyance and recording fees, in order to effect and close the sale,
    purchase, exchange, transfer, encumbrance, or lease of residential real property
    that is the subject of the escrow transaction.'
