- section: '5301.68'
  title: Granting conservation or agricultural easement.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.68
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.68/1-1-2016/5301.68-1-1-2016.pdf
  text: 'An owner of land may grant a conservation easement to the department of natural
    resources, a park district created under Chapter 1545. of the Revised Code, a
    township park district created under section


    511.18


    of the Revised Code, a conservancy district created under Chapter 6101. of the
    Revised Code, a soil and water conservation district created under Chapter 940.
    of the Revised Code, a regional water and sewer district created under Chapter
    6119. of the Revised Code, a county, a township, a municipal corporation, or a
    charitable organization that is authorized to hold conservation easements by division
    (B) of section


    5301.69


    of the Revised Code, in the form of articles of dedication, easement, covenant,
    restriction, or condition. An owner of land also may grant an agricultural easement
    to the director of agriculture; to a municipal corporation, county, township,
    or soil and water conservation district; or to a charitable organization described
    in division (B) of section


    5301.69


    of the Revised Code. An owner of land may grant an agricultural easement only
    on land that is valued for purposes of real property taxation at its current value
    for agricultural use under section


    5713.31


    of the Revised Code or that constitutes a homestead when the easement is granted.


    All conservation easements and agricultural easements shall be executed and recorded
    in the same manner as other instruments conveying interests in land.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
