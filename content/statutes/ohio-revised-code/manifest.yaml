- section: '2715.01'
  title: Grounds of attachment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.01/8-15-1996/2715.01-8-15-1996.pdf
  text: '(A) An attachment against the property, other than personal earnings, of
    a defendant may be had in a civil action for the recovery of money, at or after
    its commencement, upon any one of the following grounds:


    (1) Excepting foreign corporations which by compliance with the law therefore
    are exempted from attachment as such, that the defendant or one of several defendants
    is a foreign corporation;


    (2) That the defendant is not a resident of this state;


    (3) That the defendant has absconded with the intent to defraud creditors;


    (4) That the defendant has left the county of the defendant''s residence to avoid
    the service of a summons;


    (5) That the defendant so conceals self that a summons cannot be served upon the
    defendant;


    (6) That the defendant is about to remove property, in whole or part, out of the
    jurisdiction of the court, with the intent to defraud creditors;


    (7) That the defendant is about to convert property, in whole or part, into money,
    for the purpose of placing it beyond the reach of creditors;


    (8) That the defendant has property or rights in action, which the defendant conceals;


    (9) That the defendant has assigned, removed, disposed of, or is about to dispose
    of, property, in whole or part, with the intent to defraud creditors;


    (10) That the defendant has fraudulently or criminally contracted the debt, or
    incurred the obligations for which suit is about to be or has been brought;


    (11) That the claim is for work or labor.


    (B) An attachment shall not be granted on the ground that the defendant is a foreign
    corporation or not a resident of this state for any claim, other than a debt or
    demand arising upon contract, judgment, or decree, or for causing damage to property
    or death or personal injury by negligent or wrongful act.


    (C) An attachment against the personal earnings of a defendant may be granted
    only after a judgment has been obtained by the plaintiff and only through a proceeding
    for garnishment of personal earnings in accordance with Chapter 2716. of the Revised
    Code.


    (D) An attachment against the property, other than personal earnings, of a defendant
    may be accomplished prior to the entry of judgment only pursuant to an attachment
    proceeding under this chapter.


    An attachment against the property, other than personal earnings, of a defendant
    that is in the possession of another person, may be accomplished prior to the
    entry of judgment only pursuant to a garnishment proceeding under section


    2715.091


    of the Revised Code and related provisions of this chapter.


    (E) An attachment against the property, other than personal earnings, of a defendant
    that is in the possession of another person, may be accomplished after judgment
    has been obtained only pursuant to a garnishment proceeding under Chapter 2716.
    of the Revised Code.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
