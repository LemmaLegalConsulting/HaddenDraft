- section: '1322.15'
  title: Obfuscation or concealment of true ownership or control.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.15
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.15/9-1-2021/1322.15-9-1-2021.pdf
  text: No person shall acquire, sell, transfer, or hypothecate any interest in a
    registrant, or an entity holding a letter of exemption issued under this chapter,
    or an applicant for a certificate of registration under this chapter in order
    to obfuscate or conceal the true ownership or control of the registrant, exemption
    holder, or applicant.
