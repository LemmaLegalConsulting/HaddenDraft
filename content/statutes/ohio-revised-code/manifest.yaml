- section: '4112.33'
  title: Office of new African immigrant affairs.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.33
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.33/10-3-2023/4112.33-10-3-2023.pdf
  text: 'The office of new African immigrant affairs is created. The office shall
    be accountable to the new African immigrants commission. The director of the office
    shall be appointed by and serve at the pleasure of the commission.


    The director, with the approval of the commission, shall appoint such employees
    as are necessary to carry out the duties of the office. The employees shall serve
    at the pleasure of the director.


    The office shall execute the tasks assigned to it by the commission, which shall
    include the duties listed in section


    4112.31


    of the Revised Code.'
