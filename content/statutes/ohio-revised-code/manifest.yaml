- section: '4112.31'
  title: Duties of new African immigrants commission.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.31
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.31/9-29-2013/4112.31-9-29-2013.pdf
  text: 'The new African immigrants commission shall do all of the following:


    (A) Gather and disseminate information and conduct hearings, conferences, investigations,
    and special studies on problems and programs concerning sub-Saharan African people;


    (B) Secure appropriate recognition of the accomplishments and contributions of
    sub-Saharan African people to this state;


    (C) Stimulate public awareness of the problems of sub-Saharan African people by
    conducting a program of public education;


    (D) Develop, coordinate, and assist other public and private organizations that
    serve sub-Saharan African people, including the conducting of training programs
    for community leadership and service project staff;


    (E) Advise the governor, general assembly, and state departments and agencies
    of the nature, magnitude, and priorities of the problems of sub-Saharan African
    people;


    (F) Advise the governor, general assembly, and state departments and agencies
    on, and assist in the development and implementation of, comprehensive and coordinated
    policies, programs, and procedures focusing on the special problems and needs
    of sub-Saharan African people, especially in the fields of education, employment,
    energy, health, housing, welfare, and recreation;


    (G) Propose new programs concerning sub-Saharan African people to public and private
    agencies and evaluate for such agencies existing programs or prospective legislation
    concerning sub-Saharan African people;


    (H) Review and approve grants to be made from federal, state, or private funds
    that are administered or subcontracted by the commission;


    (I) Prepare, review, and approve an annual report;


    (J) Serve as a clearinghouse to review and comment on all proposals to meet the
    needs of sub-Saharan African people that are submitted to it by public and private
    agencies;


    (K) Apply for and accept grants and gifts from governmental and private sources
    to be administered by the commission or subcontracted to local agencies;


    (L) Monitor and evaluate all programs subcontracted to local agencies by the commission;


    (M) Endeavor to assure that sub-Saharan African people have access to decision-making
    bodies in all state and local governmental departments and agencies;


    (N) Establish advisory committees on special subjects as needed to facilitate
    and maximize community participation in the operation of the commission;


    (O) Establish with state and local governments and private business and industry
    relationships that promote and assure equal opportunity for sub-Saharan African
    people in government, education, and employment.


    (P) Create an interagency council consisting of the following persons or their
    authorized representatives: one member of the senate appointed by the president
    of the senate; one member of the house of representatives appointed by the speaker
    of the house of representatives; the directors of administrative services, agriculture,
    education, development services, health, highway safety, job and family services,
    liquor control, mental health and addiction services, and developmental disabilities,
    natural resources, rehabilitation and correction, youth services, transportation,
    environmental protection, and budget and management; the chairperson of the Ohio
    civil rights commission, the administrator of the bureau of workers'' compensation,
    the executive director of the opportunities for Ohioans with disabilities agency,
    and an additional member of the governor''s cabinet appointed by the governor.
    The new African immigrants commission, by rule, may designate other state officers
    or their representatives to be members of the council. The director of the commission
    shall be the chairperson of the council.


    The interagency council shall provide and coordinate the exchange of information
    relative to the needs of sub-Saharan African people and promote the delivery of
    state services to such people. The council shall meet at the call of the chairperson.


    Advisory committees shall be composed of persons representing community organizations
    and charitable institutions, public officials, and such other persons as the commission
    determines.'
