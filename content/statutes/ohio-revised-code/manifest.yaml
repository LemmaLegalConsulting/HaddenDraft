- section: '2715.28'
  title: Bond may be executed in vacation.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.28
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.28/10-1-1953/2715.28-10-1-1953.pdf
  text: 'The bond mentioned in sections


    2715.26


    and


    2715.27


    of the Revised Code, in vacation, may be executed in the presence of the officer
    having the order of attachment in his hands, or, after its return before the clerk,
    with the same effect as if executed in court. The sureties shall be approved by
    the officer before whom such bond is executed.'
