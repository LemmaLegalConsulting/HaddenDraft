- section: '323.27'
  title: Joinder of causes of action.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.27/10-1-1953/323.27-10-1-1953.pdf
  text: 'In the proceedings provided by section


    323.25


    of the Revised Code the county treasurer may join in one action any number of
    lots or lands, but the decree shall be rendered severally or separately, and any
    proceedings may be severed, in the discretion of the court, for the purpose of
    trial or appeals, where an appeal is allowed, and the court shall make such order
    for the payment of costs as is equitable and proper.'
