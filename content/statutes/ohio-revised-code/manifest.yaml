- section: '2737.20'
  title: Injunctive relief.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.20
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.20/8-26-1982/2737.20-8-26-1982.pdf
  text: 'In addition to, or in lieu of, any other relief available under sections


    2737.01


    to


    2737.19


    of the Revised Code, the court may grant a temporary restraining order, preliminary
    injunction, or permanent injunction in accordance with the Rules of Civil Procedure.'
