- section: '5303.06'
  title: Recovery when right terminates during the action.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.06
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.06/10-1-1953/5303.06-10-1-1953.pdf
  text: In an action for the recovery of real property, when the plaintiff shows a
    right to recover at the time the action was begun, but during its pendency his
    right has terminated, the verdict and judgment must be according to the fact,
    and the plaintiff may recover for the withholding of the property.
