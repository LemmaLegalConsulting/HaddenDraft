- section: '2715.13'
  title: Garnishee to answer and be examined.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.13/8-26-1982/2715.13-8-26-1982.pdf
  text: 'The answer of the garnishee required by section


    2715.091


    of the Revised Code shall be made before the clerk of the court of common pleas
    of the county in which the garnishee resides, or, if he resides out of the state,
    before the clerk of the county where he was served, or where the action is pending.
    A special examination of the garnishee shall be had, and actions against him for
    failing to appear, or to answer satisfactorily, or to comply with the order of
    the court in the premises, shall be brought in the county in which he resides.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
