- section: '1345.90'
  title: Defective assistive device definitions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.90
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.90/10-31-1996/1345.90-10-31-1996.pdf
  text: 'As used in sections


    1345.90


    to


    1345.95


    of the Revised Code:


    (A) "Assistive device" means a product designed and intended to be used to increase,
    maintain, or improve the functional capabilities of an individual with a disability
    in seeing, hearing, speaking, walking, breathing, performing manual tasks, learning,
    working, or self-care. "Assistive device" includes a wheelchair, motorized scooter,
    assistive listening device, voice synthesized computer module, optical scanner,
    talking software, braille printer, environmental control, adaptive transportation
    aid, communication board, or any device that has a function similar to that of
    any of the foregoing devices. "Assistive device" does not include an invasive
    or noninvasive medical device that attempts to treat a medical condition or a
    hearing aid as defined in section


    4747.01


    of the Revised Code.


    (B) "Consumer" means a person, other than a manufacturer or supplier, who purchases,
    leases, or otherwise acquires a new assistive device or a person who acquires
    an assistive device while the warranty required by section


    1345.91


    of the Revised Code is in effect.


    (C) "Consumer transaction" means a sale, lease, or other transfer of an assistive
    device to a consumer for consideration of five hundred dollars or more.


    (D) "Defect" means a condition that substantially impairs the use, value, or safety
    of an assistive device. "Defect" does not include a condition resulting from abuse,
    misuse for the ordinary purpose or particular purpose, or unauthorized modification
    or alteration of an assistive device by a consumer.


    (E) "Manufacturer" means a person who manufactures, assembles, imports, or distributes
    assistive devices, including an agent of a manufacturer. "Manufacturer" does not
    include a supplier.


    (F) "Supplier" means a seller, lessor, assignor, franchiser, or other person,
    other than a manufacturer, engaged in the business of effecting consumer transactions,
    whether or not the person deals directly with the consumer.'
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
