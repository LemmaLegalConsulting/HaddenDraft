  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.33/10-1-1953/2715.33-10-1-1953.pdf
  text: 'If the garnishee fails to appear and answer as required by section


    2715.29


    of the Revised Code, or if he appears and answers and his disclosure is not satisfactory
    to the plaintiff, or if he fails to comply with the order of the court to deliver
    the property and pay the money owing into court, or to give the bond required
    in section


    2715.32


    of the Revised Code, the plaintiff may proceed against him by civil action. Thereupon
    such proceedings may be had as in other actions. Judgment may be rendered in favor
    of the plaintiff for the amount of property and credits of the defendant in possession
    of the garnishee, for what may appear to be owing by him to the defendant, and
    for the costs of the proceedings against the garnishee.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: d9d9c70ed1da0d60bd212b47f95d0db916d7b15491b2e7a1e6e6e67ead444349
