- section: '5301.29'
  title: Releases of mortgages made valid.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.29/11-9-1959/5301.29-11-9-1959.pdf
  text: 'When any release, cancellation, or satisfaction of a mortgage of real estate
    has been of record for more than twenty-one years in the office of the county
    recorder of the county in which such real estate is situated, and the record thereof
    shows that there is a defect in such release, cancellation, or satisfaction, such
    release, cancellation, or satisfaction and the record thereof shall be cured of
    such defect, if such defect is due to any of the following:


    (A) It purports to be signed by an agent or attorney of the mortgagee or a trustee,
    and no power of attorney or other evidence of authority so to release, cancel,
    or satisfy such mortgage is of record.


    (B) It was signed by less than all of two or more executors, administrators, guardians,
    assignees in insolvency, or trustees.


    (C) The record of such release, cancellation, or satisfaction is not attested
    by the recorder.


    (D) The release, cancellation, or satisfaction by a corporation is executed by
    officers thereof without signing the name of the corporation thereto.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: 5e74377b979f4bafec90ee5b9ab1896174499e4e7b482183b26fdd8c03f84dd9
