- section: '1923.09'
  title: Suit tried by county court judge.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.09/4-3-2003/1923.09-4-3-2003.pdf
  text: '(A) If an action under this chapter is not continued, the place of trial
    is not changed, and neither party demands a jury on the return day of the summons,
    a judge of the court shall try the cause. After hearing the evidence, if the judge
    concludes that the complaint is not true, the judge shall enter judgment against
    the plaintiff for costs. If the judge finds the complaint to be true, the judge
    shall render a general judgment against the defendant, in favor of the plaintiff,
    for restitution of the premises and costs of suit. If the judge finds the complaint
    true in part, the judge shall render a judgment for restitution of that part only,
    and the costs shall be taxed as the judge considers just.


    (B) If a judgment is entered under this section in favor of a plaintiff who is
    a park operator, the judge shall include in the judgment entry authority for the
    plaintiff to permit, in accordance with section


    1923.12


    and division (B) of section


    1923.13


    and division (B) of section


    1923.14


    of the Revised Code, the removal from the manufactured home park and potential
    sale, destruction, or transfer of ownership of the defendant''s manufactured home,
    mobile home, or recreational vehicle.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
  normalized_text_sha256: d8c836f0b08869450d2001f16667044b902482c1198363dcc15e42816408ff3a
