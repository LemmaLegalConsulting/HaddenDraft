- section: '4112.061'
  title: Right of commission to appeal judgment by court.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.061
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.061/6-30-1992/4112.061-6-30-1992.pdf
  text: '(A) The commission, in its discretion, may appeal from an adverse judgment
    rendered by a court. The appeal shall proceed as in the case of appeals in civil
    actions as provided in the Rules of Appellate Procedure and, to the extent not
    in conflict with those rules, Chapter 2505. of the Revised Code. The appeal by
    the commission shall be taken on questions of law relating to the constitutionality,
    construction, or interpretation of the statutes and rules of the commission and
    in matters involving the correctness of the judgment of the court of common pleas
    that an order of the commission is not supported by reliable, probative, and substantial
    evidence.


    (B) Nothing in this section affects in any manner any provision of this chapter
    relating to the rights of any party, inclusive of the commission, to seek other
    court action provided for in this chapter.'
