- section: '1309.610'
  title: Disposition of collateral after default - UCC 9-610.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.610
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.610/7-1-2001/1309.610-7-1-2001.pdf
  text: '(A) After default, a secured party may sell, lease, license, or otherwise
    dispose of any or all of the collateral in its present condition or following
    any commercially reasonable preparation or processing.


    (B) Every aspect of a disposition of collateral, including the method, manner,
    time, place, and other terms, must be commercially reasonable. If commercially
    reasonable, a secured party may dispose of collateral by public or private proceedings,
    by one or more contracts, as a unit or in parcels, at any time and place, and
    on any terms.


    (C) A secured party may purchase collateral:


    (1) At a public disposition; or


    (2) At a private disposition, but only if the collateral is of a kind that is
    customarily sold on a recognized market or the subject of widely distributed standard
    price quotations.


    (D) A contract for a sale, lease, license, or other disposition includes the warranties
    relating to title, possession, quiet enjoyment, and the like that by operation
    of law accompany a voluntary disposition of property of the kind subject to the
    contract.


    (E) A secured party may disclaim or modify warranties under division (D) of this
    section:


    (1) In a manner that would be effective to disclaim or modify the warranties in
    a voluntary disposition of property of the kind subject to the contract of disposition;
    or


    (2) By communicating to the purchaser a record evidencing the contract for disposition
    and including an express disclaimer or modification of the warranties.


    (F) A record is sufficient to disclaim warranties under division (E) of this section
    if it indicates "There is no warranty relating to title, possession, quiet enjoyment,
    or the like in this disposition" or uses words of similar import.'
  raw_html_sha256: 9ef105a2bfc6e61d2cfb65f4d23945e9c893c8b2c717610863268558dd15f940
