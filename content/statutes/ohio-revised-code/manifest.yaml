- section: '5301.25'
  title: Recording in county where real estate situated - survey form.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.25
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.25/1-30-2014/5301.25-1-30-2014.pdf
  text: '(A) All deeds, land contracts referred to in division (A)(21) of section


    317.08


    of the Revised Code, and instruments of writing properly executed for the conveyance
    or encumbrance of lands, tenements, or hereditaments, other than as provided in
    division (C) of this section and section


    5301.23


    of the Revised Code, shall be recorded in the office of the county recorder of
    the county in which the premises are situated. Until so recorded or filed for
    record, they are fraudulent insofar as they relate to a subsequent bona fide purchaser
    having, at the time of purchase, no knowledge of the existence of that former
    deed, land contract, or instrument.


    (B) Whenever a survey is made of lands that are being conveyed, the county auditor
    shall require that the name of the person who made the survey appear in the deed.
    The name shall either be printed, typewritten, stamped, or signed in a legible
    manner. An instrument is in compliance with this division if it contains a statement
    in the following form:


    "A survey of this property was made by _______________"


    (Name)


    This division does not apply to any court decree, order, judgment, or writ, to
    any instrument executed or acknowledged outside of this state, or to any instrument
    executed within this state prior to September 20, 1965.


    (C) All tax certificates sold pursuant to section


    5721.32


    or


    5721.33


    of the Revised Code, or memoranda thereof, may be recorded in the office of the
    county recorder of the county in which the premises are situated, as provided
    in division (B) of section


    5721.35


    of the Revised Code; provided, however, that the first and superior lien of the
    state and its taxing districts conveyed to the holder of the tax certificate,
    as provided in division (A) of section


    5721.35


    of the Revised Code, shall in no way be diminished or adversely affected if the
    tax certificate evidencing the conveyance of such first and superior lien, or
    memorandum thereof, is not recorded as provided in this section.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
