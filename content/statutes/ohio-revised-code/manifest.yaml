- section: '2715.29'
  title: Appearance and answer of garnishee.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.29/8-26-1982/2715.29-8-26-1982.pdf
  text: 'After written notice is issued to a garnishee as provided in section


    2715.091


    of the Revised Code, the garnishee shall appear and answer within the time allowed
    the defendant to answer the petition upon which the attachment was granted. Under
    oath, he shall answer all questions put to him touching property of every description,
    and credits of the defendant in his possession or under his control. The garnishee
    shall truly disclose the amount owing by him to the defendant, other than for
    personal earnings, whether due or not, and in the case of a corporation, any stock
    held therein by or for the benefit of the defendant, at or after the service of
    notice.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
  normalized_text_sha256: 30fb1e5ff734409ebeafe9a2b7fc88029807c66742cfb66e8e18c9493c15c4b7
