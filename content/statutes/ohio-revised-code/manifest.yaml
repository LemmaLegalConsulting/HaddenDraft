- section: '2737.07'
  title: Hearing on motion for order of possession of property.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.07
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.07/8-26-1982/2737.07-8-26-1982.pdf
  text: '(A) Upon the filing of the motion for an order of possession pursuant to
    section


    2737.03


    of the Revised Code, the court shall cause the matter to be set for hearing within
    twenty days thereafter and the respondent shall be notified in accordance with
    section


    2737.05


    of the Revised Code.


    (B) If a hearing is requested in accordance with section


    2737.04


    of the Revised Code or if a continuance is granted in accordance with division
    (B) of section


    2737.06


    of the Revised Code, the hearing shall be limited to a consideration of whether
    there is probable cause to support the motion.


    The court shall issue an order of possession if it finds, on the basis of the
    affidavit and, if applicable, the evidence presented at the hearing, that there
    is probable cause to support the motion.


    (C) Any failure of the respondent to oppose the motion or to refute any evidence
    presented by the movant shall not constitute a waiver of any defense of the respondent
    or affect the respondent''s right to produce evidence at subsequent hearings or
    at the trial of the action.


    (D) The respondent shall be sent prior notice of the date, time, place, and purpose
    of any hearing other than the hearing set under division (A) of this section and
    of the date, time, and place of the trial of the action.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
