- section: '2715.04'
  title: Defendant may request hearing on motion.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.04/3-13-1986/2715.04-3-13-1986.pdf
  text: 'A defendant against whom a motion for attachment is filed under section


    2715.03


    of the Revised Code may receive a hearing on the motion in accordance with section


    2715.043


    of the Revised Code by delivering a written request for a hearing to the court
    within five business days after receipt of the notice provided pursuant to section


    2715.041


    of the Revised Code. The request may set forth the defendant''s reasons for disputing
    the claim of the plaintiff who filed the motion for attachment of the property;
    however, neither the defendant''s inclusion of nor his failure to include such
    reasons upon the request constitutes a waiver of any defense of the defendant
    or affects the defendant''s right to produce evidence at any hearing or at the
    trial of the action. The time and place for the hearing shall be that set forth
    in the notice. If a written request for a hearing is not received by the court
    within the prescribed time and the court does not grant a continuance of the scheduled
    hearing in accordance with division (B) of section


    2715.042


    of the Revised Code, the hearing scheduled pursuant to section


    2715.043


    of the Revised Code immediately shall be canceled and the court shall issue an
    order of attachment in accordance with division (A) of section


    2715.042


    of the Revised Code.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
