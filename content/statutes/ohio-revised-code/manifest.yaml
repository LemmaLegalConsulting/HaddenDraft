- section: '1349.30'
  title: Voluntary adjustments correcting errors.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.30/5-24-2002/1349.30-5-24-2002.pdf
  text: '(A) A person has no liability under section


    1349.31


    of the Revised Code, and shall not be subject to any sanction by the superintendent
    of financial institutions, for any failure to comply with section


    1349.26


    or


    1349.27


    of the Revised Code, if within sixty days after discovering the error, whether
    pursuant to the person''s own procedures or an examination or investigation by
    the superintendent under division (A) or (B) of section


    1349.34


    of the Revised Code, and prior to the initiation of any action by the superintendent
    under divisions (C) to (F) of section


    1349.34


    of the Revised Code or the receipt of written notice of the error from the consumer,
    the person notifies the consumer or other person concerned of the error and makes
    whatever adjustments in the appropriate account are necessary to assure that the
    consumer will not be required to pay an amount in excess of the charge actually
    disclosed, or the dollar equivalent of the annual percentage rate actually disclosed,
    whichever is lower.


    (B) A creditor or assignee shall not be held liable in any action brought under
    section


    1349.29


    of the Revised Code, if the creditor or assignee shows by a preponderance of evidence
    that the compliance failure was not intentional and resulted from a bona fide
    error notwithstanding the maintenance of procedures reasonably adapted to avoid
    any such error. For purposes of this division, "bona fide error" includes, but
    is not limited to, clerical, calculation, computer malfunction and programming,
    and printing errors. "Bona fide error" does not include an error of legal judgment
    with respect to a person''s obligations under sections


    1349.25


    to


    1349.36


    of the Revised Code.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: f625abba475f9ab0382b99f6721329d2f0a74f2e50603748f2498c730f62351f
