- section: '4781.44'
  title: Partial release of rent before trial.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.44
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.44/9-10-2012/4781.44-9-10-2012.pdf
  text: '(A) If a park operator brings an action for the release of rent deposited
    with a clerk of court, the court may, during the pendency of the action, upon
    application of the park operator, release part of the rent on deposit for payment
    of the periodic interest on a mortgage on the premises, the periodic principal
    payments on a mortgage on the premises, the insurance premiums for the premises,
    real estate taxes on the premises, utility services, repairs, and other customary
    and usual costs of operating the premises.


    (B) In determining whether to release rent for the payments described in division
    (A) of this section, the court shall consider the amount of rent the park operator
    receives from other lots, the cost of operating these lots, and the costs which
    may be required to remedy the condition contained in the notice given pursuant
    to division (A) of section


    4781.41


    of the Revised Code.'
