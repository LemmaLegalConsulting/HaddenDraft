- section: '5721.04'
  title: Apportionment of expenses of publishing delinquent tax lists and display
    notices.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.04/9-29-2011/5721.04-9-29-2011.pdf
  text: 'The proper and necessary expenses of publishing the delinquent tax lists,
    delinquent vacant land tax lists, and display notices provided for by sections


    5719.04


    and


    5721.03


    of the Revised Code shall be paid from the county treasury as county expenses
    are paid, and the board of county commissioners shall make provision for them
    in the annual budget of the county submitted to the budget commission, and shall
    make the necessary appropriations. If the board fails to make such appropriations,
    or if an appropriation is insufficient to meet such an expense, any person interested
    may apply to the court of common pleas of the county for an allowance to cover
    the expense, and the court shall issue an order instructing the county auditor
    to issue a warrant upon the county treasurer for the amount necessary. The order
    by the court shall be final and shall be complied with immediately.


    The aggregate amount paid for publication may be apportioned by the county auditor
    among the taxing districts in which the lands on each list are located in proportion
    to the amount of delinquent taxes so advertised in such subdivision, or the county
    auditor may charge the property owner of land on a list a flat fee established
    under section


    319.54


    of the Revised Code for the cost of publishing the list and, if the fee is not
    paid, may place the fee upon the tax duplicate as a lien on the land, to be collected
    as other taxes. Thereafter, the auditor, in making the auditor''s semiannual apportionment
    of funds, shall retain at each semiannual apportionment one half the amount apportioned
    to each such taxing district. The amounts retained shall be credited to the general
    fund of the county until the aggregate of all amounts paid in the first instance
    out of the treasury have been fully reimbursed.'
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
  normalized_text_sha256: 61891e1fe6f74cbe3b4edebf80b21527b5e7eed172f517d7f98c76b9484f6e2e
