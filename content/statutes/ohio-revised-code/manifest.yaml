- section: '5301.11'
  title: Effect of destruction of building upon lessee.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.11
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.11/10-1-1953/5301.11-10-1-1953.pdf
  text: The lessee of a building which, without fault or neglect on his part, is destroyed
    or so injured as to be unfit for occupancy, is not liable to pay rent to the lessor
    or owner thereof, after such destruction or injury, unless otherwise expressly
    provided by written agreement or covenant. The lessee thereupon must surrender
    possession of such premises.
