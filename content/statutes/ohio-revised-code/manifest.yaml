- section: '1345.19'
  title: Jurisdiction.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.19
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.19/5-17-2000/1345.19-5-17-2000.pdf
  text: '(A) The courts of common pleas, and municipal or county courts within their
    respective jurisdictions, have jurisdiction over any supplier with respect to
    a violation of section


    1345.18


    of the Revised Code or any claim arising from a consumer transaction subject to
    that section.


    (B) The power, remedies, forfeitures, and penalties provided by sections


    1345.18


    to


    1345.20


    and division (C) of section


    1345.99


    of the Revised Code are in addition to any other power, remedy, forfeiture, or
    penalty provided by law.'
