- section: '2715.50'
  title: Grounds of attachment before debt is due.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.50
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.50/9-28-1990/2715.50-9-28-1990.pdf
  text: 'A creditor may bring an action on his claim before it is due and have an
    attachment against the property of the debtor when any of the following applies:


    (A) A debtor has sold or otherwise transferred or disposed of his property with
    the fraudulent intent to cheat or defraud his creditors, or to hinder or delay
    them in the collection of their debts;


    (B) A debtor is about to make such a sale or other transfer or disposition of
    his property, with such fraudulent intent;


    (C) A debtor is about to remove his property, or a material part of it, with the
    intent or to the effect of cheating or defrauding his creditors, or of hindering
    or delaying them in the collection of their debts.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
