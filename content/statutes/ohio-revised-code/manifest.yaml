- section: '1349.271'
  title: Rules for prepurchase counseling.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.271
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.271/1-1-2007/1349.271-1-1-2007.pdf
  text: '(A) The superintendent of financial institutions shall, in accordance with
    Chapter 119. of the Revised Code, adopt rules that establish criteria for purposes
    of qualifying counseling services that provide prepurchase counseling to consumers.


    (B) Any not-for-profit credit counseling service approved by an agency of the
    federal government shall be deemed to meet the criteria established by the superintendent
    under this section.'
