- section: '2329.19'
  title: Extent of lien of judgment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.19
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.19/9-28-2016/2329.19-9-28-2016.pdf
  text: 'Upon the determination of the appraised value pursuant to section


    2329.17


    of the Revised Code, if it appears that two-thirds of the appraised value of the
    lands and tenements levied upon is sufficient to satisfy the execution, with costs,
    the judgment on which the execution issued shall not operate as a lien on the
    residue of the debtor''s estate to the prejudice of any other judgment creditor.'
