- section: '2715.36'
  title: Judgment for defendant.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.36
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.36/10-1-1953/2715.36-10-1-1953.pdf
