- section: '5303.12'
  title: Setting verdict aside.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.12
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.12/10-1-1953/5303.12-10-1-1953.pdf
  text: 'If either party is aggrieved by an assessment or valuation made by a jury
    under section


    5303.11


    of the Revised Code, he may apply to the court during the term at which the trial
    was had, by a motion to set aside the verdict, assessment, and valuation, and,
    upon good cause shown, it may set aside such assessment, valuation, and verdict,
    order a new valuation and another jury to be drawn, which shall proceed as provided
    in such section. Either party may challenge jurors as in other civil actions.
    If more than three witnesses are examined by either party on the same point in
    the same case, the judge may tax the costs of such additional witnesses to the
    party calling them.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
