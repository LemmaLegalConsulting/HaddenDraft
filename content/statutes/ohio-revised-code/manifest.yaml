- section: '1349.67'
  title: High-volume seller disclosure requirements.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.67
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.67/7-6-2022/1349.67-7-6-2022.pdf
  text: '(A) An online marketplace shall do both of the following:


    (1) Verify the information collected under division (A) of section


    1349.66


    of the Revised Code not later than ten days after such collection;


    (2) Verify any change to such information not later than ten days after being
    notified of such change by a high-volume third party seller under division (B)
    of section


    1349.66


    of the Revised Code.


    (B) In the case of a high-volume third party seller that provides a copy of a
    valid government-issued tax document, any information contained in such document
    shall be presumed to be verified as of the date of issuance of such document.'
