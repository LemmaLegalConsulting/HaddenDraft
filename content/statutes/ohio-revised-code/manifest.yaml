- section: '2737.09'
  title: Execution of order.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.09/8-26-1982/2737.09-8-26-1982.pdf
  text: 'The levying officer promptly shall execute the order of possession after
    it has taken effect by taking possession of the property described in the order
    and by delivering the property to the movant in accordance with the order of possession.
    The levying officer shall not execute the order if the respondent has filed a
    bond pursuant to section


    2737.11


    of the Revised Code. In addition to the service of the order of possession required
    by section


    2737.08


    or


    2737.19


    of the Revised Code, the levying officer, at the time he takes possession of the
    property, shall deliver a copy of the order to the respondent, or if he is unable
    to find the respondent, shall leave a copy at the address where the property was
    detained.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
