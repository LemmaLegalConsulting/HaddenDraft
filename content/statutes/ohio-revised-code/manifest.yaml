- section: '1349.74'
  title: Unfair or deceptive act under CSPA.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.74
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.74/7-6-2022/1349.74-7-6-2022.pdf
  text: '(A) A violation of sections


    1349.66


    to


    1349.73


    of the Revised Code is an unfair or deceptive act or practice in violation of
    section


    1345.02


    of the Revised Code.


    (B)(1) The attorney general shall enforce sections


    1349.66


    to


    1349.73


    of the Revised Code in the same manner, by the same means, and with the same jurisdiction,
    powers, and duties as though all applicable terms and provisions of sections


    1345.01


    to


    1345.13


    of the Revised Code were incorporated and made part of sections


    1349.66


    to


    1349.73


    of the Revised Code.


    (2) There is no private right of action, pursuant to section


    1345.09


    of the Revised Code, to enforce sections


    1349.66


    to


    1349.73


    of the Revised Code.


    (C) The attorney general may adopt rules with respect to the collection, verification,
    or disclosure of information under sections


    1349.66


    ,


    1349.67


    , and


    1349.70


    to


    1349.73


    of the Revised Code, provided that such regulations are limited to what is necessary
    to collect, verify, and disclose such information.


    (D) Nothing in sections


    1349.66


    to


    1349.74


    of the Revised Code shall be construed to limit the authority of the attorney
    general under any other provision of law.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
