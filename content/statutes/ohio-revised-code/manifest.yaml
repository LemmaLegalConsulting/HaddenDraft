- section: '2715.09'
  title: Manner of executing order of attachment.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.09/8-26-1982/2715.09-8-26-1982.pdf
  text: '(A) The levying officer shall execute an order of attachment, after it has
    taken effect, without delay. He shall go to the place where the defendant''s property
    is, and he or his agent shall make a true inventory and appraisement of all the
    property which shall be set forth in his or his agent''s affidavit and returned
    with the order. When the property is real property, the officer shall leave a
    copy of the order with the occupant of the property, or, if there is no occupant,
    in a conspicuous place on the property. When it is personal property and can be
    reached, he shall take it into his custody and hold it in a secure place subject
    to the order of the court, and shall deliver a copy of the order to the defendant,
    or if he is unable to find the defendant shall leave a copy at the address where
    the property was detained; but, if removal of the property from the address where
    it is detained would be unreasonably expensive, the officer may take possession
    by conspicuously placing a notice of possession on the property. The delivery
    of the order under this division is required in addition to the service of the
    order required by section


    2715.045


    or


    2715.05


    of the Revised Code.


    (B) Unless the order of attachment directed to the levying officer specifies otherwise,
    the officer, in the execution of the order, may use any lawful means to enter
    any building or enclosure, other than an occupied dwelling unit, in which property
    that can be applied to the plaintiff''s claim is contained, if reasonable efforts
    to obtain voluntary admittance have failed. If the officer enters the building
    or enclosure to take possession of property without first obtaining permission
    to enter, he shall file with the court on the next business day an affidavit setting
    forth the circumstances of his entry and the reasons he was unable to obtain voluntary
    admittance.'
