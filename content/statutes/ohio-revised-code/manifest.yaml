- section: '3767.27'
  title: Inspector of nuisances.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.27/8-11-1955/3767.27-8-11-1955.pdf
  text: 'The board of county commissioners, whenever there is a violation of sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, may employ and reasonably compensate one inspector
    of nuisances who shall be vested with police powers and authorized to examine
    all cases of violation of such sections.'
