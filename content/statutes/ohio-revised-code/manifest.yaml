- section: '2715.18'
  title: Form of return.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.18/8-26-1982/2715.18-8-26-1982.pdf
  text: The levying officer shall return upon every order of attachment what he has
    done under it. The return shall show the property attached and the time it was
    attached. When garnishees are served under this chapter, their names, and the
    time each was served, shall be stated. The officer shall return with the order
    all bonds given under it.
