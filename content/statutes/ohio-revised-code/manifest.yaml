- section: '2715.17'
  title: Subsequent attachments.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.17/8-26-1982/2715.17-8-26-1982.pdf
  text: 'When property is under attachment, attachments thereon under subsequent orders
    of attachment must be as follows:


    (A) If it is real property, it shall be attached in the manner prescribed for
    executing attachment.


    (B) If it is personal property, it shall be attached as in the hands of the officer,
    and be subject to any previous attachment.


    (C) If a person is made a garnishee more than once with respect to the same property
    indebtedness or liability, copies of the order and notice mentioned in section


    2715.091


    of the Revised Code shall be left with him in the manner prescribed by section


    2715.091


    of the Revised Code for serving a garnishee.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
