  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.69/7-6-2022/1349.69-7-6-2022.pdf
  text: An online marketplace shall implement and maintain reasonable security procedures
    and practices, including administrative, physical, and technical safeguards, appropriate
    to the nature of the data and the purposes for which the data will be used, to
    protect the data collected to comply with the requirements of this chapter from
    unauthorized use, disclosure, access, destruction, or modification.
