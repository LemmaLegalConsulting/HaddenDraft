- section: '5721.46'
  title: Determining delinquent taxes charged against minerals are uncollectible.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.46
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.46/2-25-1998/5721.46-2-25-1998.pdf
  text: 'If the county treasurer, by means of the remedies provided by law or otherwise,
    determines that delinquent lands containing or producing minerals or any rights
    to minerals, as separately listed and taxed from the fee of the soil pursuant
    to sections


    5713.04


    ,


    5713.05


    , and


    5713.06


    of the Revised Code, have appeared on the delinquent land list and duplicate for
    five years and that taxes charged against those minerals or rights to minerals
    have become uncollectible, the county treasurer shall certify that determination,
    together with the reasons for the determination, to the county board of revision
    and the prosecuting attorney. If the board of revision and the prosecuting attorney
    determine that the taxes are uncollectible, the board of revision and the prosecuting
    attorney shall certify their finding to the county auditor, who shall cause the
    taxes to be stricken from the general tax list and duplicate of real and public
    utility property and from the delinquent tax list and duplicate.'
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
  normalized_text_sha256: 8421494c02260c60f5846f23543baabe77c5ffeea2de776858518215ccd5c0ed
