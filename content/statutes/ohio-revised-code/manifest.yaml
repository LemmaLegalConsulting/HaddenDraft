- section: '1319.01'
  title: Liability for unauthorized use of credit card.
  url: https://codes.ohio.gov/ohio-revised-code/section-1319.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1319
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1319/1319.01/11-18-1969/1319.01-11-18-1969.pdf
  text: A cardholder who receives a credit card from an issuer, which such cardholder
    has not requested nor used, shall not be liable for any use made of such credit
    card which has not been authorized by such cardholder, unless such credit card
    is in replacement or renewal of a credit card previously requested or used by
    the cardholder.
