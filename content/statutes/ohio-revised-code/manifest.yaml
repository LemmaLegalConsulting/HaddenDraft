- section: '4112.11'
  title: Compliance with commission orders for evidence.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.11
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.11/11-12-1969/4112.11-11-12-1969.pdf
  text: '(A) No person shall willfully fail or neglect to attend and testify or answer
    any lawful inquiry or produce records, documents, or other evidence, if in his
    power to do so, in obedience to a subpoena or lawful order of the Ohio civil rights
    commission.


    (B) No person shall, with intent to mislead the commission, make or cause to be
    made any false entry or statement of fact in any report, account, record, or other
    documents submitted to the commission pursuant to its subpoena or other order.
    No person shall willfully neglect or fail to make or cause to be made full, true,
    and correct entries in such reports, accounts, records, or other documents submitted
    to the commission.'
