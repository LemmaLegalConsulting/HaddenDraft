- section: '1322.35'
  title: Obstructing examination or investigation by superintendent of financial institutions.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.35
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.35/3-23-2018/1322.35-3-23-2018.pdf
  text: 'No person, in connection with any examination or investigation conducted
    by the superintendent of financial institutions under this chapter, shall knowingly
    do any of the following:


    (A) Circumvent, interfere with, obstruct, or fail to cooperate, including making
    a false or misleading statement, failing to produce records, or intimidating or
    suborning any witness;


    (B) Tamper with, alter, or manufacture any evidence;


    (C) Withhold, abstract, remove, mutilate, destroy, or secrete any books, records,
    computer records, or other information.'
  raw_html_sha256: 78ea165994922bac13a69670e6e6ec6a5c8c318a3e4f8da6ca248a33140f844f
