- section: '2715.47'
  title: Time in which appeal may be filed.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.47
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.47/10-1-1953/2715.47-10-1-1953.pdf
  text: When an order discharging an order of attachment is made, and a party affected
    thereby excepts thereto, the court or judge shall fix the number of days, not
    to exceed thirty, in which such party may file his appeal, during which it shall
    be filed and the attached property held by the sheriff or other officer.
