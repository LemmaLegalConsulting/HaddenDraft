- section: '5301.84'
  title: Obligations under environmental covenant.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.84
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.84/12-30-2004/5301.84-12-30-2004.pdf
  text: 'An agency is bound by any obligation that it expressly assumes in an environmental
    covenant, but an agency does not assume obligations merely by signing an environmental
    covenant. Any other person that signs an environmental covenant is bound by the
    obligations that the person assumes in the environmental covenant, but signing
    the environmental covenant does not change obligations, rights, or protections
    that are granted or imposed under law other than sections


    5301.80


    to


    5301.92


    of the Revised Code, except as provided in the environmental covenant.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
