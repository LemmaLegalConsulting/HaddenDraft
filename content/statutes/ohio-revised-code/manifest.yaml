- section: '5301.13'
  title: Mode of conveyance by state.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.13
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.13/9-30-2021/5301.13-9-30-2021.pdf
  text: All conveyances of real estate, or any interest therein, sold on behalf of
    the state shall be drafted by the director of administrative services, executed
    in the name of the state, signed by the governor, countersigned by the secretary
    of state, and sealed with the great seal of the state. The director of administrative
    services thereupon must record such conveyance in books to be kept by the director
    of administrative services for that purpose, deliver them to the persons entitled
    thereto, and keep a record of such delivery, showing to whom delivered and the
    date thereof.
