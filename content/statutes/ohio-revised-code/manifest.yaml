- section: '1309.308'
  title: When security interest or agricultural lien is perfected - continuity of
    perfection - UCC 9-308.
  url: https://codes.ohio.gov/ohio-revised-code/section-1309.308
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1309
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1309/1309.308/7-1-2001/1309.308-7-1-2001.pdf
  text: '(A) Except as otherwise provided in this section and section


    1309.309


    of the Revised Code, a security interest is perfected if it has attached and all
    of the applicable requirements for perfection in sections


    1309.310


    to


    1309.316


    of the Revised Code have been satisfied. A security interest is perfected when
    it attaches if the applicable requirements are satisfied before the security interest
    attaches.


    (B) An agricultural lien is perfected if it has become effective and all of the
    applicable requirements for perfection in section


    1309.310


    of the Revised Code have been satisfied. An agricultural lien is perfected when
    it becomes effective if the applicable requirements are satisfied before the agricultural
    lien becomes effective.


    (C) A security interest or agricultural lien is perfected continuously if it is
    originally perfected by one method under this chapter and is later perfected by
    another method under this chapter, without an intermediate period when it was
    unperfected.


    (D) Perfection of a security interest in collateral also perfects a security interest
    in a supporting obligation for the collateral.


    (E) Perfection of a security interest in a right to payment or performance also
    perfects a security interest in a security interest, mortgage, or other lien on
    personal or real property securing the right.


    (F) Perfection of a security interest in a securities account also perfects a
    security interest in the security entitlements carried in the securities account.


    (G) Perfection of a security interest in a commodity account also perfects a security
    interest in the commodity contracts carried in the commodity account.'
