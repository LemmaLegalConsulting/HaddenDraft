- section: '5303.10'
  title: Entry of claim against occupying claimant.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.10/10-1-1953/5303.10-10-1-1953.pdf
  text: 'The court rendering judgment against the occupying claimant in any case provided
    for in sections


    5303.08


    to


    5303.17


    , inclusive, of the Revised Code, at the request of either party, shall cause
    a journal entry thereof to be made, and the action shall then proceed as other
    civil actions.'
