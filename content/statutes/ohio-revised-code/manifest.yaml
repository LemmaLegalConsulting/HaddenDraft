- section: '2715.23'
  title: Report of receiver.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.23
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.23/10-1-1953/2715.23-10-1-1953.pdf
  text: 'When required, the receiver appointed under section


    2715.20


    of the Revised Code shall report his proceedings to the court, and hold all money
    collected by him, and property which may come into his hands, subject to the order
