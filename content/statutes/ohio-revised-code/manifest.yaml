  text: 'The affidavit required by section


    2716.11


    of the Revised Code in a proceeding for garnishment of property, other than personal
    earnings, shall be accompanied by one dollar as the garnishee''s fee for compliance
    with the order, no part of which shall be charged as court costs.'
