- section: '1349.99'
  title: Penalty.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.99/3-23-2018/1349.99-3-23-2018.pdf
  text: '(A) Whoever violates section


    1349.06


    or


    1349.17


    of the Revised Code is guilty of a minor misdemeanor.


    (B)(1) Whoever violates section


    1349.45


    of the Revised Code is guilty of a misdemeanor of the first degree.


    (2) Notwithstanding division (B)(1) of this section, the only remedies that are
    available for a violation of section


    1349.45


    of the Revised Code by a registrant or licensee under Chapter 1322. of the Revised
    Code are those set forth in section


    1322.50


    of the Revised Code or otherwise provided by statute or common law.


    (3) The provisions of division (B) of this section are not intended to be exclusive
    remedies and do not preclude the use of any other remedy provided by law.'
