- section: '2715.431'
  title: Complaint against surety.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.431
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.431/8-26-1982/2715.431-8-26-1982.pdf
  text: 'A party may seek recovery of damages awarded on final judgment and the costs
    of judgment execution against the other party''s surety on a bond filed pursuant
    to section


    2715.044


    ,


    2715.10


    , or


    2715.26


    of the Revised Code if execution of judgment issued in favor of that party is
    returned unsatisfied, by the filing of a complaint against the surety in the same
    action in which the bond was filed.'
