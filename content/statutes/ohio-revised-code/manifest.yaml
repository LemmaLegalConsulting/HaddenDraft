- section: '5301.78'
  title: Unfair service agreement civil action.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.78
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.78/6-16-2026/5301.78-6-16-2026.pdf
  text: '(A)(1) If an unfair service agreement or a notice or memorandum of an unfair
    service agreement is recorded in this state in violation of section


    5301.77


    of the Revised Code, any party with an interest in the residential real estate
    that is the subject of that agreement may commence a civil action in a court of
    competent jurisdiction in the county in which the agreement, notice, or memorandum
    is recorded.


    (2) If the court determines that the recorded instrument is an unfair service
    agreement or a notice or memorandum of an unfair service agreement, the court
    shall do both of the following:


    (a) Issue a judgment declaring the service agreement, notice, or memorandum to
    be unenforceable;


    (b) Award to any party with an interest in the residential real estate that is
    the subject of that agreement all of the following:


    (i) Actual economic damages;


    (ii) Court costs and fees;


    (iii) Reasonable attorney''s fees.


    (B) When an unfair service agreement or notice or memorandum of an unfair service
    agreement is declared unenforceable by a judgment under division (A)(2)(a) of
    this section, any party with an interest in the residential real estate may obtain
    a certified copy of the judgment declaring the service agreement, notice, or memorandum
    to be unenforceable and present the certified copy of the judgment to the county
    recorder''s office for recording within the chain of title to the property.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
  normalized_text_sha256: ef021f9a5cb42be56e1e147d1611b47800c92186ed54a44179ea6ef6d15809a4
