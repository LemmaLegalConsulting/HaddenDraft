- section: '5303.09'
  title: Title under a sale for taxes.
  url: https://codes.ohio.gov/ohio-revised-code/section-5303.09
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5303
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5303/5303.09/10-1-1953/5303.09-10-1-1953.pdf
  text: 'In cases of lands sold for taxes the title by which the successful claimant
    succeeds against the occupying claimant is an adverse and better title under section


    5303.08


    of the Revised Code, whether it is the title under which the taxes were due and
    for which the land was sold, or any other title or claim. The occupying claimant
    holding possession of land sold for taxes, having the deed of a county auditor
    therefor, or a certificate of such sale from a county treasurer, or claiming under
    the person who holds such deed or certificate, has sufficient title to the land
    to demand the value of improvements under such section.'
  raw_html_sha256: 7fc4b548e53cc08a644efdecfb39e4dc50ccb1dd44efe135ec49ea70422869ab
