- section: '1322.10'
  title: Conditions for issuing certificate of registration; renewal.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.10/12-29-2023/1322.10-12-29-2023.pdf
  text: '(A) Upon the conclusion of the investigation required under division (B)
    of section


    1322.09


    of the Revised Code, the superintendent of financial institutions shall issue
    a certificate of registration to the applicant if the superintendent finds that
    the following conditions are met:


    (1) The application is accompanied by the application fee and any fee required
    by the nationwide mortgage licensing system and registry.


    (a) If a check or other draft instrument is returned to the superintendent for
    insufficient funds, the superintendent shall notify the applicant by certified
    mail, return receipt requested, that the application will be withdrawn unless
    the applicant, within thirty days after receipt of the notice, submits the application
    fee and a one-hundred-dollar penalty to the superintendent. If the applicant does
    not submit the application fee and penalty within that time period, or if any
    check or other draft instrument used to pay the fee or penalty is returned to
    the superintendent for insufficient funds, the application shall be withdrawn.


    (b) If a check or other draft instrument is returned to the superintendent for
    insufficient funds after the certificate of registration has been issued, the
    superintendent shall notify the registrant by certified mail, return receipt requested,
    that the certificate of registration issued in reliance on the check or other
    draft instrument will be canceled unless the registrant, within thirty days after
    receipt of the notice, submits the application fee and a one-hundred-dollar penalty
    to the superintendent. If the registrant does not submit the application fee and
    penalty within that time period, or if any check or other draft instrument used
    to pay the fee or penalty is returned to the superintendent for insufficient funds,
    the certificate of registration shall be canceled immediately without a hearing,
    and the registrant shall cease activity as a mortgage broker, mortgage lender,
    or mortgage servicer.


    (2) If the application is for a location that is a residence, evidence that the
    use of the residence to transact business as a mortgage lender, mortgage broker,
    or mortgage servicer is not prohibited.


    (3) The applicant maintains all necessary filings and approvals required by the
    secretary of state.


    (4) The applicant complies with the surety bond requirements of section


    1322.32


    of the Revised Code.


    (5) The applicant has not made a material misstatement of fact or material omission
    of fact in the application.


    (6) Neither the applicant nor any person whose identity is required to be disclosed
    on an application for a certificate of registration has had such a certificate
    of registration or mortgage loan originator license, or any comparable authority,
    revoked in any governmental jurisdiction or has pleaded guilty or nolo contendere
    to or been convicted of a disqualifying offense as determined in accordance with
    section


    9.79


    of the Revised Code.


    (7) The applicant''s operations manager successfully completed the examination
    required by section


    1322.27


    of the Revised Code.


    (8) The applicant''s financial responsibility, experience, and general fitness
    command the confidence of the public and warrant the belief that the business
    will be operated honestly, fairly, and efficiently in compliance with the purposes
    of this chapter and the rules adopted thereunder. The superintendent shall not
    use a credit score or a bankruptcy as the sole basis for registration denial.


    (B) For purposes of determining whether an applicant that is a partnership, corporation,
    or other business entity or association has met the conditions set forth in divisions
    (A)(6) and (8) of this section, the superintendent shall determine which partners,
    shareholders, or persons named in the application must meet those conditions.
    This determination shall be based on the extent and nature of the partner''s,
    shareholder''s, or person''s ownership interest in the partnership, corporation,
    or other business entity or association that is the applicant and on whether the
    person is in a position to direct, control, or adversely influence the operations
    of the applicant.


    (C) The certificate of registration issued pursuant to division (A) of this section
    may be renewed annually on or before the thirty-first day of December if the superintendent
    finds that all of the following conditions are met:


    (1) The renewal application is accompanied by a nonrefundable renewal fee of seven
    hundred dollars for each location of an office to be maintained by the applicant
    in accordance with division (A) of section


    1322.07


    of the Revised Code and any fee required by the nationwide mortgage licensing
    system and registry. If a check or other draft instrument is returned to the superintendent
    for insufficient funds, the superintendent shall notify the registrant by certified
    mail, return receipt requested, that the certificate of registration renewed in
    reliance on the check or other draft instrument will be canceled unless the registrant,
    within thirty days after receipt of the notice, submits the renewal fee and a
    one-hundred-dollar penalty to the superintendent. If the registrant does not submit
    the renewal fee and penalty within that time period, or if any check or other
    draft instrument used to pay the fee or penalty is returned to the superintendent
    for insufficient funds, the certificate of registration shall be canceled immediately
    without a hearing and the registrant shall cease activity as a mortgage broker,
    mortgage lender, or mortgage servicer.


    (2) The applicant meets the conditions set forth in divisions (A)(2), (3), (4),
    (5), (7), and (8) of this section.


    (3) Neither the applicant nor any person whose identity is required to be disclosed
    on the renewal application has had a certificate of registration or mortgage loan
    originator license, or any comparable authority, revoked in any governmental jurisdiction
    or has pleaded guilty or nolo contendere to or been convicted of any of the following
    in a domestic, foreign, or military court:


    (a) During the seven-year period immediately preceding the date of the renewal
    application but excluding any time before the certificate of registration was
    issued, a misdemeanor involving theft or any felony;


    (b) At any time between the date of the original certificate of registration and
    the date of the renewal application, a felony involving an act of fraud, dishonesty,
    a breach of trust, theft, or money laundering.


    (4) The applicant''s certificate of registration is not subject to an order of
    suspension or an unpaid and past due fine imposed by the superintendent.


    (D)(1) Subject to division (D)(2) of this section, if a renewal fee or additional
    fee required by the nationwide mortgage licensing system and registry is received
    by the superintendent after the thirty-first day of December, the certificate
    of registration shall not be considered renewed, and the applicant shall cease
    activity as a mortgage lender, mortgage broker, or mortgage servicer.


    (2) Division (D)(1) of this section shall not apply if the applicant, not later
    than forty-five days after the renewal deadline, submits the renewal fee or additional
    fee and a one-hundred-fifty-dollar penalty to the superintendent.


    (E) Certificates of registration issued under this chapter annually expire on
    the thirty-first day of December.


    (F) The pardon or expungement of a conviction shall not be considered a conviction
    for purposes of this section.


    (G) Notwithstanding any provision of this chapter to the contrary, the superintendent
    shall issue a certificate of registration in accordance with Chapter 4796. of
    the Revised Code to an applicant if either of the following applies:


    (1) The applicant holds a license or certificate of registration in another state.


    (2) The applicant has satisfactory work experience, a government certification,
    or a private certification as described in that chapter as a mortgage broker or
    mortgage lender in a state that does not issue that license or certificate of
    registration.'
