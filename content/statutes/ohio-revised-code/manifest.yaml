- section: '5313.07'
  title: Proceeding for foreclosure and judicial sale.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.07
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.07/11-25-1969/5313.07-11-25-1969.pdf
  text: 'If the vendee of a land installment contract has paid in accordance with
    the terms of the contract for a period of five years or more from the date of
    the first payment or has paid toward the purchase price a total sum equal to or
    in excess of twenty per cent thereof, the vendor may recover possession of his
    property only by use of a proceeding for foreclosure and judicial sale of the
    foreclosed property as provided in section


    2323.07


    of the Revised Code. Such action may be commenced after expiration of the period
    of time prescribed by sections


    5313.05


    and


    5313.06


    of the Revised Code. In such an action, as between the vendor and vendee, the
    vendor shall be entitled to proceeds of the sale up to and including the unpaid
    balance due on the land installment contract.


    Chapter 5313. of the Revised Code does not prevent the vendor or vendee of a land
    installment contract from commencing a quiet title action to establish the validity
    of his claim to the property conveyed under a land installment contract nor from
    bringing an action for unpaid installments.


    Chapter 5313. of the Revised Code does not prevent the vendor and vendee from
    cancelling their interest in a land installment contract under section


    5301.331


    of the Revised Code.'
  raw_html_sha256: 7fd3338f24c53a3e8ca29d774ecccf1b158db9f6476737e91addc154f72ab77a
  normalized_text_sha256: 8ca94e5539c16abaaf2c02416d7b66eeaca5f4f9a329ad91a61da6bd627bb21d
