- section: '1322.17'
  title: Persons registered solely to sell leads or to match buyers.
  url: https://codes.ohio.gov/ohio-revised-code/section-1322.17
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1322
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1322/1322.17/3-23-2018/1322.17-3-23-2018.pdf
  text: A person registered under this chapter solely to sell leads of potential buyers
    to residential mortgage lenders or mortgage brokers, or solely to match buyers
    with residential mortgage lenders or mortgage brokers through a computerized loan
    origination system recognized by the United States department of housing and urban
    development, shall be required to make only those disclosures under this chapter
    that apply to the portion of the transaction during which they have direct buyer
    contact, and shall be subject to all fair conduct and prohibition requirements
    in their dealing with buyers.
