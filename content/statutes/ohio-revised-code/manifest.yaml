- section: '2329.311'
  title: Sale of property with no minimum bid; right to redeem.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.311
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.311/9-29-2017/2329.311-9-29-2017.pdf
  text: '(A) In sales of residential properties taken in execution or order of sale
    that are sold at an auction with the minimum bid pursuant to division (B) of section


    2329.52


    of the Revised Code, the judgment creditor and the first lienholder each have
    the right to redeem the property within fourteen days after the sale by paying
    the purchase price. The redeeming party shall pay the purchase price to the clerk
    of the court in which the judgment was rendered or the order of sale was made.
    Upon timely payment, the court shall proceed as described in section


    2329.31


    of the Revised Code, with the redeeming party considered the successful purchaser
    at the sale.


    (B) If the judgment creditor and the first lienholder each seek to redeem the
    property, pursuant to division (A) of this section, the court shall resolve the
    conflict in favor of the first lienholder.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
