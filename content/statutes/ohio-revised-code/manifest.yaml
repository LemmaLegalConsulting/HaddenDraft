- section: '4781.47'
  title: Rental agreement terms.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.47
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.47/9-10-2012/4781.47-9-10-2012.pdf
  text: '(A) No provision of sections


    4781.36


    to


    4781.52


    of the Revised Code may be modified or waived by any oral or written agreement
    except as provided in division (F) of this section.


    (B) No warrant of attorney to confess judgment shall be recognized in any rental
    agreement or in any other agreement between a park operator and resident for the
    recovery of rent or damages to the residential premises.


    (C) No agreement to pay the park operator''s or resident''s attorney fees shall
    be recognized in any rental agreement for residential premises or in any other
    agreement between a park operator and resident.


    (D) No agreement by a resident to the exculpation or limitation of any liability
    of the park operator arising under law or to indemnify the park operator for that
    liability or its related costs shall be recognized in any rental agreement or
    in any other agreement between a park operator and resident.


    (E) A rental agreement, or the assignment, conveyance, trust deed, or security
    instrument of the park operator''s interest in the rental agreement may not permit
    the receipt of rent free of the obligation to comply with section


    4781.38


    of the Revised Code.


    (F) The park operator may agree to assume responsibility for fulfilling any duty
    or obligation imposed on a resident by section


    4781.39


    of the Revised Code.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 819e6b07802d907a25e438fb44079ca6af9fa5b10b345ef6e57025b3a063121d
