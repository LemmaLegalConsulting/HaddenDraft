- section: '5301.27'
  title: Conditional grants or devises of real estate.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.27/10-1-1953/5301.27-10-1-1953.pdf
  text: 'When any lands are left encumbered, by a deed, will, or other instrument
    of record, with the payment of money, or the performance of any acts by the grantee
    or devisee, such grantee or devisee or his heirs or assigns, upon the payment
    of the money or the performance of the acts, may present the receipt of such payment,
    or the proof of the performance of such acts, to the probate court of the county
    in which such lands are situated. The court must enter such payments and the proof
    of the performance of such acts on its journal, record the receipts and the proof
    of the performance of such acts on the margin of the will record in which such
    encumbrances are created, and order that this be done in like manner on the margin
    of the deed record by the county recorder. Such lands will then be relieved from
    the encumbrances except for fraud.


    No such record of receipts or orders may be made by the probate judge nor shall
    he enter proof of the performance of such acts until notice thereof has been given
    as is required by sections


    2109.32


    and


    2109.33


    of the Revised Code.'
