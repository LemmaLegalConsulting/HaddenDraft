- section: '4781.99'
  title: Penalties.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.99
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.99/9-10-2012/4781.99-9-10-2012.pdf
  text: '(A) Whoever violates division (A) of section


    4781.16


    of the Revised Code is guilty of a minor misdemeanor on a first offense and shall
    be subject to a mandatory fine of one hundred dollars. On a second offense, the
    person is guilty of a misdemeanor of the first degree and shall be subject to
    a mandatory fine of one thousand dollars.


    (B) Whoever violates section


    4781.20


    of the Revised Code is guilty of a minor misdemeanor.


    (C) Whoever violates any of the following is guilty of a misdemeanor of the fourth
    degree:


    (1) Division (B) or (C) of section


    4781.16


    of the Revised Code;


    (2) Section


    4781.22


    of the Revised Code;


    (3) Section


    4781.23


    of the Revised Code;


    (4) Division (A) of section


    4781.24


    of the Revised Code;


    (5) Section


    4781.25


    of the Revised Code;


    (6) Division (A) of section


    4781.35


    of the Revised Code.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 3eab34f5b7d1ad049b1e76b3fd741192af1c9aed17a54361351893eb043e88ec
