- section: '3767.24'
  title: Contempt proceedings.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.24
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.24/8-11-1955/3767.24-8-11-1955.pdf
  text: 'If the defendant, convicted of a violation of sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, fails, neglects, or refuses to abate the nuisance
    described in the indictment, as ordered by the court, or, if the nuisance is of
    a recurring character, and such defendant fails, neglects, or refuses to keep
    it abated, proceedings in contempt of court may be instituted against him and
    all others assisting in or conniving at the violation of such order, and the court
    may direct the sheriff to execute the order of abatement at the cost and expense
    of the defendant.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
