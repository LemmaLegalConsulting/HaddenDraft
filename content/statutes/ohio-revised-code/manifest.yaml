- section: '3767.30'
  title: Picketing or protest during funeral or burial service prohibited.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.30/9-4-2006/3767.30-9-4-2006.pdf
  text: 'Every citizen may freely speak, write, and publish the person''s sentiments
    on all subjects, being responsible for the abuse of the right, but no person shall
    picket or engage in other protest activities, nor shall any association or corporation
    cause picketing or other protest activities to occur, within three hundred feet
    of any residence, cemetery, funeral home, church, synagogue, or other establishment
    during or within one hour before or one hour after the conducting of an actual
    funeral or burial service at that place. No person shall picket or engage in other
    protest activities, nor shall any association or corporation cause picketing or
    other protest activities to occur, within three hundred feet of any funeral procession.


    As used in this section, "other protest activities" means any action that is disruptive
    or undertaken to disrupt or disturb a funeral or burial service or a funeral procession.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
