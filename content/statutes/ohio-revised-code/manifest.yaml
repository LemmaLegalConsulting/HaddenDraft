- section: '1923.081'
  title: Joinder of claims.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.081
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.081/10-18-2007/1923.081-10-18-2007.pdf
  text: 'A trial in an action for forcible entry and detainer for residential premises,
    other than an action against a deceased resident of a manufactured home park,
    or for a storage space at a self-service storage facility, as defined in division
    (A) of section


    5322.01


    of the Revised Code, pursuant to this chapter may also include a trial on claims
    of the plaintiff for past due rent and other damages under a rental agreement,
    unless for good cause shown the court continues the trial on those claims. For
    purposes of this section, good cause includes the request of the defendant to
    file an answer or counterclaim to the claims of the plaintiff or for discovery,
    in which case the proceedings shall be the same in all respects as in other civil
    cases. If, at the time of the trial, the defendant has filed an answer or counterclaim,
    the trial may proceed on the claims of the plaintiff and the defendant. A plaintiff
    who is a park operator may seek a judgment for past due rent and other damages
    under a rental agreement against a deceased manufactured home park resident in
    a separate civil action for damages.'
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
