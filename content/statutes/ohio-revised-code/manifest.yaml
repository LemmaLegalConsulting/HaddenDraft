- section: '1345.27'
  title: Right of seller after cancellation.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.27/9-30-1974/1345.27-9-30-1974.pdf
  text: 'Except as provided in section


    1345.26


    of the Revised Code, within a reasonable time after a home solicitation sale has
    been cancelled or an offer to purchase has been revoked, the buyer upon demand
    must make available to the seller any goods delivered by the seller pursuant to
    the sale. The goods made available shall not have been diminished in quantity
    nor subjected to unreasonable wear or use. The buyer is not obligated to make
    the goods available at any place other than his residence. If the buyer does make
    the goods available to the seller and the seller fails to pick them up within
    twenty days of the buyer''s notice of cancellation the goods become the property
    of the buyer without obligation to pay for them. The buyer has the duty to take
    reasonable care of the goods in his possession before cancellation and twenty
    days thereafter, during which time the goods are otherwise at the seller''s risk.'
  raw_html_sha256: 06fcd0d1570afe45d10366b086018dda97511b63a5d189bf885b995fc171e347
