- section: '2329.67'
  title: Exemption not subject to payment of cost of proceedings to collect debt.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.67
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.67/9-28-1979/2329.67-9-28-1979.pdf
  text: 'The exempt personal earnings provided for in division (A)(13) of section


    2329.66


    of the Revised Code are not subject to the payment of the cost of any proceedings
    brought to recover a judgment for a debt or to satisfy a judgment for a debt.'
