- section: '4781.52'
  title: Conflicting ordinances preempted.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.52
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.52/9-10-2012/4781.52-9-10-2012.pdf
  text: 'No municipal corporation may adopt or continue in existence any ordinance
    and no township may adopt or continue in existence any resolution that is in conflict
    with sections


    4781.36


    to


    4781.52


    of the Revised Code, or that regulates those rights and obligations of parties
    to a rental agreement that are regulated by sections


    4781.36


    to


    4781.52


    of the Revised Code. Sections


    4781.36


    to


    4781.52


    of the Revised Code do not preempt any housing, building, health, or safety codes
    of any municipal corporation or township.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
