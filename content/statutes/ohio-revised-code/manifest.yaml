- section: '5301.01'
  title: Acknowledgment of deed, mortgage, land contract, lease or memorandum of trust.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.01
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.01/1-30-2014/5301.01-1-30-2014.pdf
  text: '(A) A deed, mortgage, land contract as referred to in division (A) (21) of
    section


    317.08


    of the Revised Code, or lease of any interest in real property and a memorandum
    of trust as described in division (A) of section


    5301.255


    of the Revised Code shall be signed by the grantor, mortgagor, vendor, or lessor
    in the case of a deed, mortgage, land contract, or lease or shall be signed by
    the trustee in the case of a memorandum of trust. The signing shall be acknowledged
    by the grantor, mortgagor, vendor, or lessor, or by the trustee, before a judge
    or clerk of a court of record in this state, or a county auditor, county engineer,
    notary public, or mayor, who shall certify the acknowledgement and subscribe the
    official''s name to the certificate of the acknowledgement.


    (B)(1) If a deed, mortgage, land contract as referred to in division (A) (21)
    of section


    317.08


    of the Revised Code, lease of any interest in real property, or a memorandum of
    trust as described in division (A) of section


    5301.255


    of the Revised Code was executed prior to February 1, 2002, and was not acknowledged
    in the presence of, or was not attested by, two witnesses as required by this
    section prior to that date, both of the following apply:


    (a) The instrument is deemed properly executed and is presumed to be valid unless
    the signature of the grantor, mortgagor, vendor, or lessor in the case of a deed,
    mortgage, land contract, or lease or of the settlor and trustee in the case of
    a memorandum of trust was obtained by fraud.


    (b) The recording of the instrument in the office of the county recorder of the
    county in which the subject property is situated is constructive notice of the
    instrument to all persons, including without limitation, a subsequent purchaser
    in good faith or any other subsequent holder of an interest in the property, regardless
    of whether the instrument was recorded prior to, on, or after February 1, 2002.


    (2) Division (B)(1) of this section does not affect any accrued substantive rights
    or vested rights that came into existence prior to February 1, 2002.'
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
