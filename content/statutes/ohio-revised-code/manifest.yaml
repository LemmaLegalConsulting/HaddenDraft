- section: '1345.72'
  title: Duty to repair - repair unsuccessful.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.72
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.72/9-15-1999/1345.72-9-15-1999.pdf
  text: '(A) If a new motor vehicle does not conform to any applicable express warranty
    and the consumer reports the nonconformity to the manufacturer, its agent, or
    its authorized dealer during the period of one year following the date of original
    delivery or during the first eighteen thousand miles of operation, whichever is
    earlier, the manufacturer, its agent, or its authorized dealer shall make any
    repairs as are necessary to conform the vehicle to such express warranty, notwithstanding
    the fact that the repairs are made after the expiration of the appropriate time
    period.


    (B) If the manufacturer, its agent, or its authorized dealer is unable to conform
    the motor vehicle to any applicable express warranty by repairing or correcting
    any nonconformity after a reasonable number of repair attempts, the manufacturer,
    at the consumer''s option and subject to division (D) of this section, either
    shall replace the motor vehicle with a new motor vehicle acceptable to the consumer
    or shall accept return of the vehicle from the consumer and refund each of the
    following:


    (1) The full purchase price;


    (2) All incidental damages, including, but not limited to, any fees charged by
    the lender or lessor for making or canceling the loan or lease, and any expenses
    incurred by the consumer as a result of the nonconformity, such as charges for
    towing, vehicle rental, meals, and lodging.


    (C) Nothing in this section imposes any liability on a new motor vehicle dealer
    or creates a cause of action by a buyer against a new motor vehicle dealer.


    (D) Sections


    1345.71


    to


    1345.78


    of the Revised Code do not affect the obligation of a consumer under a loan or
    retail installment sales contract or the interest of any secured party, except
    as follows:


    (1) If the consumer elects to take a refund, the manufacturer shall forward the
    total sum required under division (B) of this section by an instrument jointly
    payable to the consumer and any lienholder that appears on the face of the certificate
    of title or the lessor. Prior to disbursing the funds to the consumer, the lienholder
    or lessor may deduct the balance owing to it, including any fees charged for canceling
    the loan or the lease and refunded pursuant to division (B) of this section, and
    shall immediately remit the balance if any, to the consumer and cancel the lien
    or the lease.


    (2) If the consumer elects to take a new motor vehicle, the manufacturer shall
    notify any lienholder noted on the certificate of title under section


    4505.13


    of the Revised Code or the lessor. If both the lienholder or the lessor and the
    consumer consent to finance or lease the new motor vehicle obtained through the
    exchange in division (B) of this section, the lienholder or the lessor shall release
    the lien on or surrender the title to the nonconforming motor vehicle after it
    has obtained a lien on or title to the new motor vehicle. If the existing lienholder
    or lessor does not finance or lease the new motor vehicle, it has no obligation
    to discharge the note or cancel the lien on or surrender the title to the nonconforming
    motor vehicle until the original indebtedness or the lease terms are satisfied.'
