- section: '2329.18'
  title: Copy of appraisement to be left with clerk.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.18
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.18/9-28-2016/2329.18-9-28-2016.pdf
  text: '(A) If a court has ordered or the clerk of a court has issued an order for
    the sheriff to advertise and sell the real estate for which the appraised value
    has been determined pursuant to section


    2329.17


    of the Revised Code, the sheriff shall deposit a copy of the appraisal with the
    clerk of the court from which the writ was issued, and immediately advertise and
    sell such real estate in conformity with sections


    2329.01


    to


    2329.61


    of the Revised Code.


    (B) If the court has ordered or the clerk of the court has issued an order for
    a private selling officer to advertise and sell the real estate for which the
    appraised value has been determined pursuant to section


    2329.17


    of the Revised Code, the private selling officer shall immediately advertise and
    sell the real estate in conformity with sections


    2329.01


    to


    2329.61


    of the Revised Code.'
