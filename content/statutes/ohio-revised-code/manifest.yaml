- section: '5721.23'
  title: Tax commissioner to administer chapter - prosecution by attorney general
    - expenses.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.23
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.23/7-1-1985/5721.23-7-1-1985.pdf
  text: The tax commissioner shall administer this chapter. If any act or proceeding
    required by such sections is not done or instituted within the time limited by
    such sections, the tax commissioner shall cause such act to be done or such proceeding
    instituted in the name of the officer whose duty it is to perform such act or
    to institute such proceeding, and the acts and proceedings of the tax commissioner
    in such behalf shall be considered valid and effectual to the same extent as if
    done or instituted within the time limited in such sections and by the officer
    required to perform such act or institute such proceeding. The attorney general
    shall, on the written request of the tax commissioner, institute and prosecute
    any such proceedings. All expenses incurred by the tax commissioner under this
    section in a county shall be borne by the county. Such expenses shall be certified
    and paid, and the proceeds of such payments shall be used in the manner provided
    by such sections.
  raw_html_sha256: ea083742382497c9e868eacfd6faf06f0de409a1cd3ad997ba86be06f0bdb854
