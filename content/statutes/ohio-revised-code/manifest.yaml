- section: '323.30'
  title: Receipt for installment payment - contents - entry by county treasurer.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.30
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.30/7-1-1985/323.30-7-1-1985.pdf
  text: 'When any part of the delinquent taxes charged on the tax duplicate is paid
    as an installment under section


    323.31


    of the Revised Code, the county treasurer shall enter the amount of such payment
    on the tax duplicate, crediting it as required by such section, an shall give
    a receipt for the amount paid to the person paying it. Such receipt shall show
    the application of the payment made and the amount of delinquent taxes remaining
    unpaid.'
