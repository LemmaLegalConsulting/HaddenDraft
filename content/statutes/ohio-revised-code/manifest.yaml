- section: '3767.23'
  title: Corporations may be prosecuted for nuisance - abatement.
  url: https://codes.ohio.gov/ohio-revised-code/section-3767.23
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-3767
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/37/3767/3767.23/8-11-1955/3767.23-8-11-1955.pdf
  text: 'Corporations may be prosecuted by indictment for violation of sections


    3767.13


    to


    3767.29


    , inclusive, of the Revised Code, and in every case of conviction under such sections,
    the court shall adjudge that the nuisance described in the indictment be abated
    or removed within a time fixed, and, if it is of a recurring character, the defendant
    shall keep such nuisance abated.'
  raw_html_sha256: 7bebb74c6c1e9075889c6437ce3ae107a836ec4f42f9c5f8387a9a4c9d8a38b1
