- section: '1345.08'
  title: Attorney general to coordinate with other administrative agency.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.08/7-1-1983/1345.08-7-1-1983.pdf
  text: If the attorney general receives a complaint or other information concerning
    noncompliance with Chapter 1345. of the Revised Code, by a supplier subject to
    other administrative supervision in this state, he shall immediately give written
    notice of the substance of the complaint or other information to the official
    or agency having supervisory authority over the supplier. The attorney general
    may request information about suppliers subject to other administrative supervision
    from the agencies or official supervising them.
