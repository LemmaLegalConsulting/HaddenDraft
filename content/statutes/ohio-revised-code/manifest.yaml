- section: '2329.04'
  title: Judgments of inferior courts - stay of execution - certificate in lieu of
    transcript.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.04/1-1-1958/2329.04-1-1-1958.pdf
  text: 'Judgments of probate courts, municipal courts, county courts, and other courts
    inferior to the court of common pleas may be made liens upon lands and tenements
    of a judgment debtor within any county of this state only in the manner provided
    in section


    2329.02


    of the Revised Code. The certificate of such judgment shall be made by the clerk
    of any such court or judge of a county court except that as to all judgments mentioned
    in section


    5309.54


    of the Revised Code, when the certificate is to be filed in the office of the
    county recorded in order to obtain a lien upon registered lands, the same shall
    be procured and issued as provided in said sections. When any certificate of a
    judgment of any such court made by the clerk of such court or judge of a county
    court has been filed in the office of the clerk of the court of common pleas of
    any county, and docketed and indexed therein, execution may be issued out of such
    court of common pleas upon such judgment, and such further proceedings to enforce
    said judgment may be had as if the same had been rendered in such court of common
    pleas. If stay of execution of any such judgment is obtained, such facts shall
    be certified by the clerk of the court rendering the decision or the judge of
    a county court, to the clerk of the court of common pleas, who shall enter a memorandum
    of such stay upon the judgment docket. Such certificate of judgment shall be used
    instead of a transcript in every case where it is or has been provided by law
    that a transcript of a judgment shall be filed in order to obtain a lien upon
    the lands.'
  raw_html_sha256: 924ccd4aa51bdbf49bfce54357ae672ee0d70daec7bf4ea880b7f00ce6e252f7
