- section: '2737.03'
  title: Motion and affidavit for order of possession of property.
  url: https://codes.ohio.gov/ohio-revised-code/section-2737.03
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2737
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2737/2737.03/3-13-1986/2737.03-3-13-1986.pdf
  text: 'Any party to an action involving a claim for the recovery of specific personal
    property, upon or at any time after commencement of the action, may apply to the
    court by written motion for an order of possession of the property. The motion
    shall have attached to it the affidavit of the movant, his agent, or his attorney
    containing all of the following:


    (A) A description of the specific personal property claimed and the approximate
    value of each item or category of property claimed;


    (B) The specific interest of the movant in the property and, if the interest is
    based upon a written instrument, a copy of that instrument;


    (C) The manner in which the respondent came into possession of the property, the
    reason that the detention is wrongful and, to the best of the knowledge of the
    movant, the reason, if any, that the respondent may claim the detention is not
    wrongful;


    (D) The use to which the respondent has put the property, as determined by the
    movant after such investigation as is reasonable in the circumstances;


    (E) The extent, if any, to which the movant is or will be damaged by the respondent''s
    detention of the property;


    (F) To the best of the movant''s knowledge, the location of the property;


    (G) That the property was not taken for a tax, assessment, or fine pursuant to
    statute, or seized under execution of judgment against the property of the movant
    or, if so seized, that it is statutorily exempt from seizure.'
  raw_html_sha256: 69e34de77afe9818172e5284c7fc9b549ddb763149b9ae88206d4c4e7c705ec6
