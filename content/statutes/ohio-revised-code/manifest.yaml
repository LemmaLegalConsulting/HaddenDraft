- section: '1923.14'
  title: Writ of execution enforced.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.14
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.14/9-29-2017/1923.14-9-29-2017.pdf
  text: '(A) Except as otherwise provided in this section, within ten days after receiving
    a writ of execution described in division (A) or (B) of section


    1923.13


    of the Revised Code, the sheriff, police officer, constable, or bailiff shall
    execute it by restoring the plaintiff to the possession of the premises, and shall
    levy and collect reasonable costs, not to exceed the standard motion fee, and
    make return, as upon other executions. If an appeal from the judgment of restitution
    is filed and if, following the filing of the appeal, a stay of execution is obtained
    and any required bond is filed with the court of common pleas, municipal court,
    or county court, the judge of that court immediately shall issue an order to the
    sheriff, police officer, constable, or bailiff commanding the delay of all further
    proceedings upon the execution. If the premises have been restored to the plaintiff,
    the sheriff, police officer, constable, or bailiff shall forthwith place the defendant
    in possession of them, and return the writ with the sheriff''s, police officer''s,
    constable''s, or bailiff''s proceedings and the costs taxed on it.


    (B)(1) After a municipal court or county court issues a writ of execution described
    in division (B) of section


    1923.13


    of the Revised Code, the clerk of the court shall send by regular mail, to the
    last known address of each person other than the titled owner of the manufactured
    home, mobile home, or recreational vehicle that is the subject of the writ who
    is listed on the writ as having any outstanding right, title, or interest in the
    home, vehicle, or personal property and to the auditor and treasurer of the county
    in which the court is located, a written notice that the home or vehicle potentially
    may be sold, destroyed, or have its title transferred under the circumstances
    described in division (B)(3) or (4) of this section. A person having any outstanding
    right, title, or interest in the home, vehicle, or personal property is not required
    to consent to the notice required under this division in order for the writ to
    be executed.


    (2) Except as otherwise provided in this division, after causing the defendant
    to be removed from the residential premises of the manufactured home park, if
    necessary, by writ of restitution, and receiving a writ of execution described
    in division (B) of section


    1923.13


    of the Revised Code, in accordance with the writ, the sheriff, police officer,
    constable, or bailiff may cause the manufactured home, mobile home, or recreational
    vehicle that is the subject of the writ, and all personal property on the residential
    premises, to be retained at their current location on the residential premises,
    until they are claimed by the defendant or they are disposed of in a manner authorized
    by division (B)(3), (4), or (6) of this section or by another section of the Revised
    Code.


    The park operator shall not be liable for any damage caused by the park operator''s
    removal of the manufactured home, mobile home, or recreational vehicle or the
    removal of the personal property from the residential premises, or for any damage
    to the home, vehicle, or personal property during the time the home, vehicle,
    or property remains abandoned or stored in the manufactured home park, unless
    the damage is the result of acts that the park operator or the park operator''s
    agents or employees performed with malicious purpose, in bad faith, or in a wanton
    or reckless manner. The reasonable costs for a removal of the manufactured home,
    mobile home, or recreational vehicle and personal property and, as applicable,
    the reasonable costs for its storage shall constitute a lien upon the home or
    vehicle payable by the titled owner of the home or vehicle or payable pursuant
    to division (B)(3) of this section to the park operator.


    The sheriff, police officer, constable, or bailiff shall not be liable for any
    damage caused by the park operator''s removal of the manufactured home, mobile
    home, or recreational vehicle or the removal of the personal property from the
    residential premises, or for any damage to the home, vehicle, or personal property
    during the time the home, vehicle, or property remains abandoned or stored in
    the manufactured home park.


    (3) Except as provided in divisions (B)(4), (5), and (6) of this section and division
    (D) of section


    1923.12


    of the Revised Code, within sixty days after receiving a writ of execution described
    in division (B) of section


    1923.13


    of the Revised Code for a manufactured home, mobile home, or recreational vehicle,
    determined to have a value of more than three thousand dollars, the sheriff, police
    officer, constable, or bailiff shall commence proceedings for the sale of the
    manufactured home, mobile home, or recreational vehicle that is the subject of
    the writ, and the abandoned personal property on the residential premises, if
    the home or vehicle is determined to be abandoned in accordance with the procedures
    for the sale of goods on execution under Chapter 2329. of the Revised Code. In
    addition to all notices required to be given under section


    2329.13


    of the Revised Code, the sheriff, police officer, constable, or bailiff shall
    serve at their respective last known addresses a written notice of the date, time,
    and place of the sale upon all persons who are listed on the writ of execution
    as having any outstanding right, title, or interest in the abandoned manufactured
    home, mobile home, or recreational vehicle and the personal property and shall
    provide written notice to the auditor and the treasurer of the county in which
    the court issuing the writ is located.


    Unless the proceedings are governed by division (D) of section


    1923.12


    of the Revised Code, notwithstanding any statutory provision to the contrary,
    including, but not limited to, section


    2329.66


    of the Revised Code, there shall be no stay of execution or exemption from levy
    or sale on execution available to the titled owner of the abandoned manufactured
    home, mobile home, or recreational vehicle in relation to a sale under this division.
    Except as otherwise provided in sections


    2113.031


    ,


    2117.25


    , and


    5162.21


    of the Revised Code in a case involving a deceased resident or resident''s estate,
    the sheriff, police officer, constable, or bailiff shall distribute the proceeds
    from the sale of an abandoned manufactured home, mobile home, or recreational
    vehicle and any personal property under this division in the following manner:


    (a) The sheriff, police officer, constable, or bailiff shall first pay the costs
    for any moving of and any storage outside the manufactured home park of the home
    or vehicle and any personal property pursuant to division (B)(2) of this section,
    the costs of the sale, any advertising expenses paid by the park operator for
    the sale of the manufactured home, mobile home, or recreational vehicle under
    division (B)(3) of this section, and any unpaid court costs assessed against the
    defendant in the underlying action.


    (b) Following the payment required by division (B)(3)(a) of this section, the
    sheriff, police officer, constable, or bailiff shall pay all outstanding tax liens
    on the home or vehicle.


    (c) Following the payment required by division (B)(3)(b) of this section, the
    sheriff, police officer, constable, or bailiff shall pay all other outstanding
    security interests, liens, or encumbrances on the home or vehicle by priority
    of filing or other priority.


    (d) Following the payment required by division (B)(3)(c) of this section, the
    sheriff, police officer, constable, or bailiff shall pay any outstanding monetary
    judgment rendered under section


    1923.09


    or


    1923.11


    of the Revised Code in favor of the plaintiff and any costs associated with retaining
    the home or vehicle prior to the sale at its location on the residential premises
    within the manufactured home park pursuant to division (B)(2) of this section.


    (e) After complying with divisions (B)(3)(a) to (d) of this section, the sheriff,
    police officer, constable, or bailiff shall report any remaining money as unclaimed
    funds pursuant to Chapter 169. of the Revised Code.


    Upon the return of any writ of execution for the satisfaction of which an abandoned
    manufactured home, mobile home, or recreational vehicle has been sold under this
    division, on careful examination of the proceedings of the sheriff, police officer,
    constable, or bailiff conducting the sale, if the court that issued the writ finds
    that the sale was made, in all respects, in conformity with this division, the
    court shall direct the clerk of the court to make an entry on the journal that
    the court is satisfied with the legality of the sale and order the clerk of the
    court of common pleas title division to issue a certificate of title, free and
    clear of all security interests, liens, and encumbrances, to the purchaser of
    the home or vehicle. If the manufactured home, mobile home, or recreational vehicle
    sold under this division is located in a manufactured home park, the purchaser
    of the home or vehicle shall have no right to maintain the home or vehicle in
    the manufactured home park without the park operator''s consent and the sheriff,
    police officer, constable, or bailiff conducting the sale shall notify all prospective
    purchasers of this fact prior to the commencement of the sale.


    If, after it is offered for sale on two occasions under this division, the abandoned
    manufactured home, mobile home, or recreational vehicle cannot be sold due to
    a want of bidders, the sheriff, police officer, constable, or bailiff shall present
    the writ of execution unsatisfied to the clerk of the court of common pleas title
    division, of the county in which the writ was issued for the issuance by the clerk
    in the manner prescribed in section


    4505.10


    of the Revised Code of a certificate of title transferring the title of the home
    or vehicle to the plaintiff, free and clear of all security interests, liens,
    and encumbrances. If any taxes are owed on the home or vehicle at this time, the
    county auditor shall remove the delinquent taxes from the manufactured home tax
    list and the delinquent manufactured home tax list and remit any penalties for
    late payment of manufactured home taxes. Acceptance of the certificate of title
    by the plaintiff terminates all further proceedings under this section. In accordance
    with division (E)(3) of section


    4503.061


    of the Revised Code, the plaintiff shall notify the county auditor of the transfer
    of title. Pursuant to section


    4503.061


    of the Revised Code, if the manufactured home, mobile home, or recreational vehicle
    is destroyed or removed, the plaintiff shall provide the county auditor with notice
    of removal or destruction of the manufactured home, mobile home, or recreational
    vehicle.


    (4) Except as provided in division (B)(5) or (6) of this section and division
    (D) of section


    1923.12


    of the Revised Code, within thirty days after receiving a writ of execution described
    in division (B) of section


    1923.13


    of the Revised Code, if the manufactured home, mobile home, or recreational vehicle
    is determined to be abandoned and to have a value of three thousand dollars or
    less, the sheriff, police officer, constable, or bailiff shall present the writ
    of execution to the clerk of the court of common pleas title division, of the
    county in which the writ was issued for the issuance by the clerk in the manner
    prescribed in section


    4505.10


    of the Revised Code of a certificate of title transferring the title of the home
    or vehicle to the plaintiff, free and clear of all security interests, liens,
    and encumbrances. If any taxes are owed on the home or vehicle at this time, the
    county auditor shall remove the delinquent taxes from the manufactured home tax
    list and the delinquent manufactured home tax list and remit any penalties for
    late payment of manufactured home taxes. Acceptance of the certificate of title
    by the plaintiff terminates all further proceedings under this section. In accordance
    with division (E)(3) of section


    4503.061


    of the Revised Code, the plaintiff shall notify the county auditor of the transfer
    of title. Pursuant to section


    4503.0611


    of the Revised Code, if the manufactured home, mobile home, or recreational vehicle
    is destroyed or removed, the plaintiff shall provide the county auditor with notice
    of removal or destruction of the manufactured home, mobile home, or recreational
    vehicle.


    (5) At any time prior to the issuance of the writ of execution described in division
    (B) of section


    1923.13


    of the Revised Code, the titled owner of the manufactured home, mobile home, or
    recreational vehicle that would be the subject of the writ may remove the abandoned
    home or vehicle from the manufactured home park upon payment to the county auditor
    of all outstanding tax liens on the home or vehicle and, unless the owner is indigent,
    payment to the clerk of court of all unpaid court costs assessed against the defendant
    in the underlying action. After the issuance of the writ of execution, the titled
    owner of the home or vehicle may remove the abandoned home or vehicle from the
    manufactured home park at any time up to the day before the scheduled sale, destruction,
    or transfer of the home or vehicle pursuant to division (B)(3) or (4) of this
    section upon payment of all of the following:


    (a) All costs incurred by the sheriff, police officer, constable, or bailiff;


    (b) All outstanding tax liens on the home or vehicle;


    (c) Unless the owner is indigent, all unpaid court costs assessed against the
    defendant in the underlying action.


    (6) At any time after the issuance of the writ of execution described in division
    (B) of section


    1923.13


    of the Revised Code, the holder of any outstanding lien, right, title, or interest
    in the manufactured home, mobile home, or recreational vehicle, other than the
    titled owner of the home or vehicle, may stop the sheriff, police officer, constable,
    or bailiff from proceeding with the sale under this division by doing both of
    the following:


    (a) Commencing a proceeding to repossess the home or vehicle pursuant to Chapters
    1309. and 1317. of the Revised Code;


    (b) Paying to the park operator all monthly rental payments for the lot on which
    the home or vehicle is located from the time of the issuance of the writ of execution
    until the time that the home or vehicle is sold pursuant to Chapters 1309. and
    1317. of the Revised Code.


    (7)(a) At any time prior to the day before the scheduled sale of the property
    pursuant to division (B)(3) of this section, the defendant may remove any personal
    property of the defendant from the abandoned home or vehicle or other place of
    storage.


    (b) If personal property owned by a person other than the defendant is abandoned
    on the residential premises and has not previously been removed, the owner of
    the personal property may remove the personal property from the abandoned home
    or vehicle or other place of storage up to the day before the scheduled sale of
    the property pursuant to division (B)(3) of this section upon presentation of
    proof of ownership of the property that is satisfactory to the sheriff, police
    officer, constable, or bailiff conducting the sale.'
