- section: '1345.94'
  title: Applicability of consumer sales practices act.
  url: https://codes.ohio.gov/ohio-revised-code/section-1345.94
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1345
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1345/1345.94/10-31-1996/1345.94-10-31-1996.pdf
  text: 'The failure of a manufacturer to comply with sections


    1345.91


    ,


    1345.93


    , and


    1345.95


    and division (C) of section


    1345.92


    of the Revised Code is an unfair or deceptive act or practice in violation of
    section


    1345.02


    of the Revised Code. All powers and remedies available to the attorney general
    to enforce sections


    1345.01


    to


    1345.13


    of the Revised Code are available to the attorney general to enforce sections


    1345.90


    to


    1345.95


    of the Revised Code, and all remedies available to consumers under section


    1345.09


    of the Revised Code to remedy violations of section


    1345.02


    of the Revised Code are available to consumers to remedy failure to comply with
    sections


    1345.90


    to


    1345.95


    of the Revised Code.'
