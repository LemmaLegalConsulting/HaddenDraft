- section: '2715.35'
  title: Judgment against garnishee.
  url: https://codes.ohio.gov/ohio-revised-code/section-2715.35
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2715
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/27/2715/2715.35/8-26-1982/2715.35-8-26-1982.pdf
  text: 'Final judgment shall not be rendered against a garnishee under section


    2715.091


    of the Revised Code until the action against the defendant in attachment is determined.
    If judgment is rendered therein for the defendant in attachment, the garnishee
    shall be discharged, and recover costs. If the plaintiff recovers, and the garnishee
    delivers up the property and credits of the defendant in his possession, and pays
    the money due from him, as the court orders, he shall be discharged, and the costs
    of proceedings against him shall be paid out of the property and money so surrendered,
    or as the court deems right.'
  raw_html_sha256: 7716edf4dd3ae74b934613d54a3aa38df1dd0e95a484eb882441092e7fc5517e
