- section: '4112.056'
  title: Refer housing discrimination claim to attorney general.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.056
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.056/4-15-2021/4112.056-4-15-2021.pdf
  text: 'Whenever the Ohio civil rights commission has reasonable cause to believe
    that any person or persons are engaged in a pattern or practice of resistance
    to a person or persons'' full enjoyment of the rights granted by division (H)
    of section


    4112.02


    of the Revised Code, or that any group of persons has been denied any of the rights
    granted by that division and the denial raises an issue of public importance,
    the commission may refer the matter to the attorney general for commencement of
    a civil action in a court of common pleas. The attorney general may seek any preventive
    relief considered necessary to ensure the full enjoyment of the rights granted
    by that division, including a permanent or temporary injunction or temporary restraining
    order.'
