- section: '1349.66'
  title: High-volume seller notification requirements.
  url: https://codes.ohio.gov/ohio-revised-code/section-1349.66
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1349
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/13/1349/1349.66/7-6-2022/1349.66-7-6-2022.pdf
  text: '(A) An online marketplace shall require any high-volume third party seller
    on such online marketplace''s platform to provide, not later than ten days after
    qualifying as a high-volume third party seller on the platform, all of the following
    information to the online marketplace:


    (1)(a) A bank account number, or, if such seller does not have a bank account,
    the name of the payee for payments issued by the online marketplace to such seller.


    (b) The bank account or payee information required under division (A)(1)(a) of
    this section may be provided by the seller in either of the following ways:


    (i) To the online marketplace;


    (ii) To a payment processor or other third party contracted by the online marketplace
    to maintain such information, provided that the online marketplace ensures that
    it can obtain such information on demand from such payment processor or other
    third party.


    (2) Contact information for such seller as follows:


    (a) With respect to a high-volume third party seller that is an individual, the
    individual''s name.


    (b) With respect to a high-volume third party seller that is not an individual,
    one of the following forms of contact information:


    (i) A copy of a valid government-issued identification for an individual acting
    on behalf of such seller that includes the individual''s name;


    (ii) A copy of a valid government-issued record or tax document that includes
    the business name and physical address of such seller.


    (c) A business tax identification number, or, if such seller does not have a business
    tax identification number, a taxpayer identification number.


    (d) A current working electronic mail address and telephone number for such seller.


    (B) An online marketplace shall do both of the following:


    (1) Periodically, but not less than annually, notify any high-volume third party
    seller on such online marketplace''s platform of the requirement to keep any information
    collected under division (A) of this section current;


    (2) Require any high-volume third party seller on such online marketplace''s platform
    to, not later than ten days after receiving the notice under division (B)(1) of
    this section, electronically certify one of the following:


    (a) The seller has provided any changes to such information to the online marketplace,
    if any such changes have occurred;


    (b) There have been no changes to such seller''s information;


    (c) Such seller has provided any changes to such information to the online marketplace.


    (C) In the event that a high-volume third party seller does not provide the information
    or certification required under this section, the online marketplace shall, after
    providing the seller with written or electronic notice and an opportunity to provide
    such information or certification not later than ten days after the issuance of
    such notice, suspend any future sales activity of such seller until such seller
    provides such information or certification.'
  raw_html_sha256: dbac4a233861b2ab0cfeeb8dc3601d98614b9f99fa6d7ce62163a88121053bb4
  normalized_text_sha256: 88ae233a326e0ee26a6e160b4815ffe4f65897b467265675cadc20537e7e6416
