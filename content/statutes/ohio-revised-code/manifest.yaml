- section: '5313.04'
  title: Vendee to enforce chapter provisions.
  url: https://codes.ohio.gov/ohio-revised-code/section-5313.04
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5313
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5313/5313.04/11-25-1969/5313.04-11-25-1969.pdf
  text: Upon the failure of any vendor to comply with Chapter 5313. of the Revised
    Code, the vendee may enforce such provisions in a municipal court, county court,
    or court of common pleas. Upon the determination of the court that the vendor
    has failed to comply with these provisions, the court shall grant appropriate
    relief.
