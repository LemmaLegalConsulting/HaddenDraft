- section: '5721.29'
  title: County auditor to keep and maintain records.
  url: https://codes.ohio.gov/ohio-revised-code/section-5721.29
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5721
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/57/5721/5721.29/11-18-1969/5721.29-11-18-1969.pdf
  text: 'The county auditor shall keep a record of all delinquent lands sold by proceedings
    pursuant to Chapters 5721. and 5723. of the Revised Code wherein he shall enter
    each procedural step required by Chapters 5721. and 5723. of the Revised Code.


    Each county auditor shall compile and make up, in tabular form and alphabetical
    order, separate lists of the names and description of the property as it appears
    on the tax list, date of sale, name of purchaser, amount bid, amount paid, costs,
    total, and date of county auditor''s or sheriff''s deed.


    The county auditor shall compile a complete alphabetical index, direct and reverse,
    of all sales, after the completion of the annual sale, of all lots and lands,
    advertised for sale pursuant to section


    5723.05


    of the Revised Code.


    A certificate that all procedural steps have been complied with shall be made
    on a form as prescribed in section


    5715.30


    of the Revised Code, and said certificate shall bear the county auditor''s signature
    with his official seal affixed thereto. Said certificate shall be received in
    all courts within the state, as prima facie evidence of the existence of such
    instruments, and as conclusive evidence of the existence of such records.'
