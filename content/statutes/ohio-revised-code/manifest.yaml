- section: '1923.10'
  title: Trial by jury.
  url: https://codes.ohio.gov/ohio-revised-code/section-1923.10
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-1923
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/19/1923/1923.10/3-17-1987/1923.10-3-17-1987.pdf
  text: If a jury is demanded by either party in an action under this chapter, until
    the impaneling of the jury, the proceedings shall be in all respects as in other
    cases. The jury shall be sworn to try and determine whether the complaint, naming
    the plaintiff, about to be presented to them, is true according to the evidence.
    If the jury finds that the complaint is true, it shall render a general verdict
    against the defendant. If the jury finds that the complaint is not true, it shall
    render a general verdict in favor of the defendant. If the jury finds that the
    complaint is true in part, it shall render a verdict setting forth the facts that
    it finds are true.
  raw_html_sha256: 5dc3c8a1e2cec672f01027e85d257cb8d12878918292c8171e522bd8c1577450
