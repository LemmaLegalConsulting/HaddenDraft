- section: '4781.27'
  title: License to operate park.
  url: https://codes.ohio.gov/ohio-revised-code/section-4781.27
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4781
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/47/4781/4781.27/1-21-2018/4781.27-1-21-2018.pdf
  text: '(A)(1) On or after the first day of December, but before the first day of
    January of the next year, every person who intends to operate a manufactured home
    park shall procure a license to operate the park for the next year from the division
    of industrial compliance. If the applicable license fee prescribed under section


    4781.28


    of the Revised Code is not received by the division by the close of business on
    the last day of December, the applicant for the license shall pay a penalty equal
    to twenty-five per cent of the applicable license fee. The penalty shall accompany
    the license fee. If the last day of December is not a business day, the penalty
    attaches upon the close of business on the next business day.


    (2) No manufactured home park shall be maintained or operated in this state without
    a license.


    (3) No person who has received a license, upon the sale or disposition of the
    manufactured home park, may have the license transferred to the new operator.
    A person shall obtain a separate license to operate each manufactured home park.


    (B) Before a license is initially issued and annually thereafter, or more often
    if necessary, the division of industrial compliance shall cause each manufactured
    home park to be inspected for compliance with sections


    4781.26


    to


    4781.35


    of the Revised Code and the rules adopted under those sections. A record shall
    be made of each inspection on a form prescribed by the division.


    (C) Each person applying for an initial license to operate a manufactured home
    park shall provide acceptable proof to the division of industrial compliance that
    adequate fire protection will be provided and that applicable fire codes will
    be adhered to in the construction and operation of the park.'
  raw_html_sha256: 13ddf4b2d8782bb07cbd0740064716b6747682fd663962d30f130d5c954ca4de
  normalized_text_sha256: 6f09c12f1c72578d2c77c98920c7ca9c3c9a5901c27ba61b7b6784f97e8ae792
