- section: '2329.39'
  title: Place of sale.
  url: https://codes.ohio.gov/ohio-revised-code/section-2329.39
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-2329
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/23/2329/2329.39/9-28-2016/2329.39-9-28-2016.pdf
  text: 'Except as provided in sections


    2329.152


    and


    2329.153


    of the Revised Code, sale of lands or tenements under execution or order of sale
    must be held in the county in which they are situated and at the courthouse, unless
    otherwise ordered by the court. Purchase of real or personal property, by the
    officer making the sale thereof, or by an appraiser of such property, shall be
    fraudulent and void.'
