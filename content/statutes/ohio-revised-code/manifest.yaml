- section: '323.76'
  title: Termination of right of redemption on sale or transfer.
  url: https://codes.ohio.gov/ohio-revised-code/section-323.76
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-323
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/3/323/323.76/4-7-2009/323.76-4-7-2009.pdf
  text: 'Upon the sale of abandoned land at public auction pursuant to section


    323.73


    or


    323.74


    of the Revised Code, or upon the county board of revision''s order to the sheriff
    to transfer abandoned land to a community development organization, school district,
    municipal corporation, county, or township under section


    323.74


    of the Revised Code, any common law or statutory right of redemption shall forever
    terminate upon the occurrence of whichever of the following is applicable:


    (A) In the case of a sale of the land at public auction, upon the order of confirmation
    of the sale by the county board of revision and the filing of such order with
    the clerk of court, who shall enter it upon the journal of the court or a separate
    journal;


    (B) In the case of a transfer of the land to a community development organization,
    school district, municipal corporation, county, or township under section


    323.74


    of the Revised Code, upon the filing with the clerk of court an order to transfer
    the parcel based on the adjudication of foreclosure by the county board of revision
    ordering the sheriff to transfer the land in fee simple to the community development
    organization, school district, municipal corporation, county, or township pursuant
    to such adjudication, which the clerk shall enter upon the journal of the court
    or a separate journal;


    (C)(1) In the case of a transfer of the land to a certificate holder or county
    land reutilization corporation pursuant to division (G) of section


    323.73


    of the Revised Code, upon the filing with the clerk of court the county board
    of revision''s order to the sheriff to execute a deed to the certificate holder
    or corporation based on the adjudication of foreclosure, which the clerk shall
    enter upon the journal of the court or a separate journal;


    (2) In the case of an adjudication of foreclosure in which a court or board of
    revision has included in its adjudication decree that the alternative redemption
    period authorized in section


    323.78


    of the Revised Code applies, then upon the expiration of such alternative redemption
    period.'
