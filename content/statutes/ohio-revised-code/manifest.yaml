- section: '4112.08'
  title: Liberal construction.
  url: https://codes.ohio.gov/ohio-revised-code/section-4112.08
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-4112
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/41/4112/4112.08/4-15-2021/4112.08-4-15-2021.pdf
  text: '(A) This chapter shall be construed liberally for the accomplishment of its
    purposes, and any law inconsistent with any provision of this chapter shall not
    apply. Nothing contained in this chapter shall be considered to repeal any of
    the provisions of any law of this state relating to discrimination because of
    race, color, religion, sex, military status, familial status, disability, national
    origin, age, or ancestry.


    However, no person has a cause of action or claim based on an unlawful discriminatory
    practice relating to employment described in division (A)(24)(a) of section


    4112.01


    of the Revised Code against a supervisor, manager, or other employee of an employer
    unless that supervisor, manager, or other employee is the employer. Nothing in
    this division abrogates statutory claims outside this chapter or any claims of
    liability that exist against an individual at common law.


    (B) The procedures and remedies for unlawful discriminatory practices relating
    to employment in this chapter are the sole and exclusive procedures and remedies
    available to a person who alleges such discrimination actionable under this chapter.'
