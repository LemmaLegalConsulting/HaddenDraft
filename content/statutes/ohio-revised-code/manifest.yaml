- section: '5301.44'
  title: Certified copy of record in action to cure defects.
  url: https://codes.ohio.gov/ohio-revised-code/section-5301.44
  acquired_from_url: https://codes.ohio.gov/ohio-revised-code/chapter-5301
  authenticated_pdf_url: https://codes.ohio.gov/assets/laws/revised-code/authenticated/53/5301/5301.44/10-1-1953/5301.44-10-1-1953.pdf
  text: When a conveyance of real estate has been executed in which there is a mistake,
    defect, or omission in the description of the lands, execution, acknowledgment,
    or otherwise, and it has been recorded in the county recorder's office of the
    county where the lands are or were situated at the time of such record, the record
    or a certified copy thereof in an action to cure or supply such defect, mistake,
    or omission, or to compel the execution of a valid conveyance of such real estate,
    may be read in evidence, and shall be prima-facie evidence that such instrument
    was executed and existed as shown by such record.
  raw_html_sha256: a523b2179ed9fc186726ee4888539596e06c9d62293c734f59d9efc7cbebb475
