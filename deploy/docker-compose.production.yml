services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - /opt/haddendraft/.env
    restart: unless-stopped
    volumes:
      - haddendraft-media:/app/media
      - haddendraft-static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python backend/manage.py check --deploy >/tmp/haddendraft-check.log 2>&1 || cat /tmp/haddendraft-check.log"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    depends_on:
      - web
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  haddendraft-media:
  haddendraft-static:
